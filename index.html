<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotEduCarmen 2026 | Sistema de Formación Inteligente</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--azul-primario); color: white; text-align: center; padding-top: 100px; }
        .btn-admin {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--azul-electrico);
            color: var(--azul-electrico);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-admin:hover { background: var(--azul-electrico); color: var(--azul-primario); }
    </style>
</head>
<body>

    <h1>Bienvenido a BotEduCarmen 2026</h1>
    <p>Tu futuro empieza hoy.</p>
    
    <button class="btn-admin" onclick="verificarAdmin()">Acceso Administrativo</button>

    <script>
        function verificarAdmin() {
            // Si ya está autenticado, entrar directo
            if (sessionStorage.getItem('admin_autenticado') === 'true') {
                window.location.href = 'admin.html';
                return;
            }

            // Si no, pedir contraseña
            const password = prompt("🔐 Ingrese la contraseña de administrador:");

            // CAMBIA '1234' por tu clave real
            if (password === "1234") { 
                sessionStorage.setItem('admin_autenticado', 'true');
                window.location.href = 'admin.html';
            } else {
                alert("❌ Contraseña incorrecta.");
            }
        }
    </script>
</body>
</html>
