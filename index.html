<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotEduCarmen 2026 | Sistema de Formación Inteligente</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --glass: rgba(255, 255, 255, 0.08);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.4);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: #f8fafc; 
            color: #1e293b;
        }

        /* BARRA SUPERIOR 2026 */
        .top-bar {
            background: var(--azul-primario);
            color: var(--azul-electrico);
            padding: 10px 0;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 600;
            border-bottom: 2px solid var(--azul-electrico);
            text-align: center;
        }

        /* VENTANA FLOTANTE DEL CHAT */
        .chat-container {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 380px;
            height: 500px;
            background: var(--azul-primario);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
            box-shadow: var(--sombra-futurista);
            display: none; /* Controlado por JS */
            flex-direction: column;
            overflow: hidden;
            z-index: 9999;
        }

        .chat-header {
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at bottom, rgba(0,210,255,0.03), transparent);
        }

        .chat-footer {
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 10px;
        }

        .chat-footer input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 12px 18px;
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }

        .chat-footer input:focus {
            border-color: var(--azul-electrico);
        }

        /* BOTÓN BURBUJA FLOTANTE */
        .chat-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--naranja-neon);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 109, 0, 0.4);
            z-index: 10000;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .chat-trigger:hover {
            transform: scale(1.1);
            background: var(--naranja-glow);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 109, 0, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(255, 109, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 109, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        🚀 ADMISIONES ABIERTAS PERIODO ACADÉMICO 2026 - MATRÍCULA 100% GRATUITA
    </div>

    <header style="background: var(--azul-primario); color: white; padding: 100px 20px; text-align: center;">
        <div class="container">
            <h1 style="font-size: 3rem; margin: 0; color: white;">Plataforma Educativa <span style="color:var(--azul-electrico);">Capifer</span></h1>
            <p style="font-size: 1.2rem; color: rgba(255,255,255,0.7); margin: 20px 0 40px;">Aprende un oficio productivo con certificación oficial en La Victoria, Aragua.</p>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <a href="cursos.html" style="background: var(--azul-electrico); color: var(--azul-primario); padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold;">Ver Catálogo de Cursos</a>
                <a href="#saber-mas" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 15px 30px; border-radius: 30px; text-decoration: none;">Saber Más</a>
            </div>
        </div>
    </header>

    <div class="chat-trigger" onclick="toggleChat()">🤖</div>

    <div class="chat-container" id="chat-window">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="width: 10px; height: 10px; background: #00ffcc; border-radius: 50%; display: inline-block;"></span>
                <h3 style="margin: 0; color: white; font-size: 1rem;">Asistente Virtual 2026</h3>
            </div>
            <button onclick="toggleChat()" style="background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 1.2rem;">✕</button>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            </div>

        <div class="chat-footer">
            <input type="text" id="user-input" placeholder="Escribe tu pregunta aquí...">
            <button onclick="sendMessage()" style="background: var(--azul-electrico); border: none; width: 45px; height: 45px; border-radius: 50%; color: var(--azul-primario); font-weight: bold; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;">➤</button>
        </div>
    </div>

    <script src="chatbot.js"></script>
</body>
</html>
