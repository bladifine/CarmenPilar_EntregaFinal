<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BotEduCarmen 2026 | Inicio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; padding:15px 0;">
            <div style="display:flex; align-items:center; gap:15px;">
                <img src="img/logo.png" alt="Logo" style="height:60px;">
                <h2 style="margin:0; color:#0a192f;">BotEduCarmen</h2>
            </div>
            <nav>
                <a href="cursos.html" class="btn-naranja">EXPLORAR CURSOS</a>
                <a href="admin.html" style="margin-left:20px; text-decoration:none; color:#0a192f; font-weight:bold;">ADMIN</a>
            </nav>
        </div>
    </header>

    <section class="hero" style="background:linear-gradient(rgba(10,25,47,0.8), rgba(10,25,47,0.8)), url('img/hero.jpg'); height:70vh; display:flex; align-items:center; justify-content:center; text-align:center; color:white;">
        <div>
            <h1 style="font-size:3.5rem;">Formación para el Futuro</h1>
            <p style="font-size:1.2rem; margin-bottom:30px;">Cursos gratuitos de excelencia técnica en La Victoria[cite: 17].</p>
            <a href="cursos.html" class="btn-naranja">¡INSCRIBETE AHORA!</a>
        </div>
    </section>

    <!-- Botón Flotante Chatbot -->
    <div id="chat-icon" onclick="toggleChat()" style="position:fixed; bottom:30px; right:30px; width:80px; height:80px; cursor:pointer; z-index:5000;">
        <img src="img/chatbot.png" style="width:100%; filter: drop-shadow(0 0 10px #00d2ff);">
    </div>

    <!-- Ventana Chatbot -->
    <div id="chat-window" style="position:fixed; bottom:120px; right:30px; width:350px; height:500px; background:white; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.3); display:none; flex-direction:column; z-index:5000; overflow:hidden; border:1px solid #ddd;">
        <div style="background:#0a192f; color:white; padding:20px; text-align:center; font-weight:bold;">🤖 ASISTENTE CAE</div>
        <div id="chat-messages" style="flex:1; padding:20px; overflow-y:auto; background:#f8f9fa; display:flex; flex-direction:column;"></div>
        <div style="padding:15px; border-top:1px solid #eee; display:flex; gap:10px;">
            <input type="text" id="user-input" placeholder="Pregunta algo..." style="flex:1; padding:10px; border-radius:10px; border:1px solid #ccc; outline:none;" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="background:#0a192f; color:#00d2ff; border:none; padding:10px 15px; border-radius:10px; cursor:pointer;">➤</button>
        </div>
    </div>

    <script src="chatbot.js"></script>
</body>
</html>
