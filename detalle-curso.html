<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalles | BotEduCarmen</title>
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
        }
        body { 
            background: var(--azul-p); color: white; font-family: 'Inter', sans-serif; margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0,210,255,0.05), transparent);
        }
        .header-simple { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        
        .detalle-container { max-width: 900px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        
        .img-box img { width: 100%; border-radius: 20px; border: 2px solid var(--electrico); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        
        .info-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        
        .tag { background: var(--electrico); color: var(--azul-p); padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; }
        
        .btn-add { 
            background: linear-gradient(135deg, var(--naranja), #ff9100); color: white; border: none; 
            padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header-simple">
        <a href="cursos.html" style="color:var(--electrico); text-decoration:none; font-weight:bold;">⬅ VOLVER AL CATÁLOGO</a>
    </div>

    <div id="contenido-detalle" class="detalle-container"></div>

    <div id="chat-window" style="display:none; position:fixed; bottom:90px; right:30px; width:350px; height:450px; background:white; z-index:99999; flex-direction:column; border-radius:15px; box-shadow:0 5px 25px rgba(0,0,0,0.3); overflow:hidden; font-family:'Segoe UI', sans-serif;">
        <div style="background:#0a192f; color:#00d2ff; padding:15px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
            <span>🤖 Asistente CAE</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">✖</button>
        </div>
        <div id="chat-messages" style="flex:1; padding:15px; overflow-y:auto; background:#f8fafc; display:flex; flex-direction:column; gap:10px;">
            <div style="text-align:left;">
                <div style="background:white; color:#1e293b; padding:12px 18px; border-radius:20px 20px 20px 0; display:inline-block; font-size:0.95rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #00d2ff;">
                    ¡Hola! Soy el asistente virtual del CAE 'Carmen Pilar Fernández'. ¿En qué puedo orientarte hoy?
                </div>
            </div>
        </div>
        <div style="padding:10px; border-top:1px solid #e2e8f0; display:flex; background:white; gap:5px;">
            <input type="text" id="user-input" placeholder="Pregúntame algo..." style="flex:1; padding:10px; border:1px solid #cbd5e1; border-radius:20px; outline:none; color:#333;">
            <button onclick="sendMessage()" style="background:#0a192f; color:#00d2ff; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center;">➤</button>
        </div>
    </div>

    <button onclick="toggleChat()" style="position:fixed; bottom:20px; right:30px; width:60px; height:60px; background:#0a192f; color:#00d2ff; border:2px solid #00d2ff; border-radius:50%; font-size:1.8rem; cursor:pointer; box-shadow:0 4px 15px rgba(0,210,255,0.4); z-index:99999; display:flex; align-items:center; justify-content:center;">
        🤖
    </button>

    <script src="chatbot.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const nombreCurso = params.get('curso');

        // CORRECCIÓN: Nombres sincronizados en minúsculas y añadido el de Cocina Nacional
        const CURSO_DATA = {
            "Barbería": { d: "Aprende técnicas modernas de corte masculino, perfilado y diseño estructural de barba.", r: "Cédula de identidad, ser mayor de 15 años.", t: "3 meses", i: "img/barberia.jpg" },
            "Panadería": { d: "Domina el arte de las masas, fermentación balanceada y métodos de horneado artesanal.", r: "Cédula de identidad, delantal y gorro.", t: "4 meses", i: "img/panaderia.jpg" },
            "Cocina Nacional": { d: "Conoce el manejo técnico de fogones, sazones tradicionales y platos típicos de nuestra gastronomía.", r: "Cédula de identidad, delantal y paño técnico.", t: "3 meses", i: "img/cocina_nacional.jpg" }
        };

        function cargar() {
            const cont = document.getElementById('contenido-detalle');
            const info = CURSO_DATA[nombreCurso] || { d: "Formación técnica profesional en el área seleccionada.", r: "Cédula de identidad.", t: "Variable", i: "img/logo.png" };

            cont.innerHTML = `
                <div class="img-box">
                    <img src="${info.i}" onerror="this.src='img/logo.png'">
                </div>
                <div class="info-box">
                    <span class="tag">CURSO 2026</span>
                    <h1 style="color:var(--electrico); font-size:2.5rem; margin:10px 0;">${nombreCurso}</h1>
                    <p style="color:rgba(255,255,255,0.8); line-height:1.6;">${info.d}</p>
                    <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
                    <p>🕒 <b>Duración:</b> ${info.t}</p>
                    <p>📝 <b>Requisitos:</b> ${info.r}</p>
                    <button onclick="agregar('${nombreCurso}', '${info.i}')" class="btn-add">SELECCIONAR CURSO</button>
                </div>
            `;
        }

        function agregar(n, img) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if(!cart.find(x => x.nombre.trim() === n.trim())) {
                cart.push({nombre: n.trim(), imagen: img});
                localStorage.setItem('cart', JSON.stringify(cart));
                alert("Curso añadido a tu selección");
                window.location.href = "cursos.html";
            } else {
                alert("Ya está seleccionado");
            }
        }
        cargar();
    </script>
</body>
</html>
