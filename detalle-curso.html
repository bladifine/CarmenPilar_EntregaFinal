<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Curso | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body { 
            background: var(--azul-p); color: white; font-family: 'Inter', sans-serif; margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0,210,255,0.1), transparent);
        }
        
        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 2px solid var(--electrico);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-container { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 1200px; margin: 0 auto; padding: 0 20px; 
        }
        
        .btn-back {
            background: linear-gradient(135deg, var(--naranja), #ff9100);
            color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; font-size: 0.8rem; box-shadow: 0 4px 0 #b34b00;
            transition: 0.2s; display: inline-block;
        }
        .btn-back:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-back:active { transform: translateY(2px); box-shadow: none; }

        .detalle-container { max-width: 1000px; margin: 50px auto; padding: 20px; }
        .detalle-flex { 
            display: flex; gap: 40px; background: var(--glass); padding: 40px; 
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); 
        }
        .detalle-img { width: 45%; height: 380px; object-fit: cover; border-radius: 16px; border: 2px solid var(--electrico); }
        .detalle-info { width: 55%; display: flex; flex-direction: column; justify-content: center; }
        
        .btn-add-detalle {
            background: var(--electrico); color: var(--azul-p); font-weight: bold; border: none;
            padding: 15px 25px; border-radius: 12px; cursor: pointer; font-size: 1rem; margin-top: 25px;
            box-shadow: 0 4px 0 #0055b3; transition: 0.2s;
        }
        .btn-add-detalle:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-add-detalle:active { transform: translateY(2px); box-shadow: none; }

        @media (max-width: 768px) {
            .detalle-flex { flex-direction: column; }
            .detalle-img, .detalle-info { width: 100%; }
            .detalle-img { height: 240px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="img/logo.png" height="50" onerror="this.src='img/logo.png'">
                <h2 style="margin:0; font-size:1.2rem; letter-spacing: 1px;">CAE CARMEN PILAR</h2>
            </div>
            <a href="cursos.html" class="btn-back">⬅ VOLVER AL CATÁLOGO</a>
        </div>
    </header>

    <main class="detalle-container" id="detalle-root"></main>

    <script src="script.js"></script>
    <script>
        // Diccionario base de datos histórica con las claves estandarizadas
        const CURSOS_DATA = {
            "cocina_nacional": { d: "Aprende las raíces culinarias de nuestro país, platos típicos regionales, técnicas de cocción tradicionales y manipulación higiénica de alimentos.", r: "Cédula de identidad, delantal, gorro y paño de cocina.", t: "3 meses", i: "cocina_nacional.jpg" },
            "panaderia": { d: "Domina el comportamiento de las levaduras, masas dulces, saladas, pan campesino, panes aliñados y técnicas de horneado.", r: "Cédula de identidad, delantal, gorro y paño de cocina.", t: "3 meses", i: "panaderia.jpg" },
            "reposteria": { d: "Elaboración profesional de tortas, bizcochos, batidos pesados, cremas de cobertura y técnicas de decoración comercial.", r: "Cédula de identidad, moldes básicos.", t: "3 meses", i: "reposteria.jpg" },
            "lenceria": { d: "Confección y diseño de lencería para el hogar: sábanas, fundas, edredones, mantelería y cortinas decorativas.", r: "Cédula de identidad, telas asignadas para la primera fase.", t: "3 meses", i: "lenceria.jpg" },
            "ropa_intima": { d: "Diseño, patronaje y confección de prendas íntimas femeninas y masculinas, manejo de telas elásticas y encajes.", r: "Cédula de identidad, hilos y agujas punta de bola.", t: "3 meses", i: "ropa_intima.jpg" },
            "modisteria": { d: "Patronaje y confección avanzada de prendas de vestir femeninas, ropa casual, vestidos y adaptaciones de costura.", r: "Cédula de identidad, cinta métrica, tijeras de tela.", t: "5 meses", i: "modisteria.jpg" },
            "corte_y_confeccion": { d: "Técnicas fundamentales de corte de textiles, uso de máquinas de coser e interpretación de patrones básicos.", r: "Cédula de identidad, tijeras de tela.", t: "4 meses", i: "corte_y_confeccion.jpg" },
            "barberia": { d: "Cortes clásicos y modernos para caballeros, diseño de barba, uso correcto de barberas y técnicas de degradado (fade).", r: "Cédula de identidad, máquinas e insumos propios de práctica.", t: "4 meses", i: "barberia.jpg" },
            "estetica_de_unas": { d: "Manicure y pedicure básico, sistemas de uñas artificiales en acrílico, gel, decoraciones en tendencia y bioseguridad.", r: "Cédula de identidad, cortaúñas, limas.", t: "3 meses", i: "estetica_de_unas.jpg" }
        };

        function cargar() {
            const params = new URLSearchParams(window.location.search);
            const nombreCurso = params.get('curso') || '';

            // MEJORA OPCIÓN A: Convertir dinámicamente "Cocina Nacional" a "cocina_nacional" antes de buscar
            let claveLimpia = "";
            if (typeof limpiarParaImagen === 'function') {
                claveLimpia = limpiarParaImagen(nombreCurso);
            } else {
                // Alternativa de seguridad si no encuentra script.js
                claveLimpia = nombreCurso.toLowerCase().trim()
                    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Quita tildes
                    .replace(/\s+/g, "_")                           // Espacios por guiones bajos
                    .replace(/[^\w]/g, "");                         // Quita símbolos extraños
            }

            const info = CURSOS_DATA[claveLimpia];
            const root = document.getElementById('detalle-root');

            if(!root) {
                console.error("Error crítico: No se encontró el contenedor HTML 'detalle-root'.");
                return;
            }

            if(!info) {
                root.innerHTML = `
                    <div style="text-align:center; padding: 50px 0; width: 100%;">
                        <h2 style="color:var(--naranja);">⚠️ Especialidad formativa no encontrada</h2>
                        <p style="opacity:0.7;">No se pudo sincronizar el contenido para "${nombreCurso}".</p>
                        <a href="cursos.html" style="color:var(--electrico); font-weight:bold; text-decoration:none; display:inline-block; margin-top:15px;">← Volver al catálogo</a>
                    </div>`;
                return;
            }

            root.innerHTML = `
                <div class="detalle-flex">
                    <img src="img/${info.i}" alt="${nombreCurso}" class="detalle-img" onerror="this.src='img/logo.png'">
                    <div class="detalle-info">
                        <span style="font-size:0.8rem; background:rgba(0,210,255,0.1); color:var(--electrico); padding:5px 12px; border-radius:50px; font-weight:bold; width:max-content; text-transform:uppercase;">FORMACIÓN CERTIFICADA</span>
                        <h1 style="font-size:2.2rem; margin:15px 0 10px 0; color:var(--electrico);">${nombreCurso}</h1>
                        <p class="description" style="color:rgba(255,255,255,0.7); font-size:1rem; line-height:1.5; margin-bottom: 20px;">${info.d}</p>
                        
                        <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
                            <p style="margin:8px 0;">⏱️ <b>Duración del trayecto:</b> ${info.t}</p>
                            <p style="margin:8px 0;">📝 <b>Requisitos obligatorios:</b> ${info.r}</p>
                            <p style="margin:8px 0;">💰 <b>Costo académico:</b> <span style="color:#25D366; font-weight:bold;">Completamente Gratuito</span></p>
                        </div>

                        <button onclick="agregar('${nombreCurso}', 'img/${info.i}')" class="btn-add-detalle">✚ SELECCIONAR ESTE CURSO</button>
                    </div>
                </div>
            `;
        }

        function agregar(n, img) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if(!cart.find(x => x.nombre.trim().toLowerCase() === n.trim().toLowerCase())) {
                cart.push({nombre: n.trim(), imagen: img});
                localStorage.setItem('cart', JSON.stringify(cart));
                alert("🚀 ¡Excelente elección! Curso añadido a tu inscripción.");
                window.location.href = "cursos.html";
            } else {
                alert("⚠️ Este curso ya se encuentra dentro de tus opciones seleccionadas.");
            }
        }
        
        document.addEventListener('DOMContentLoaded', cargar);
    </script>
</body>
</html>
