<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Selección | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at bottom left, rgba(0, 210, 255, 0.1), transparent);
            min-height: 100vh;
            margin: 0;
        }

        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .cart-container { max-width: 800px; margin: 40px auto; padding: 20px; }

        .cart-item {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .cart-item img {
            width: 90px; height: 65px; object-fit: cover; border-radius: 10px;
            border: 1px solid var(--azul-electrico);
        }

        .btn-eliminar {
            background: #ef4444; color: white; border: none; padding: 8px 16px;
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-eliminar:hover { background: #dc2626; transform: scale(1.05); }

        .btn-action {
            padding: 15px 30px; border-radius: 12px; font-weight: bold;
            cursor: pointer; text-decoration: none; display: inline-block; transition: 0.3s;
        }
        .btn-confirm { background: var(--naranja-neon); color: white; border: none; }
        .btn-confirm:hover { background: #e65c00; transform: translateY(-2px); }
    </style>
</head>
<body>

    <header>
        <a href="cursos.html" style="color: var(--azul-electrico); text-decoration: none; font-weight: bold;">⬅ Volver al Catálogo</a>
        <h2 style="margin:0; font-size:1.4rem;">Mis Cursos Seleccionados</h2>
        <div></div>
    </header>

    <div class="cart-container">
        <div id="cart-items-container"></div>
        
        <div id="cart-actions" style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center;">
            <button onclick="vaciarTodo()" style="background:transparent; color:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.2); padding:10px 20px; border-radius:10px; cursor:pointer;">Vaciar Lista</button>
            <a href="contacto.html" class="btn-action btn-confirm">CONTINUAR A INSCRIPCIÓN 🚀</a>
        </div>
    </div>

    <script>
        function renderCarrito() {
            const contenedor = document.getElementById('cart-items-container');
            const acciones = document.getElementById('cart-actions');
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];

            if (carrito.length === 0) {
                contenedor.innerHTML = `
                    <div style="text-align:center; padding:60px; background:var(--glass); border-radius:30px; border:1px dashed rgba(255,255,255,0.2);">
                        <h2 style="color:var(--azul-electrico)">No tienes cursos seleccionados</h2>
                        <p style="color:rgba(255,255,255,0.6);">Regresa al catálogo y añade las especialidades en las que deseas formarte este año.</p>
                        <a href="cursos.html" class="btn-action btn-confirm" style="margin-top:20px;">Ver Catálogo de Cursos</a>
                    </div>`;
                acciones.style.display = 'none';
                return;
            }

            acciones.style.display = 'flex';
            contenedor.innerHTML = carrito.map((item, index) => `
                <div class="cart-item">
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <img src="${item.imagen}" onerror="this.src='img/logo.png'">
                        <h3 style="margin:0; font-size:1.2rem; color:var(--azul-electrico);">${item.nombre}</h3>
                    </div>
                    <button class="btn-eliminar" onclick="eliminarCurso(${index})">QUITAR</button>
                </div>
            `).join('');
        }

        function eliminarCurso(index) {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            carrito.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(carrito));
            renderCarrito();
        }

        function vaciarTodo() {
            if(confirm("¿Estás seguro de que deseas limpiar tu selección?")) {
                localStorage.setItem('cart', '[]');
                renderCarrito();
            }
        }

        document.addEventListener('DOMContentLoaded', renderCarrito);
    </script>
</body>
</html>
