<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista de Interés | BotEduCarmen</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            /* Variables de diseño idénticas a index.html */
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --glass: rgba(255, 255, 255, 0.08);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.4);
        }

        body { 
            background-color: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }

        nav { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 20px; width: 100%; box-sizing: border-box; }
        
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: 0.3s; font-size: 0.95rem; }
        .nav-links a:hover { color: var(--azul-electrico); }

        .btn-cart-nav {
            background: var(--azul-electrico);
            border: 1px solid var(--azul-electrico);
            padding: 8px 16px;
            border-radius: 50px;
            color: var(--azul-primario) !important;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        /* 🟢 BOTÓN DE WHATSAPP SUPERIOR INTEGRADO EN EL MENÚ */
        .btn-header-whatsapp {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #25D366;
            color: white !important;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
            transition: 0.3s;
        }
        .btn-header-whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        /* ESTRUCTURA DE LA LISTA DE INTERÉS */
        .cart-container {
            max-width: 800px;
            width: 100%;
            margin: 40px auto 60px;
            padding: 0 20px;
            box-sizing: border-box;
            flex: 1;
        }

        .cart-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--sombra-futurista);
            backdrop-filter: blur(10px);
        }

        .cart-title {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 20px;
        }

        .cart-item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cart-item-info img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cart-item-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .btn-eliminar {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-eliminar:hover {
            background: #ff4444;
            color: white;
        }

        .cart-empty {
            text-align: center;
            padding: 40px 0;
            color: rgba(255,255,255,0.5);
            font-size: 1.2rem;
        }

        .btn-enviar-lista {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow));
            color: white;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 6px 0 #b34b00, 0 15px 20px rgba(255, 109, 0, 0.2);
            transition: 0.15s;
            text-transform: uppercase;
        }
        .btn-enviar-lista:hover {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #b34b00, 0 10px 15px rgba(255, 109, 0, 0.3);
        }
        .btn-enviar-lista:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #b34b00;
        }

        /* Botón Subir clásico a la derecha */
        #btn-subir { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: var(--naranja-neon); border: none; border-radius: 50%; color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 99; box-shadow: 0 5px 15px rgba(255,109,0,0.4); }
        #btn-subir:hover { transform: scale(1.1); background: #e65c00; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="header-brand">
                <img src="img/logo.png" onerror="this.src='img/logo.png'">
                <h1 style="margin:0; font-size:1.4rem; letter-spacing:1px; color:white;">CAE <span style="color:var(--azul-electrico)">CARMEN PILAR</span></h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="cursos.html">Catálogo</a>
                <a href="admin.html">Panel</a>
                <a href="carrito.html" class="btn-cart-nav">
                    🛒 Mi Lista (<span id="cart-count">0</span>)
                </a>
                <a href="https://wa.me/584243360158?text=Hola%20Bladimir,%20estoy%20revisando%20mi%20lista%20de%20inter%C3%A9s%20y%20tengo%20algunas%20dudas." 
                   target="_blank" class="btn-header-whatsapp">
                   <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="white" viewBox="0 0 16 16">
                      <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.69-4.98c-.202-.101-1.194-.588-1.378-.654-.184-.066-.317-.099-.45.099-.132.199-.512.654-.627.787-.114.133-.23.149-.43.049-.2-.1-.843-.311-1.607-.994-.594-.53-1.002-1.185-1.119-1.385-.116-.2-.012-.308.087-.407.091-.089.202-.234.302-.35.101-.117.135-.198.203-.331.066-.133.033-.25-.016-.35-.049-.1-.45-1.085-.617-1.485-.162-.395-.327-.341-.45-.347-.116-.006-.25-.006-.384-.006-.134 0-.353.05-.537.25-.184.2-.703.687-.703 1.677 0 .99.72 1.947.82 2.082.102.135 1.417 2.164 3.435 3.033.48.207.854.33 1.146.422.481.153.918.132 1.264.08.384-.057 1.194-.488 1.362-.958.168-.471.168-.875.118-.958-.05-.084-.185-.133-.386-.233z"/>
                   </svg>
                   WhatsApp
                </a>
            </div>
        </nav>
    </header>

    <div class="cart-container">
        <div class="cart-card">
            <h2 class="cart-title">
                <span>📋 Mi Selección de Cursos</span>
                <span id="cart-total-badge" style="font-size: 1.1rem; background: rgba(0,210,255,0.15); color: var(--azul-electrico); padding: 5px 15px; border-radius: 30px;">0 seleccionados</span>
            </h2>
            
            <div id="cart-items-list">
                </div>

            <button class="btn-enviar-lista" onclick="enviarListaPorWhatsApp()">
                🚀 Enviar mi Lista de Interés por WhatsApp
            </button>
        </div>
    </div>

    <button id="btn-subir" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</button>

    <div id="chat-icon" onclick="toggleChat()" style="position:fixed; bottom:30px; left:30px; width:85px; height:85px; cursor:pointer; z-index:5000; animation: pulse 2s infinite;">
        <img src="img/chatbot.png" style="width:100%; height:100%; object-fit:contain; border-radius:50%; filter: drop-shadow(0 0 15px var(--azul-electrico));" onerror="this.style.display='none'; document.getElementById('fb').style.display='flex';">
        <div id="fb" style="display:none; width:100%; height:100%; background:var(--azul-primario); border-radius:50%; align-items:center; justify-content:center; color:white; font-size:40px; border:3px solid var(--azul-electrico);">🤖</div>
    </div>

    <div id="chat-window" style="position:fixed; bottom:130px; left:30px; width:380px; height:550px; background:white; border-radius:30px; box-shadow: 0 25px 70px rgba(0,0,0,0.4); z-index:5000; display:none; flex-direction:column; overflow:hidden; border:2px solid var(--azul-primario); color: #1e293b;">
        <div style="background:var(--azul-primario); color:white; padding:25px; text-align:center; font-weight:800; font-size:1.3rem;">
            🤖 AI ASISTENTE 2026
        </div>
        <div id="chat-messages" style="flex:1; padding:25px; overflow-y:auto; background:#f1f5f9; display:flex; flex-direction:column; gap:15px; font-size: 0.95rem;">
            <div style="background:white; padding:15px; border-radius:20px; align-self:flex-start; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--azul-electrico);">
                ¡Hola Bladimir! Estamos operando en tiempo real desde la sección de Interés. ¿Tienes dudas sobre tu inscripción?
            </div>
        </div>
        <div style="padding:20px; background:white; display:flex; gap:10px;">
            <input type="text" id="user-input" placeholder="Pregunta algo..." style="flex:1; padding:15px; border:2px solid #e2e8f0; border-radius:20px; outline:none; background: white; color: #1e293b;" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="background:var(--azul-primario); color:var(--azul-electrico); border:none; width:55px; height:55px; border-radius:20px; cursor:pointer; font-size:1.5rem; display:flex; align-items:center; justify-content:center;">➤</button>
        </div>
    </div>

    <script>
        function cargarContenidoCarrito() {
            const listaContenedor = document.getElementById('cart-items-list');
            const carrito = JSON.parse(localStorage.getItem('cart')) || [];
            
            actualizarContadorUI();

            if (carrito.length === 0) {
                listaContenedor.innerHTML = `<div class="cart-empty">🚫 No has añadido ninguna especialidad formativa todavía. Ve al catálogo y selecciona tus preferidas.</div>`;
                document.getElementById('cart-total-badge').textContent = "0 seleccionados";
                return;
            }

            document.getElementById('cart-total-badge').textContent = `${carrito.length} seleccionado${carrito.length > 1 ? 's' : ''}`;

            listaContenedor.innerHTML = carrito.map((item, index) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <img src="${item.imagen}" onerror="this.onerror=null; this.src='img/logo.png';">
                        <div class="cart-item-name">${item.nombre}</div>
                    </div>
                    <button class="btn-eliminar" onclick="eliminarDelCarrito(${index})">Quitar</button>
                </div>
            `).join('');
        }

        function eliminarDelCarrito(index) {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            carrito.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(carrito));
            cargarContenidoCarrito();
        }

        function actualizarContadorUI() {
            const carrito = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cart-count');
            if(badge) badge.textContent = carrito.length;
        }

        function enviarListaPorWhatsApp() {
            const carrito = JSON.parse(localStorage.getItem('cart')) || [];
            if (carrito.length === 0) {
                alert("⚠️ Tu lista está vacía. Añade al menos un curso desde el catálogo primero.");
                return;
            }

            let mensaje = "Hola Bladimir, esta es mi lista de interés para las inscripciones de BotEduCarmen:\n\n";
            carrito.forEach((item, index) => {
                mensaje += `${index + 1}. ✅ *${item.nombre}*\n`;
            });
            mensaje += "\nQuiero formalizar los requisitos para empezar las clases.";

            const urlWhatsApp = `https://wa.me/584243360158?text=${encodeURIComponent(mensaje)}`;
            window.open(urlWhatsApp, '_blank');
        }

        /* 🤖 SCRIPT DEL CHAT TOTALMENTE OPERATIVO Y CORREGIDO */
        function toggleChat() {
            const w = document.getElementById('chat-window');
            w.style.display = (w.style.display === 'none' || w.style.display === '') ? 'flex' : 'none';
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-messages');
            const text = input.value.trim();
            if(!text) return;

            // Inserta mensaje del usuario de forma inmediata
            box.innerHTML += `<div style="background:var(--azul-primario); color:white; padding:15px; border-radius:20px; align-self:flex-end; max-width:80%; word-break: break-word;">${text}</div>`;
            box.scrollTop = box.scrollHeight; 
            
            // Respuesta automática e inteligente simulada
            setTimeout(() => {
                box.innerHTML += `<div style="background:white; padding:15px; border-radius:20px; align-self:flex-start; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--azul-electrico);">Entendido. Recuerda enviar tu lista definitiva haciendo click en el botón naranja de arriba para procesar los cupos.</div>`;
                box.scrollTop = box.scrollHeight; 
            }, 700);
            
            input.value = "";
        }

        window.addEventListener('scroll', () => {
            const btnSubir = document.getElementById('btn-subir');
            if (window.scrollY > 300) {
                btnSubir.style.opacity = '1';
                btnSubir.style.pointerEvents = 'auto';
            } else {
                btnSubir.style.opacity = '0';
                btnSubir.style.pointerEvents = 'none';
            }
        });

        document.addEventListener('DOMContentLoaded', cargarContenidoCarrito);
    </script>

    <style>
        /* Animación parpadeante idéntica a index.html */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 210, 255, 0); }
            100% { transform: scale(1); }
        }
    </style>
</body>
</html>
