<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Selección | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
            --verde-whatsapp: #25d366;
            --borde-cristal: rgba(0, 210, 255, 0.15);
        }

        body { 
            background: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at bottom left, rgba(0, 210, 255, 0.1), transparent);
            min-height: 100vh;
        }

        header {
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .cart-container { max-width: 800px; margin: 40px auto; padding: 20px; }

        .cart-item {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            margin-bottom: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 15px;
            transition: 0.3s;
        }

        .cart-item:hover { border-color: var(--azul-electrico); }

        .cart-item img { width: 100px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--azul-electrico); }

        .btn-eliminar { background: #ff4444; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 8px; font-weight: bold; }

        .btn-finalizar {
            display: block;
            background: linear-gradient(135deg, var(--naranja-neon), #ff9100);
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 30px;
            box-shadow: 0 10px 20px rgba(255, 109, 0, 0.3);
        }

        /* ELEMENTOS FLOTANTES DE WHATSAPP Y CHATBOT (ABAJO A LA DERECHA) */
        #whatsapp-btn { 
            position: fixed; bottom: 130px; right: 30px; width: 70px; height: 70px; 
            background: var(--verde-whatsapp); border-radius: 50%; z-index: 4000; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            box-shadow: 0 8px 25px rgba(37,211,102,0.4); transition: transform 0.2s ease;
        }
        #whatsapp-btn:hover { transform: scale(1.05); }

        #chat-icon { 
            position: fixed; bottom: 30px; right: 30px; width: 75px; height: 75px; 
            cursor: pointer; z-index: 4000; animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        #chat-window {
            position: fixed; bottom: 120px; right: 30px; width: 380px; height: 520px; 
            background: #0f172a; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); z-index: 5000; 
            display: none; flex-direction: column; overflow: hidden; 
            border: 2px solid var(--azul-electrico);
        }
    </style>
</head>
<body>
    <header>
        <a href="cursos.html" style="color: var(--azul-electrico); text-decoration: none; font-weight: bold;">⬅ VOLVER AL CATÁLOGO</a>
        <div style="font-weight: bold; letter-spacing: 2px;">MI LISTA DE INTERÉS</div>
    </header>

    <main class="cart-container">
        <div id="lista-carrito"></div>

        <div id="acciones-carrito" style="display:none;">
            <a href="contacto.html" class="btn-finalizar">CONTINUAR A DATOS PERSONALES ➡</a>
            <button onclick="vaciarTodo()" style="background:none; border:none; color:rgba(255,255,255,0.5); width:100%; margin-top:20px; cursor:pointer;">Vaciar lista completa</button>
        </div>
    </main>

    <!-- BOTÓN DE WHATSAPP FLOTANTE -->
    <div id="whatsapp-btn" onclick="window.open('https://wa.me/584243360158', '_blank')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width:40px;" alt="WhatsApp">
    </div>
    
    <!-- ICONO DE APERTURA DEL CHATBOT -->
    <div id="chat-icon" onclick="toggleChat()">
        <img src="img/chatbot.png" style="width:100%; height:100%; border-radius:50%; box-shadow: 0 4px 15px rgba(0,210,255,0.4);" alt="Chatbot" onerror="this.style.display='none'; document.getElementById('fb').style.display='flex';">
        <div id="fb" style="display:none; width:100%; height:100%; background:rgba(16,29,56,0.9); border-radius:50%; align-items:center; justify-content:center; color:var(--azul-electrico); font-size:32px; border:2px solid var(--azul-electrico);">🤖</div>
    </div>

    <!-- VENTANA DEL CHATBOT -->
    <div id="chat-window">
        <div style="background:rgba(5, 12, 24, 0.95); color:var(--azul-electrico); padding:22px; text-align:center; font-weight:800; font-size:1.2rem; letter-spacing: 0.5px; border-bottom: 1px solid var(--borde-cristal);">
            🤖 BOTEDUCARMEN 2026
        </div>
        <div id="chat-messages" style="flex:1; padding:20px; overflow-y:auto; background:#0b1329; display:flex; flex-direction:column; gap:12px;"></div>
        <div style="padding:15px; background:#0f172a; display:flex; gap:10px; border-top: 1px solid var(--borde-cristal);">
            <input type="text" id="user-input" placeholder="Pregunta algo al asistente..." style="flex:1; padding:14px; border:1px solid var(--borde-cristal); background:rgba(10,25,47,0.7); color:white; border-radius:16px; outline:none; font-family: inherit;">
            <button onclick="enviarMensajeChat()" style="background:var(--azul-electrico); color:#0a192f; border:none; width:50px; height:50px; border-radius:16px; cursor:pointer; font-weight:bold; font-size:1.2rem; display:flex; align-items:center; justify-content:center;">➤</button>
        </div>
    </div>

    <!-- LIBRERÍAS DE FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <!-- LÓGICA DEL CHATBOT INTEGRADA -->
    <script src="chatbot.js"></script>

    <script>
        function renderCarrito() {
            const contenedor = document.getElementById('lista-carrito');
            const acciones = document.getElementById('acciones-carrito');
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];

            if(carrito.length === 0) {
                contenedor.innerHTML = `<div style="text-align:center; padding:50px;">
                    <h2 style="color:var(--azul-electrico)">Tu lista está vacía</h2>
                    <p>Parece que aún no has seleccionado cursos para este 2026.</p>
                </div>`;
                acciones.style.display = 'none';
                return;
            }

            acciones.style.display = 'block';
            contenedor.innerHTML = carrito.map((item, index) => `
                <div class="cart-item">
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <img src="${item.imagen}" onerror="this.src='img/logo.png'">
                        <h3>${item.nombre}</h3>
                    </div>
                    <button class="btn-eliminar" onclick="eliminarCurso(${index})">QUITAR</button>
                </div>
            `).join('');
        }

        function eliminarCurso(index) {
            let carrito = JSON.parse(localStorage.getItem('cart'));
            carrito.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(carrito));
            renderCarrito();
        }

        function vaciarTodo() {
            if(confirm("¿Borrar toda la selección?")) {
                localStorage.setItem('cart', '[]');
                renderCarrito();
            }
        }
        document.addEventListener('DOMContentLoaded', renderCarrito);
    </script>
</body>
</html>
