<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Selección | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at bottom left, rgba(0, 210, 255, 0.1), transparent);
            min-height: 100vh;
        }

        header {
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .cart-container { max-width: 800px; margin: 40px auto; padding: 20px; }

        .cart-item {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-item img { width: 70px; height: 50px; object-fit: cover; border-radius: 8px; }
        .btn-eliminar { background: #ff3333; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h2>🛒 Tu Lista de Cursos</h2>
        <a href="cursos.html" style="color: var(--azul-electrico); text-decoration: none; font-weight: bold;">← Seguir viendo</a>
    </header>

    <div class="cart-container">
        <div id="contenedor-items"></div>

        <div id="acciones-carrito" style="margin-top: 30px; text-align: right; display: none;">
            <button onclick="vaciarTodo()" style="background: none; border: 1px solid #ff3333; color: #ff3333; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-right: 10px;">Vaciar Selección</button>
            <a href="contacto.html" style="background: var(--azul-electrico); color: var(--azul-primario); padding: 12px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; display: inline-block;">Continuar al Registro →</a>
        </div>
    </div>

    <div id="chat-window" style="display:none; position:fixed; bottom:90px; right:30px; width:350px; height:450px; background:white; z-index:99999; flex-direction:column; border-radius:15px; box-shadow:0 5px 25px rgba(0,0,0,0.3); overflow:hidden; font-family:'Segoe UI', sans-serif;">
        <div style="background:#0a192f; color:#00d2ff; padding:15px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
            <span>🤖 Asistente CAE</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">✖</button>
        </div>
        <div id="chat-messages" style="flex:1; padding:15px; overflow-y:auto; background:#f8fafc; display:flex; flex-direction:column; gap:10px;">
            <div style="text-align:left;">
                <div style="background:white; color:#1e293b; padding:12px 18px; border-radius:20px 20px 20px 0; display:inline-block; font-size:0.95rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #00d2ff;">
                    Estás en tu lista de preselección. Aquí puedes remover talleres o avanzar para rellenar tus datos de inscripción. ¿Tienes alguna duda?
                </div>
            </div>
        </div>
        <div style="padding:10px; border-top:1px solid #e2e8f0; display:flex; background:white; gap:5px;">
            <input type="text" id="user-input" placeholder="Pregúntame algo..." style="flex:1; padding:10px; border:1px solid #cbd5e1; border-radius:20px; outline:none; color:#333;">
            <button onclick="sendMessage()" style="background:#0a192f; color:#00d2ff; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center;">➤</button>
        </div>
    </div>

    <button onclick="toggleChat()" style="position:fixed; bottom:20px; right:30px; width:60px; height:60px; background:#0a192f; color:#00d2ff; border:2px solid #00d2ff; border-radius:50%; font-size:1.8rem; cursor:pointer; box-shadow:0 4px 15px rgba(0,210,255,0.4); z-index:99999; display:flex; align-items:center; justify-content:center;">
        🤖
    </button>

    <script src="chatbot.js"></script>
    <script>
        function renderCarrito() {
            const contenedor = document.getElementById('contenedor-items');
            const acciones = document.getElementById('acciones-carrito');
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];

            if(carrito.length === 0) {
                contenedor.innerHTML = `<div style="text-align:center; padding:50px;">
                    <h2 style="color:var(--azul-electrico)">Tu lista está vacía</h2>
                    <p>Parece que aún no has seleccionado cursos para este 2026.</p>
                </div>`;
                acciones.style.display = 'none';
                return;
            }

            acciones.style.display = 'block';
            contenedor.innerHTML = carrito.map((item, index) => `
                <div class="cart-item">
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <img src="${item.imagen}" onerror="this.src='img/logo.png'">
                        <h3>${item.nombre}</h3>
                    </div>
                    <button class="btn-eliminar" onclick="eliminarCurso(${index})">QUITAR</button>
                </div>
            `).join('');
        }

        function eliminarCurso(index) {
            let carrito = JSON.parse(localStorage.getItem('cart'));
            carrito.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(carrito));
            renderCarrito();
        }

        function vaciarTodo() {
            if(confirm("¿Borrar toda la selección?")) {
                localStorage.setItem('cart', '[]');
                renderCarrito();
            }
        }
        document.addEventListener('DOMContentLoaded', renderCarrito);
    </script>
</body>
</html>
