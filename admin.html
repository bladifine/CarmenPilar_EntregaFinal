    <title>Admin Console | BotEduCarmen</title>
    <style>
        :root { 
            --bg: #050a14; 
            --card: #0a192f; 
            --accent: #00d2ff; 
            --error: #ff4d4d;
            --error-hover: #ff3333;
            --excel: #107c41;
            --excel-hover: #0e6c38;

            background: var(--bg); 
            color: white;

            box-sizing: border-box;
            display: flex;
            flex-direction: column;
