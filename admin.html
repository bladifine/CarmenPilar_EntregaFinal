<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console | BotEduCarmen</title>
    <style>
        :root { 
            --bg: #050a14; 
            --card: #0a192f; 
            --accent: #00d2ff; 
            --error: #ff4d4d;
            --error-hover: #ff3333;
        }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
        }
        
        /* BARRA LATERAL IZQUIERDA */
        .sidebar { 
            background: var(--card); 
            width: 250px; 
            height: 100vh; 
            position: fixed; 
            border-right: 1px solid rgba(0,210,255,0.2); 
            padding: 20px; 
            box-sizing: border-box;
        }

        /* CONTENIDO PRINCIPAL */
        .main-content { 
            margin-left: 250px; 
            padding: 40px; 
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        /* NUEVA BARRA SUPERIOR PARA ALINEAR EL BOTÓN A LA DERECHA */
        .admin-top-bar {
            display: flex;
            justify-content: flex-end; /* Empuja el contenido totalmente a la derecha */
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* BOTÓN SALIR REFORMADO */
        .btn-salir {
            background: var(--error);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-salir:hover {
            background: var(--error-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 77, 77, 0.4);
        }

        .btn-salir:active {
            transform: translateY(0);
        }

        /* COMPONENTES DE LA TABLA Y ESTADÍSTICAS */
        .glass-table { 
            width: 100%; 
            border-collapse: collapse; 
            background: var(--card); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .glass-table th { background: rgba(0,210,255,0.1); color: var(--accent); padding: 15px; text-align: left; }
        .glass-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .stat-mini { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 15px; 
            border-left: 4px solid var(--accent); 
            margin-bottom: 30px;
            display: inline-block;
            min-width: 200px;
        }
        .stat-mini h3 { margin: 0; font-size: 0.85rem; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .stat-mini p { margin: 10px 0 0; font-size: 2rem; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 30px;">
            <img src="img/logo.png" alt="Logo" style="height: 40px;" onerror="this.style.display='none'">
            <h2 style="font-size: 1.2rem; margin: 0; color: var(--accent);">BotEduCarmen</h2>
        </div>
        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.4);">Panel de Control Interno 2026</p>
    </div>

    <div class="main-content">
        
        <div class="admin-top-bar">
            <button onclick="cerrar()" class="btn-salir">Salir 🚪</button>
        </div>

        <div class="stat-mini">
            <h3>Estudiantes Inscritos</h3>
            <p id="count">0</p>
        </div>

        <h2 style="margin-bottom: 20px; font-size: 1.8rem;">Listado de Postulados</h2>

        <table class="glass-table">
            <thead>
                <tr>
                    <th>ESTUDIANTE</th>
                    <th>CÉDULA</th>
                    <th>CURSOS</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id=\"cuerpo\"></tbody>
            <tbody id="cuerpo"></tbody>
        </table>
    </div>

    <script>
        function cerrar() {
            sessionStorage.removeItem('admin_logueado');
            window.location.href = "index.html";
        }

        function render() {
            const bd = JSON.parse(localStorage.getItem('base_datos_inscritos')) || [];
            document.getElementById('count').innerText = bd.length;
            document.getElementById('cuerpo').innerHTML = bd.map(i => `
                <tr>
                    <td><b>${i.nombre}</b></td>
                    <td>${i.cedula}</td>
                    <td style="color:var(--accent)">${i.cursos}</td>
                    <td><button onclick="borrar('${i.id}')" style="cursor:pointer; background:none; border:none; font-size:1.2rem;">🗑️</button></td>
                </tr>
            `).join('');
        }

        function borrar(id) {
            if(confirm("¿Estás seguro de que deseas eliminar este registro de inscripción?")) {
                let bd = JSON.parse(localStorage.getItem('base_datos_inscritos'));
                bd = bd.filter(x => x.id !== id);
                localStorage.setItem('base_datos_inscritos', JSON.stringify(bd));
                render();
            }
        }
        
        // Ejecución automática al cargar la interfaz
        render();
    </script>
</body>
</html>
