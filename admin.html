<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console | BotEduCarmen</title>
    
    <script>
        // SEGURIDAD: Verificar sesión al cargar
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('admin_autenticado') !== 'true') {
                alert("⚠️ Acceso no autorizado. Debes iniciar sesión primero.");
                window.location.href = "index.html";
            }
        });

        function cerrarSesion() {
            sessionStorage.removeItem('admin_autenticado');
            window.location.href = "index.html";
        }
    </script>

    <style>
        body { background: #050a14; color: white; font-family: sans-serif; padding: 20px; }
        .btn-salir { background: #ff4d4d; color: white; padding: 10px; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Panel de Administración</h1>
    <button class="btn-salir" onclick="cerrarSesion()">Cerrar Sesión</button>
    
    <div id="contenido-admin">
        <p>Bienvenido al sistema protegido.</p>
    </div>

</body>
</html>
