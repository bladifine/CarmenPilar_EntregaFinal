<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Console | BotEduCarmen</title>
    <style>
        :root { --bg: #050a14; --card: #0a192f; --accent: #00d2ff; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        .sidebar { background: var(--card); width: 250px; height: 100vh; position: fixed; border-right: 1px solid rgba(0,210,255,0.2); padding: 20px; }
        .main-content { margin-left: 280px; padding: 40px; }
        
        .glass-table { 
            width: 100%; border-collapse: collapse; background: var(--card); 
            border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); 
        }
        .glass-table th { background: rgba(0,210,255,0.1); color: var(--accent); padding: 15px; text-align: left; }
        .glass-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .stat-mini { background: var(--card); padding: 20px; border-radius: 15px; border-left: 4px solid var(--accent); margin-bottom: 20px; }
        .btn-out { background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <script>
        if (sessionStorage.getItem('admin_logueado') !== 'true') {
            let p = prompt("PASSWORD:");
            if (p === "1234") sessionStorage.setItem('admin_logueado', 'true');
            else window.location.href = "index.html";
        }
    </script>

    <div class="sidebar">
        <h2 style="color:var(--accent)">BotEdu <span style="font-weight:200">Admin</span></h2>
        <p style="font-size:0.8rem; color:gray;">SISTEMA OPERATIVO V.2.6</p>
        <hr style="opacity:0.1; margin:20px 0;">
        <button onclick="cerrar()" class="btn-out">LOGOUT SYSTEM</button>
    </div>

    <div class="main-content">
        <div class="stat-mini">
            <small>ESTUDIANTES TOTALES</small>
            <h2 id="count" style="margin:0">0</h2>
        </div>

        <table class="glass-table">
            <thead>
                <tr>
                    <th>ESTUDIANTE</th>
                    <th>CÉDULA</th>
                    <th>CURSOS</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="cuerpo"></tbody>
        </table>
    </div>

    <script>
        function cerrar() {
            sessionStorage.removeItem('admin_logueado');
            window.location.href = "index.html";
        }

        function render() {
            const bd = JSON.parse(localStorage.getItem('base_datos_inscritos')) || [];
            document.getElementById('count').innerText = bd.length;
            document.getElementById('cuerpo').innerHTML = bd.map(i => `
                <tr>
                    <td><b>${i.nombre}</b></td>
                    <td>${i.cedula}</td>
                    <td style="color:var(--accent)">${i.cursos}</td>
                    <td><button onclick="borrar('${i.id}')" style="cursor:pointer; background:none; border:none;">🗑️</button></td>
                </tr>
            `).join('');
        }

        function borrar(id) {
            if(confirm("¿Eliminar?")) {
                let bd = JSON.parse(localStorage.getItem('base_datos_inscritos'));
                bd = bd.filter(x => x.id !== id);
                localStorage.setItem('base_datos_inscritos', JSON.stringify(bd));
                render();
            }
        }
        render();
    </script>
</body>
</html>
