<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Selección | CAE</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .cart-container { max-width: 800px; margin: 50px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .cart-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; align-items: center; }
        .btn-remove { color: #ff4444; cursor: pointer; font-weight: bold; border: none; background: none; }
        .btn-final { background: #0a192f; color: #00d2ff; padding: 15px 30px; border-radius: 10px; display: block; text-align: center; margin-top: 20px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="cart-container">
        <h1>Cursos Seleccionados</h1>
        <div id="lista-carrito">
            <!-- Se llena dinámicamente[cite: 4] -->
        </div>
        <div id="total-info" style="margin-top: 20px; font-weight: bold;"></div>
        <a href="contacto.html" class="btn-final">PROCEDER AL REGISTRO FINAL ➡</a>
        <a href="cursos.html" style="display:block; text-align:center; margin-top:15px; color:#667;">+ Agregar más cursos</a>
    </div>

    <script>
        function cargarCarrito() {
            const container = document.getElementById('lista-carrito');
            const info = document.getElementById('total-info');
            let cart = JSON.parse(localStorage.getItem('cart')) || [];[cite: 4]

            if (cart.length === 0) {
                container.innerHTML = "<p>No has seleccionado ningún curso todavía.</p>";
                info.innerText = "";
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span><strong>${item.nombre}</strong></span>
                    <button class="btn-remove" onclick="removeItem(${index})">Quitar</button>
                </div>
            `).join('');

            info.innerText = `Total cursos seleccionados: ${cart.length} (Inscripción Gratuita)[cite: 9]`;
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            cargarCarrito();
        }

        document.addEventListener('DOMContentLoaded', cargarCarrito);
    </script>
    <script src="chatbot.js"></script>
</body>
</html>
