<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos 2026 | CAE Carmen Pilar</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --whatsapp-green: #25D366;
            --glass: rgba(255, 255, 255, 0.08);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.4);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--azul-primario); 
            color: white;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.15), transparent);
        }

        /* BARRA SUPERIOR RESTAURADA */
        .top-bar {
            background: var(--azul-primario);
            color: var(--azul-electrico);
            padding: 10px 0;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 600;
            border-bottom: 2px solid var(--azul-electrico);
        }
        .top-bar-content {
            display: flex;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 25px;
        }

        /* NAVEGACIÓN RECOBRADA */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        /* SISTEMA DE BOTONES 3D DE TU INDEX RECOBRADO */
        .btn-2026 {
            color: white;
            padding: 10px 25px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            border: none;
            transition: all 0.15s ease-in-out;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            text-align: center;
        }

        .btn-orange {
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow));
            box-shadow: 0 6px 0 #b34b00, 0 10px 15px rgba(255, 109, 0, 0.2);
        }
        .btn-green {
            background: linear-gradient(135deg, var(--whatsapp-green), #128C7E);
            box-shadow: 0 6px 0 #075E54, 0 10px 15px rgba(37, 211, 102, 0.2);
        }
        .btn-blue {
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff);
            box-shadow: 0 6px 0 #0055b3, 0 10px 15px rgba(0, 210, 255, 0.2);
        }

        .btn-2026:hover { transform: translateY(2px); }
        .btn-2026:active { transform: translateY(6px); box-shadow: 0 0 0 transparent !important; }

        /* CATÁLOGO GRID */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, border-color 0.3s;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--azul-electrico);
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.2);
        }

        .card-img-container { width: 100%; height: 200px; overflow: hidden; background: #0f2b48; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }

        .badge {
            background: rgba(0, 210, 255, 0.1); color: var(--azul-electrico);
            padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; width: fit-content; font-weight: bold;
            text-transform: uppercase;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff);
            color: var(--azul-primario); border: none; padding: 12px; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; margin-top: auto;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-add:hover { filter: brightness(1.2); }

        .btn-details {
            display: block; text-align: center; color: var(--azul-electrico); text-decoration: none;
            font-size: 0.85rem; font-weight: bold; margin-top: 15px; transition: color 0.2s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-details:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-content">
            <span> SISTEMA ACTUALIZADO 2026</span>
            <span> LA VICTORIA - ARAGUA</span>
            <span> CONTACTO DIRECTO: 0424-33.60.158</span>
        </div>
    </div>

    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; max-width: 1200px; margin: 0 auto; padding: 0 10px;">
            <div style="display:flex; align-items:center; gap:15px;">
                <img src="img/logo.png" alt="Logo" style="height:60px;">
                <h2 style="margin:0; color:var(--azul-primario); font-size:1.8rem;">BotEduCarmen</h2>
            </div>
            <nav style="display: flex; gap: 15px; align-items: center;">
                <a href="index.html" class="btn-2026 btn-orange">INICIO</a>
                <a href="https://wa.me/584243360158" target="_blank" class="btn-2026 btn-green">WHATSAPP</a>
                <a href="carrito.html" class="btn-2026 btn-blue">LISTA (<span id="cart-count">0</span>)</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 style="text-align: center; margin-top: 40px; font-size: 2.5rem; letter-spacing: 1px;">
            Especialidades Formativas <span style="color: var(--azul-electrico);">2026</span>
        </h1>
        <div class="cursos-grid" id="cursos-grid"></div>
    </div>

<script>
    // LOS 25 CURSOS REALES DE TU CARPETA IMG SIN NINGÚN ERROR
    const CURSOS = [
        { nombre: "Barbería", img: "barberia.jpg", cat: "Estética" },
        { nombre: "Cocina Nacional", img: "cocina_nacional.jpg", cat: "Gastronomía" },
        { nombre: "Cosmetología", img: "cosmetologia.jpg", cat: "Estética" },
        { nombre: "Dibujo Artístico", img: "dibujo_artistico.jpg", cat: "Arte" },
        { nombre: "Dulces Criollos", img: "dulces_criollos.jpg", cat: "Gastronomía" },
        { nombre: "Electricidad", img: "electricidad.jpg", cat: "Técnica" },
        { nombre: "Electrodomésticos", img: "electrodomesticos.jpg", cat: "Técnica" },
        { nombre: "Estética Avanzada", img: "estetica_avanzada.jpg", cat: "Estética" },
        { nombre: "Estética de Uñas", img: "estetica_de_unas.jpg", cat: "Estética" },
        { nombre: "Lencería", img: "lenceria.jpg", cat: "Textil" },
        { nombre: "Manicure y Pedicure", img: "manicure_pedicure.jpg", cat: "Estética" },
        { nombre: "Manualidades", img: "manualidades.jpg", cat: "Arte" },
        { nombre: "Masaje", img: "masaje.jpg", cat: "Estética" },
        { nombre: "Masoterapia", img: "masoterapia.jpg", cat: "Estética" },
        { nombre: "Modistería", img: "modisteria.jpg", cat: "Textil" },
        { nombre: "Panadería", img: "panaderia.jpg", cat: "Gastronomía" },
        { nombre: "Peluquería", img: "peluqueria.jpg", cat: "Estética" },
        { nombre: "Pintura Artística", img: "pintura_artistica.jpg", cat: "Arte" },
        { nombre: "Pintura Avanzada", img: "pintura_avanzada.jpg", cat: "Arte" },
        { nombre: "Puntillismo Avanzado", img: "puntillismo_avanzado.jpg", cat: "Arte" },
        { nombre: "Puntillismo Básico", img: "puntillismo_basico.jpg", cat: "Arte" },
        { nombre: "Repostería", img: "reposteria.jpg", cat: "Gastronomía" },
        { nombre: "Repostería y Pastelería", img: "reposteria_y_pasteleria.jpg", cat: "Gastronomía" },
        { nombre: "Ropa Íntima", img: "ropa_intima.jpg", cat: "Textil" },
        { nombre: "Rostros", img: "rostros.jpg", cat: "Arte" },
        { nombre: "Tejer", img: "tejer.jpg", cat: "Textil" }
    ];

    function renderCursos() {
        const grid = document.getElementById('cursos-grid');
        grid.innerHTML = CURSOS.map(curso => `
            <div class="card">
                <div class="card-img-container">
                    <img src="img/${curso.img}" alt="${curso.nombre}" onerror="this.src='img/logo.png'">
                </div>
                <div class="card-content">
                    <span class="badge">${curso.cat}</span>
                    <h3 style="margin: 15px 0 10px 0; font-size: 1.2rem; color: #fff;">${curso.nombre}</h3>
                    <button class="btn-add" onclick="agregarAlCarrito('${curso.nombre}', 'img/${curso.img}')">
                        SELECCIONAR CURSO
                    </button>
                    <a href="detalle-curso.html?curso=${encodeURIComponent(curso.nombre)}" class="btn-details">🔎 VER DETALLES</a>
                </div>
            </div>
        `).join('');
        actualizarContador();
    }

    function agregarAlCarrito(nombre, imagen) {
        let carrito = JSON.parse(localStorage.getItem('cart')) || [];
        if (carrito.some(c => c.nombre === nombre)) {
            alert("Este curso ya está en tu lista.");
            return;
        }
        carrito.push({ nombre, imagen });
        localStorage.setItem('cart', JSON.stringify(carrito));
        actualizarContador();
        alert("¡Añadido! Puedes verlo en 'Lista'.");
    }

    function actualizarContador() {
        let carrito = JSON.parse(localStorage.getItem('cart')) || [];
        const countEl = document.getElementById('cart-count');
        if (countEl) countEl.innerText = carrito.length;
    }

    document.addEventListener('DOMContentLoaded', renderCursos);
</script>

</body>
</html>
