<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
            --verde-whatsapp: #25d366;
        }

        body { background-color: var(--azul-p); color: white; font-family: 'Inter', sans-serif; margin: 0; }

        header {
            background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(15px);
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }

        /* Botón Inicio */
        .btn-inicio { color: white; text-decoration: none; font-weight: bold; padding: 8px 15px; border: 1px solid white; border-radius: 8px; transition: 0.3s; }
        .btn-inicio:hover { background: white; color: var(--azul-p); }

        .search-container { text-align: center; margin: 30px 0; }
        #buscador { width: 80%; max-width: 500px; padding: 15px; border-radius: 30px; border: 1px solid var(--electrico); background: var(--glass); color: white; outline: none; }

        .cursos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .curso-card { background: var(--glass); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; text-align: center; }
        .curso-img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-accion { border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-seleccionar { background: var(--naranja); color: white; }
        .btn-quitar { background: #444; color: #ccc; }

        /* FLOTANTES DERECHA */
        #whatsapp-btn { position: fixed; bottom: 120px; right: 30px; width: 65px; height: 65px; background: var(--verde-whatsapp); border-radius: 50%; z-index: 5000; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px rgba(37,211,102,0.3); }
        #chat-icon { position: fixed; bottom: 30px; right: 30px; width: 75px; height: 75px; cursor: pointer; z-index: 5000; }
        #chat-icon img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--electrico); }

        /* BOTÓN IZQUIERDA (SUBIR) */
        #go-top { position: fixed; bottom: 30px; left: 30px; width: 50px; height: 50px; background: var(--electrico); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5000; transition: 0.3s; }
        #go-top:hover { transform: scale(1.1); }

        #cart-float { position: fixed; bottom: 30px; left: 90px; z-index: 2000; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div class="header-brand">
                <img src="img/logo.png" alt="Logo">
                <h1 style="font-size: 1.4rem; margin:0;">BotEduCarmen</h1>
            </div>
            <nav><a href="index.html" class="btn-inicio">INICIO</a></nav>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="buscador" placeholder="🔍 Buscar curso..." onkeyup="filtrar()">
    </div>

    <div id="grid-cursos" class="cursos-grid"></div>

    <div id="cart-float">
        <a href="contacto.html" style="background:white; color:var(--azul-p); padding:10px 20px; border-radius:20px; text-decoration:none; font-weight:bold;">Carrito (<span id="cart-count">0</span>)</a>
    </div>

    <div id="go-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2l-10 10h6v10h8v-10h6z"/></svg>
    </div>

    <div id="whatsapp-btn" onclick="window.open('https://wa.me/584243360158', '_blank')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
    </div>
    <div id="chat-icon" onclick="window.location.href='index.html'">
        <img src="img/chatbot.png" alt="Chat">
    </div>

    <script>
        const CURSOS = [
            {n: "Barbería", i: "barberia.jpg"}, {n: "Estética Avanzada", i: "estetica_avanzada.jpg"},
            {n: "Masaje Corporales", i: "masaje.jpg"}, {n: "Puntillismo Avanzado", i: "puntillismo_avanzado.jpg"},
            {n: "Estética de Uñas", i: "estetica_de_unas.jpg"}, {n: "Masoterapia", i: "masoterapia.jpg"},
            {n: "Puntillismo Básico", i: "puntillismo_basico.jpg"}, {n: "Cosmetología", i: "cosmetologia.jpg"},
            {n: "Modistería", i: "modisteria.jpg"}, {n: "Repostería", i: "reposteria.jpg"},
            {n: "Dibujo Artístico", i: "dibujo_artistico.jpg"}, {n: "Lencería", i: "lenceria.jpg"},
            {n: "Panadería", i: "panaderia.jpg"}, {n: "Pastelería", i: "reposteria_y_pasteleria.jpg"},
            {n: "Dulces Criollos", i: "dulces_criollos.jpg"}, {n: "Peluquería", i: "peluqueria.jpg"},
            {n: "Ropa Íntima", i: "ropa_intima.jpg"}, {n: "Electricidad", i: "electricidad.jpg"},
            {n: "Manicure y Pedicure", i: "manicure_pedicure.jpg"}, {n: "Pintura Artística", i: "pintura_artistica.jpg"},
            {n: "Rostros", i: "rostros.jpg"}, {n: "Electrodomésticos", i: "electrodomesticos.jpg"},
            {n: "Manualidades", i: "manualidades.jpg"}, {n: "Pintura Avanzada", i: "pintura_avanzada.jpg"},
            {n: "Tejido y Crochet", i: "tejer.jpg"}
        ];

        function cargarCursos() {
            const grid = document.getElementById('grid-cursos');
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            grid.innerHTML = CURSOS.map(c => {
                const inCart = cart.find(x => x.nombre === c.n);
                return `
                    <div class="curso-card" data-name="${c.n.toLowerCase()}">
                        <img src="img/${c.i}" class="curso-img">
                        <div style="padding:15px;">
                            <h3>${c.n}</h3>
                            <button class="btn-accion ${inCart?'btn-quitar':'btn-seleccionar'}" onclick="toggle('${c.n}', 'img/${c.i}')">
                                ${inCart?'✖ Quitar':'✚ Seleccionar'}
                            </button>
                        </div>
                    </div>`;
            }).join('');
        }

        function toggle(n, i) {
            let c = JSON.parse(localStorage.getItem('cart')) || [];
            const idx = c.findIndex(x => x.nombre === n);
            idx !== -1 ? c.splice(idx, 1) : c.push({nombre: n, imagen: i});
            localStorage.setItem('cart', JSON.stringify(c));
            cargarCursos();
            document.getElementById('cart-count').innerText = c.length;
            document.getElementById('cart-float').style.display = c.length > 0 ? 'block' : 'none';
        }

        function filtrar() {
            let v = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.curso-card').forEach(x => x.style.display = x.dataset.name.includes(v) ? 'block' : 'none');
        }

        document.addEventListener('DOMContentLoaded', () => { 
            cargarCursos();
            let c = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = c.length;
            document.getElementById('cart-float').style.display = c.length > 0 ? 'block' : 'none';
        });
    </script>
</body>
</html>
