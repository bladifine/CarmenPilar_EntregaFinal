<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --whatsapp-green: #25D366;
            --glass: rgba(255, 255, 255, 0.08);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.4);
        }

        body { 
            background-color: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 2px solid var(--azul-electrico);
            position: sticky; top: 0; z-index: 1000;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto; padding: 0 20px;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }

        .nav-links { display: flex; gap: 15px; align-items: center; }

        /* BLINDAJE DEL BOTÓN INICIO (Estilo Pastilla Estable) */
        .btn-nav-2026 {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            min-width: 110px;
            height: 40px;
            box-sizing: border-box;
        }

        .btn-orange {
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow));
            box-shadow: 0 4px 0 #b34b00;
        }
        .btn-blue {
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff);
            box-shadow: 0 4px 0 #0055b3;
        }

        .btn-nav-2026:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-nav-2026:active { transform: translateY(1px); box-shadow: none; }

        .catalogo-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
            justify-content: space-between; transition: 0.3s; box-shadow: var(--sombra-futurista);
        }
        .card:hover { border-color: var(--azul-electrico); transform: translateY(-5px); }
        .card-img-container { width: 100%; height: 180px; background: #112240; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="header-brand">
                <img src="img/logo.png" onerror="this.src='img/logo.png'">
                <h1 style="margin: 0; font-size: 1.4rem; letter-spacing: 1px;">CAE <span style="color: var(--azul-electrico)">CARMEN PILAR</span></h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="btn-nav-2026 btn-orange">Inicio</a>
                <a href="carrito.html" class="btn-nav-2026 btn-blue">🛒 Lista (<span id="carrito-contador">0</span>)</a>
            </div>
        </nav>
    </header>

    <main class="catalogo-container">
        <div id="cursos-grid" class="cursos-grid"></div>
    </main>

    <script src="script.js"></script>
    <script>
        // Tu lista unificada de especialidades formativas reales
        const MIS_CURSOS = [
            { nombre: "Cocina Nacional", img: "cocina_nacional.jpg", cat: "Gastronomía" },
            { nombre: "Panadería", img: "panaderia.jpg", cat: "Gastronomía" },
            { nombre: "Repostería", img: "reposteria.jpg", cat: "Gastronomía" },
            { nombre: "Lencería", img: "lenceria.jpg", cat: "Textil" },
            { nombre: "Modistería", img: "modisteria.jpg", cat: "Textil" },
            { nombre: "Barbería", img: "barberia.jpg", cat: "Estética" },
            { nombre: "Estética de Uñas", img: "estetica_de_unas.jpg", cat: "Estética" }
        ];

        function cargarCursos() {
            const grid = document.getElementById('cursos-grid');
            if (!grid) return;

            grid.innerHTML = MIS_CURSOS.map(c => `
                <div class="card">
                    <div class="card-img-container">
                        <img src="img/${c.img}" onerror="this.src='img/logo.png'">
                    </div>
                    <div class="card-body">
                        <div>
                            <span style="font-size:0.7rem; background:rgba(0,210,255,0.1); color:var(--azul-electrico); padding:4px 10px; border-radius:50px; font-weight:bold;">${c.cat}</span>
                            <h3 style="margin: 10px 0; font-size: 1.2rem;">${c.nombre}</h3>
                        </div>
                        <div style="margin-top: 15px;">
                            <button onclick="agregarAlCarrito('${c.nombre}', 'Gratis')" style="width:100%; padding:12px; border-radius:10px; background:var(--azul-electrico); color:var(--azul-primario); border:none; font-weight:bold; cursor:pointer; margin-bottom:10px;">✚ SELECCIONAR</button>
                            <a href="detalle-curso.html?curso=${encodeURIComponent(c.nombre)}" style="display:block; text-align:center; color:var(--azul-electrico); font-size:0.85rem; text-decoration:none; font-weight:bold;">🔎 VER DETALLES</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
