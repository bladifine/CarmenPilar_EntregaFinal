<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--azul-p); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }

        /* Estilo para los elementos de navegación y el botón de WhatsApp integrado */
        nav { display: flex; align-items: center; gap: 20px; }

        .btn-header-whatsapp {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-header-whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-2px);
        }

        .search-container { text-align: center; margin: 30px 0; }
        #buscador { 
            width: 80%; max-width: 500px; padding: 15px; 
            border-radius: 30px; border: 1px solid var(--electrico); 
            background: var(--glass); color: white; outline: none;
        }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px; margin: 0 auto;
        }

        .curso-card {
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transition: 0.3s;
            text-align: center;
        }
        .curso-card:hover { transform: translateY(-5px); border-color: var(--electrico); }

        .curso-img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .curso-info { padding: 20px; }

        .btn-accion {
            border: none; padding: 12px; border-radius: 10px; width: 100%; 
            cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase;
        }
        .btn-seleccionar { background: var(--naranja); color: white; box-shadow: 0 4px 15px rgba(255, 109, 0, 0.3); }
        .btn-quitar { background: #444; color: #ccc; border: 1px solid #666; }

        /* Botón de Confirmación Flotante (Izquierda abajo) */
        #cart-float {
            position: fixed; bottom: 30px; left: 30px; z-index: 2000; display: none;
        }
        .btn-confirmar {
            background: white; color: var(--azul-p); text-decoration: none;
            padding: 15px 30px; border-radius: 50px; font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid var(--electrico);
        }

        /* Botón de volver arriba discreto (Izquierda abajo, sobre el botón de confirmación si se activa) */
        #btn-subir {
            position: fixed; bottom: 105px; left: 30px; width: 55px; height: 55px; 
            background: var(--azul-p); border: 2px solid var(--electrico); color: var(--electrico); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,210,255,0.3); 
            z-index: 1900; transition: 0.3s; opacity: 0; pointer-events: none;
        }
        #btn-subir:hover { background: var(--electrico); color: var(--azul-p); }
    </style>
</head>
<body>

    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto; padding:0 20px; width:100%; box-sizing:border-box;">
            <div class="header-brand">
                <img src="img/logo.png" alt="Logo" onerror="this.style.display='none'">
                <h1 style="font-size: 1.4rem; margin:0;">BotEduCarmen <span style="color:var(--electrico)">2026</span></h1>
            </div>
            <nav>
                <a href="index.html" style="color:white; text-decoration:none;">Inicio</a>
                <a href="admin.html" style="color:var(--naranja); text-decoration:none;">Admin</a>
                <a href="https://wa.me/584243360158?text=Hola%20Bladimir,%20estoy%20viendo%20el%20catálogo%20de%20cursos%20y%20tengo%20algunas%20dudas." 
                   target="_blank" class="btn-header-whatsapp">
                   <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 16 16">
                      <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.69-4.98c-.202-.101-1.194-.588-1.378-.654-.184-.066-.317-.099-.45.099-.132.199-.512.654-.627.787-.114.133-.23.149-.43.049-.2-.1-.843-.311-1.607-.994-.594-.53-1.002-1.185-1.119-1.385-.116-.2-.012-.308.087-.407.091-.089.202-.234.302-.35.101-.117.135-.198.203-.331.066-.133.033-.25-.016-.35-.049-.1-.45-1.085-.617-1.485-.162-.395-.327-.341-.45-.347-.116-.006-.25-.006-.384-.006-.134 0-.353.05-.537.25-.184.2-.703.687-.703 1.677 0 .99.72 1.947.82 2.082.102.135 1.417 2.164 3.435 3.033.48.207.854.33 1.146.422.481.153.918.132 1.264.08.384-.057 1.194-.488 1.362-.958.168-.471.168-.875.118-.958-.05-.084-.185-.133-.386-.233z"/>
                   </svg>
                   WhatsApp
                </a>
            </nav>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="buscador" placeholder="🔍 ¿Qué quieres aprender hoy?" onkeyup="filtrar()">
    </div>

    <div id="grid-cursos" class="cursos-grid"></div>

    <div id="cart-float">
        <a href="contacto.html" class="btn-confirmar">🚀 CONFIRMAR INSCRIPCIÓN (<span id="cart-count">0</span>)</a>
    </div>

    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="btn-subir">▲</button>

    <div id="chat-icon" onclick="toggleChat()" style="position:fixed; bottom:30px; right:30px; width:85px; height:85px; cursor:pointer; z-index:5000; animation: pulse 2s infinite;">
        <img src="img/chatbot.png" style="width:100%; height:100%; object-fit:contain; border-radius:50%; filter: drop-shadow(0 0 15px var(--electrico));" onerror="this.style.display='none'; document.getElementById('fb').style.display='flex';">
        <div id="fb" style="display:none; width:100%; height:100%; background:var(--azul-p); border-radius:50%; align-items:center; justify-content:center; color:white; font-size:40px; border:3px solid var(--electrico);">🤖</div>
    </div>

    <div id="chat-window" style="position:fixed; bottom:130px; right:30px; width:380px; height:550px; background:white; border-radius:30px; box-shadow: 0 25px 70px rgba(0,0,0,0.4); z-index:5000; display:none; flex-direction:column; overflow:hidden; border:2px solid var(--azul-p);">
        <div style="background:var(--azul-p); color:white; padding:25px; text-align:center; font-weight:800; font-size:1.3rem;">
            🤖 AI ASISTENTE 2026
        </div>
        <div id="chat-messages" style="flex:1; padding:25px; overflow-y:auto; background:#f1f5f9; display:flex; flex-direction:column; gap:15px;">
            <div style="background:white; padding:15px; border-radius:20px; align-self:flex-start; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--electrico);">
                ¡Hola! Explora nuestro catálogo técnico 2026. Si tienes dudas sobre los requisitos de algún curso, dímelo aquí.
            </div>
        </div>
        <div style="padding:20px; background:white; display:flex; gap:10px;">
            <input type="text" id="user-input" placeholder="Pregunta algo..." style="flex:1; padding:15px; border:2px solid #e2e8f0; border-radius:20px; outline:none;" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="background:var(--azul-p); color:var(--electrico); border:none; width:55px; height:55px; border-radius:20px; cursor:pointer; font-size:1.5rem;">➤</button>
        </div>
    </div>

    <script>
        const CURSOS = [const CURSOS = [
            {n: "Barbería", i: "barberia.jpg"}, // Corregido a minúsculas
            {n: "Estética Avanzada", i: "estetica_avanzada.jpg"},
            {n: "Masaje Corporales", i: "masaje.jpg"}, 
            {n: "Puntillismo Avanzado", i: "puntillismo_avanzado.jpg"},
            {n: "Estética de Uñas", i: "estetica_de_unas.jpg"}, // Corregido. Si tu foto usa "ñ", cámbialo a: "estetica_de_uñas.jpg"
            {n: "Masoterapia", i: "masoterapia.jpg"},
            {n: "Puntillismo Básico", i: "puntillismo_basico.jpg"}, 
            {n: "Cosmetología", i: "cosmetologia.jpg"},
            {n: "Modistería", i: "modisteria.jpg"}, 
            {n: "Repostería", i: "reposteria.jpg"},
            {n: "Dibujo Artístico", i: "dibujo_artistico.jpg"}, 
            {n: "Lencería", i: "lenceria.jpg"},
            {n: "Panadería", i: "panaderia.jpg"}, 
            {n: "Pastelería", i: "reposteria_y_pasteleria.jpg"},
            {n: "Dulces Criollos", i: "dulces_criollos.jpg"}, 
            {n: "Peluquería", i: "peluqueria.jpg"},
            {n: "Ropa Íntima", i: "ropa_intima.jpg"}, 
            {n: "Electricidad", i: "electricidad.jpg"},
            {n: "Manicure y Pedicure", i: "manicure_pedicure.jpg"}, 
            {n: "Pintura Artística", i: "pintura_artistica.jpg"},
            {n: "Rostros", i: "rostros.jpg"}, 
            {n: "Electrodomésticos", i: "electrodomesticos.jpg"},
            {n: "Manualidades", i: "manualidades.jpg"}, 
            {n: "Pintura Avanzada", i: "pintura_avanzada.jpg"},
            {n: "Tejido y Crochet", i: "tejer.jpg"}
        ];

        function cargarCursos() {
            const grid = document.getElementById('grid-cursos');
            const seleccionados = JSON.parse(localStorage.getItem('cart')) || [];
            
            grid.innerHTML = CURSOS.map(c => {
                const estaEnCart = seleccionados.find(x => x.nombre === c.n);
                const claseBtn = estaEnCart ? "btn-quitar" : "btn-seleccionar";
                const textoBtn = estaEnCart ? "✖ QUITAR" : "✚ SELECCIONAR";

                return `
                    <div class="curso-card" data-name="${c.n.toLowerCase()}">
                        <a href="detalle-curso.html?curso=${encodeURIComponent(c.n)}">
                            <img src="img/${c.i}" class="curso-img" onerror="this.src='img/logo.png'">
                        </a>
                        <div class="curso-info">
                            <h3>${c.n}</h3>
                            <button onclick="toggleSeleccion('${c.n}', 'img/${c.i}')" class="btn-accion ${claseBtn}">
                                ${textoBtn}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleSeleccion(nombre, imagen) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const index = cart.findIndex(x => x.nombre === nombre);

            if (index !== -1) {
                cart.splice(index, 1);
            } else {
                cart.push({ nombre, imagen });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            cargarCursos();
            actualizarUI();
        }

        function filtrar() {
            let val = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.curso-card').forEach(card => {
                card.style.display = card.dataset.name.includes(val) ? "block" : "none";
            });
        }

        function actualizarUI() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-float').style.display = cart.length > 0 ? "block" : "none";
            document.getElementById('cart-count').innerText = cart.length;
        }

        // CONTROL DEL CHATBOT
        function toggleChat() {
            const w = document.getElementById('chat-window');
            w.style.display = (w.style.display === 'none' || w.style.display === '') ? 'flex' : 'none';
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-messages');
            const text = input.value.trim();
            if(!text) return;

            box.innerHTML += `<div style="background:var(--azul-p); color:white; padding:15px; border-radius:20px; align-self:flex-end; max-width:80%;">${text}</div>`;
            
            setTimeout(() => {
                box.innerHTML += `<div style="background:white; padding:15px; border-radius:20px; align-self:flex-start; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--electrico);">Excelente elección. Recuerda revisar los requisitos detallados antes de procesar tu inscripción en el sistema.</div>`;
                box.scrollTop = box.scrollHeight;
            }, 700);
            input.value = "";
        }

        // CONTROL SENSORIAL DEL BOTÓN VOLVER ARRIBA
        window.addEventListener('scroll', () => {
            const btnSubir = document.getElementById('btn-subir');
            if (window.scrollY > 400) {
                btnSubir.style.opacity = '1';
                btnSubir.style.pointerEvents = 'auto';
            } else {
                btnSubir.style.opacity = '0';
                btnSubir.style.pointerEvents = 'none';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            cargarCursos();
            actualizarUI();
        });
    </script>

    <style>
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 210, 255, 0); }
            100% { transform: scale(1); }
        }
    </style>
</body>
</html>
