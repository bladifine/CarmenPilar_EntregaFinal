<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --whatsapp-green: #25D366;
            --glass: rgba(255, 255, 255, 0.08);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.4);
        }

        body { 
            background-color: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 2px solid var(--azul-electrico);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }

        .nav-links { display: flex; gap: 15px; align-items: center; }

        /* REPARACIÓN DEL BOTÓN DE INICIO PARA QUE NO CAMBIE DE FORMA */
        .btn-nav-2026 {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 10px 24px;
            border-radius: 50px; /* Forma de píldora original */
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
            border: none;
            cursor: pointer;
            min-width: 110px;
            height: 40px;
            box-sizing: border-box;
        }

        .btn-orange {
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow));
            box-shadow: 0 4px 0 #b34b00;
        }
        .btn-blue {
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff);
            box-shadow: 0 4px 0 #0055b3;
        }
        .btn-green {
            background: linear-gradient(135deg, var(--whatsapp-green), #128C7E);
            box-shadow: 0 4px 0 #075E54;
        }

        .btn-nav-2026:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-nav-2026:active { transform: translateY(1px); box-shadow: none; }

        .catalogo-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .filtros-wrapper {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            display: flex; gap: 20px;
            margin-bottom: 40px;
        }

        .input-busqueda, .select-filtro {
            background: rgba(10, 25, 47, 0.7);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }
        .input-busqueda { flex: 2; }
        .select-filtro { flex: 1; }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s;
            box-shadow: var(--sombra-futurista);
            backdrop-filter: blur(10px);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--azul-electrico); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 25px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="header-brand">
                <img src="img/logo.png" onerror="this.src='img/logo.png';">
                <h1 style="margin: 0; font-size: 1.4rem; letter-spacing: 1px;">CAE <span style="color: var(--azul-electrico)">CARMEN PILAR</span></h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="btn-nav-2026 btn-orange">Inicio</a>
                <a href="carrito.html" class="btn-nav-2026 btn-blue">🛒 Lista (<span id="cart-count">0</span>)</a>
            </div>
        </nav>
    </header>

    <main class="catalogo-container">
        <div class="filtros-wrapper">
            <input type="text" id="buscador" class="input-busqueda" placeholder="Buscar especialidad..." onkeyup="filtrarCatalogo()">
            <select id="filtro-categoria" class="select-filtro" onchange="filtrarCatalogo()">
                <option value="todos">Todas las Áreas</option>
                <option value="Gastronomía">Gastronomía</option>
                <option value="Estética">Estética</option>
                <option value="Textil">Textil y Diseño</option>
                <option value="Técnica">Técnica</option>
                <option value="Arte">Arte</option>
            </select>
        </div>
        <div id="cursos-grid" class="cursos-grid"></div>
    </main>

    <script>
        const BASE_DATOS_CURSOS = [
            { nombre: "Cocina Nacional", img: "cocina_nacional.jpg", cat: "Gastronomía" },
            { nombre: "Panadería", img: "panaderia.jpg", cat: "Gastronomía" },
            { nombre: "Repostería", img: "reposteria.jpg", cat: "Gastronomía" },
            { nombre: "Lencería", img: "lenceria.jpg", cat: "Textil" },
            { nombre: "Modistería", img: "modisteria.jpg", cat: "Textil" },
            { nombre: "Barbería", img: "barberia.jpg", cat: "Estética" },
            { nombre: "Estética de Uñas", img: "estetica_de_unas.jpg", cat: "Estética" }
        ];

        function cargarCursos() {
            const grid = document.getElementById('cursos-grid');
            if (!grid) return;
            
            grid.innerHTML = BASE_DATOS_CURSOS.map(curso => {
                // Forzamos pasar el parámetro limpio y en minúsculas para evitar fallos de lectura
                const urlDetalle = `detalle-curso.html?curso=${encodeURIComponent(curso.nombre.toLowerCase().trim())}`;
                return `
                    <div class="card" data-name="${curso.nombre.toLowerCase()}" data-cat="${curso.cat.toLowerCase()}">
                        <img src="img/${curso.img}" onerror="this.src='img/logo.png'">
                        <div class="card-body">
                            <div>
                                <span style="font-size: 0.7rem; background: rgba(0,210,255,0.1); color: var(--azul-electrico); padding: 4px 10px; border-radius: 50px; font-weight: bold;">${curso.cat}</span>
                                <h3 style="margin: 10px 0; font-size: 1.2rem; min-height: 40px;">${curso.nombre}</h3>
                            </div>
                            <div>
                                <button onclick="agregarAlCarrito('${curso.nombre}', 'img/${curso.img}')" style="width: 100%; padding: 12px; border-radius: 10px; background: var(--azul-electrico); color: var(--azul-primario); border: none; font-weight: bold; cursor: pointer; margin-bottom:10px;">✚ SELECCIONAR</button>
                                <a href="${urlDetalle}" style="display:block; text-align:center; color:var(--azul-electrico); font-size:0.85rem; text-decoration:none; font-weight:bold;">🔎 VER DETALLES</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            actualizarContadorUI();
        }

        function filtrarCatalogo() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const cat = document.getElementById('filtro-categoria').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const matchNombre = card.getAttribute('data-name').includes(texto);
                const matchCat = (cat === 'todos' || card.getAttribute('data-cat').includes(cat));
                card.style.display = (matchNombre && matchCat) ? 'flex' : 'none';
            });
        }

        function agregarAlCarrito(nombre, img) {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            if (carrito.some(item => item.nombre === nombre)) {
                alert("⚠️ Este curso ya está en tu lista."); return;
            }
            carrito.push({ nombre, imagen: img });
            localStorage.setItem('cart', JSON.stringify(carrito));
            actualizarContadorUI();
            alert(`✅ ${nombre} añadido.`);
        }

        function actualizarContadorUI() {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cart-count');
            if(badge) badge.textContent = carrito.length;
        }

        document.addEventListener('DOMContentLoaded', cargarCursos);
    </script>
</body>
</html>
