<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos 2026 | CAE Carmen Pilar</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body { 
            background: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.15), transparent);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* HEADER */
        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 20px 0;
            border-bottom: 2px solid var(--azul-electrico);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo { height: 50px; }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* DISEÑO DE BOTÓN DE INICIO FIJO TIPO PASTILLA */
        .btn-nav-2026 {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            min-width: 110px;
            height: 40px;
            box-sizing: border-box;
        }

        .btn-orange {
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow));
            box-shadow: 0 4px 0 #b34b00;
        }

        .btn-blue {
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff);
            box-shadow: 0 4px 0 #0055b3;
        }

        .btn-nav-2026:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-nav-2026:active { transform: translateY(2px); box-shadow: none; }

        /* CATALOGO GRID */
        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, border-color 0.3s;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--azul-electrico);
        }

        .card-img-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #0f2b48;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .badge {
            background: rgba(0, 210, 255, 0.1);
            color: var(--azul-electrico);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            width: fit-content;
            font-weight: bold;
        }

        .btn-add {
            background: var(--azul-electrico);
            color: var(--azul-primario);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: auto;
        }

        .btn-add:hover {
            background: #fff;
        }

        .btn-details {
            display: block;
            text-align: center;
            color: var(--azul-electrico);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 12px;
            transition: color 0.2s;
        }
        .btn-details:hover {
            color: #fff;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <img src="img/logo.png" alt="Logo" class="logo" onerror="this.src='img/logo.png'">
        <div class="nav-links">
            <a href="index.html" class="btn-nav-2026 btn-orange">Inicio</a>
            <a href="carrito.html" class="btn-nav-2026 btn-blue">Mi Selección (<span id="cart-count">0</span>)</a>
        </div>
    </nav>
</header>

<div class="container">
    <h2 style="text-align: center; margin-top: 20px; font-size: 2rem;">Especialidades Formativas <span style="color: var(--azul-electrico);">2026</span></h2>
    <div class="cursos-grid" id="cursos-grid"></div>
</div>

<script>
    const CURSOS = [
        { nombre: "Cocina Nacional", cat: "Gastronomía", img: "cocina_nacional.jpg" },
        { nombre: "Panadería", cat: "Gastronomía", img: "panaderia.jpg" },
        { nombre: "Repostería", cat: "Gastronomía", img: "reposteria.jpg" },
        { nombre: "Modistería", cat: "Textil y Diseño", img: "modisteria.jpg" },
        { nombre: "Lencería", cat: "Textil y Diseño", img: "lenceria.jpg" },
        { nombre: "Ropa Íntima", cat: "Textil y Diseño", img: "ropa_intima.jpg" },
        { nombre: "Corte y Confección", cat: "Textil y Diseño", img: "corte_y_confeccion.jpg" },
        { nombre: "Barbería", cat: "Estética", img: "barberia.jpg" },
        { nombre: "Estética de Uñas", cat: "Estética", img: "estetica_de_unas.jpg" }
    ];

    function renderCursos() {
        const grid = document.getElementById('cursos-grid');
        grid.innerHTML = CURSOS.map(curso => `
            <div class="card">
                <div class="card-img-container">
                    <img src="img/${curso.img}" alt="${curso.nombre}" onerror="this.src='img/logo.png'">
                </div>
                <div class="card-content">
                    <span class="badge">${curso.cat}</span>
                    <h3 style="margin: 15px 0 10px 0; font-size: 1.2rem;">${curso.nombre}</h3>
                    <button class="btn-add" onclick="agregarAlCarrito('${curso.nombre}', 'img/${curso.img}')">
                        SELECCIONAR CURSO
                    </button>
                    <a href="detalle-curso.html?curso=${encodeURIComponent(curso.nombre)}" class="btn-details">🔎 VER DETALLES</a>
                </div>
            </div>
        `).join('');
        actualizarContador();
    }

    function agregarAlCarrito(nombre, imagen) {
        let carrito = JSON.parse(localStorage.getItem('cart')) || [];
        if (carrito.some(c => c.nombre === nombre)) {
            alert("Este curso ya está en tu lista.");
            return;
        }
        carrito.push({ nombre, imagen });
        localStorage.setItem('cart', JSON.stringify(carrito));
        actualizarContador();
        alert("¡Añadido! Puedes verlo en 'Mi Selección'.");
    }

    function actualizarContador() {
        let carrito = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cart-count').innerText = carrito.length;
    }

    document.addEventListener('DOMContentLoaded', renderCursos);
</script>

</body>
</html>
