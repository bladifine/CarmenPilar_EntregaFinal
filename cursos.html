<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
            --verde-wa: #25d366;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--azul-p); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }

        nav { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: 0.3s; font-size: 0.95rem; }
        .nav-links a:hover { color: var(--electrico); }

        .btn-cart-nav {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--electrico);
            padding: 8px 16px;
            border-radius: 50px;
            color: var(--electrico);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-cart-nav:hover { background: var(--electrico); color: var(--azul-p); transform: scale(1.05); }

        /* 🟢 BOTÓN WHATSAPP ARRIBA A LA DERECHA */
        .btn-wa-nav {
            background: rgba(37, 211, 102, 0.1);
            border: 1px solid var(--verde-wa);
            padding: 8px 16px;
            border-radius: 50px;
            color: var(--verde-wa);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-wa-nav:hover { background: var(--verde-wa); color: white; transform: scale(1.05); }

        .search-section { max-width: 1200px; margin: 40px auto 20px; padding: 0 20px; display: flex; gap: 20px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 280px; position: relative; }
        .search-box input { width: 100%; padding: 15px 20px; border-radius: 12px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; font-size: 1rem; box-sizing: border-box; transition: 0.3s; }
        .search-box input:focus { border-color: var(--electrico); box-shadow: 0 0 15px rgba(0,210,255,0.2); }
        
        .filter-select { padding: 0 20px; height: 52px; border-radius: 12px; background: var(--azul-p); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1rem; outline: none; cursor: pointer; transition: 0.3s; }
        .filter-select:focus { border-color: var(--electrico); }

        .cursos-grid { max-width: 1200px; margin: 0 auto 60px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        .card { 
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; overflow: hidden; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; height: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--electrico); box-shadow: 0 15px 35px rgba(0,210,255,0.15); }
        
        .card-link-img { display: block; width: 100%; height: 190px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        
        .card-body { padding: 25px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { margin: 0 0 10px; font-size: 1.3rem; color: white; }
        .card-title a { color: white; text-decoration: none; transition: 0.3s; }
        .card-title a:hover { color: var(--electrico); }
        
        .btn-detalles { display: block; text-align: center; width: 100%; margin-top: 10px; padding: 10px; text-decoration: none; color: rgba(255,255,255,0.6); font-size: 0.85rem; font-weight: bold; transition: 0.3s; }
        .btn-detalles:hover { color: var(--electrico); }

        #btn-subir { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: var(--naranja); border: none; border-radius: 50%; color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 99; box-shadow: 0 5px 15px rgba(255,109,0,0.4); }
        #btn-subir:hover { transform: scale(1.1); background: #e65c00; }

        /* 🤖 INTERFAZ DEL CHATBOT FLOTANTE */
        .chatbot-container { position: fixed; bottom: 30px; left: 30px; z-index: 1000; font-family: sans-serif; }
        .chatbot-bubble { width: 60px; height: 60px; background: var(--electrico); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; box-shadow: 0 8px 25px rgba(0,210,255,0.4); transition: 0.3s; }
        .chatbot-bubble:hover { transform: scale(1.1); }
        
        .chatbot-window { width: 320px; height: 400px; background: #0c1a30; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; position: absolute; bottom: 75px; left: 0; display: none; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chatbot-header { background: var(--electrico); padding: 15px; color: var(--azul-p); font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .chatbot-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; line-height: 1.4; }
        .msg.bot { background: rgba(255,255,255,0.08); align-self: flex-start; color: #fff; }
        .msg.user { background: var(--electrico); align-self: flex-end; color: var(--azul-p); font-weight: 500; }
        
        .chatbot-input-area { padding: 10px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 8px; background: rgba(0,0,0,0.2); }
        .chatbot-input-area input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; color: white; outline: none; font-size: 0.85rem; }
        .chatbot-input-area button { background: var(--electrico); border: none; color: var(--azul-p); padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="header-brand">
                <img src="img/logo.png" onerror="this.src='img/logo.png'">
                <h1 style="margin:0; font-size:1.4rem; letter-spacing:1px; color:white;">CAE <span style="color:var(--electrico)">CARMEN PILAR</span></h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="cursos.html" style="color:var(--electrico)">Catálogo</a>
                <a href="admin.html">Panel</a>
                <a href="carrito.html" class="btn-cart-nav">
                    🛒 Mi Lista (<span id="cart-count">0</span>)
                </a>
                <a href="https://wa.me/5804243360158?text=Hola,%20solicito%20información%20sobre%20las%20inscripciones%20de%20los%20cursos." target="_blank" class="btn-wa-nav">
                    💬 WhatsApp
                </a>
            </div>
        </nav>
    </header>

    <div class="search-section">
        <div class="search-box">
            <input type="text" id="buscador" oninput="filtrarCatalogo()" placeholder="🔍 Buscar especialidad formativa por nombre...">
        </div>
        <select id="filtro-categoria" onchange="filtrarCatalogo()" class="filter-select">
            <option value="todos">🗂️ Todas las Categorías</option>
            <option value="gastronomía">Gastronomía</option>
            <option value="textil y diseño">Textil y Diseño</option>
            <option value="estética">Estética</option>
            <option value="arte">Arte</option>
            <option value="técnica">Área Técnica</option>
        </select>
    </div>

    <div class="cursos-grid" id="cursos-grid"></div>

    <button id="btn-subir" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</button>

    <div class="chatbot-container">
        <div class="chatbot-bubble" onclick="toggleChatbot()">🤖</div>
        <div class="chatbot-window" id="chat-window">
            <div class="chatbot-header">
                <span>🤖 BotEduCarmen</span>
                <span style="cursor:pointer; font-size:1.2rem;" onclick="toggleChatbot()">×</span>
            </div>
            <div class="chatbot-messages" id="chat-messages">
                <div class="msg bot">¡Hola! Soy el asistente virtual de CAE Carmen Pilar. ¿En qué curso o especialidad estás interesado hoy?</div>
            </div>
            <div class="chatbot-input-area">
                <input type="text" id="chat-input" placeholder="Escribe tu mensaje aquí..." onkeypress="evaluarTecladoChat(event)">
                <button onclick="enviarMensajeChat()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        // BASE DE DATOS MAESTRA: 25 Cursos Oficiales
        const BASE_DATOS_CURSOS = [
            // --- Gastronomía (5 cursos) ---
            { n: "Cocina Nacional", c: "Gastronomía", i: "cocina_nacional.jpg" },
            { n: "Panadería", c: "Gastronomía", i: "panaderia.jpg" },
            { n: "Repostería y Pastelería", c: "Gastronomía", i: "reposteria_y_pasteleria.jpg" },
            { n: "Repostería Básica", c: "Gastronomía", i: "reposteria.jpg" },
            { n: "Dulces Criollos", c: "Gastronomía", i: "dulces_criollos.jpg" },

            // --- Textil y Diseño (4 cursos) ---
            { n: "Modistería", c: "Textil y Diseño", i: "modisteria.jpg" },
            { n: "Lencería y Ropa Íntima", c: "Textil y Diseño", i: "ropa_intima.jpg" },
            { n: "Lencería Hogar", c: "Textil y Diseño", i: "lenceria.jpg" },
            { n: "Tejido y Crochet", c: "Textil y Diseño", i: "tejer.jpg" },

            // --- Estética (7 cursos) ---
            { n: "Barbería Comercial", c: "Estética", i: "barberia.jpg" },
            { n: "Peluquería Básica", c: "Estética", i: "peluqueria.jpg" },
            { n: "Manicure y Pedicure", c: "Estética", i: "manicure_pedicure.jpg" },
            { n: "Estética de Uñas", c: "Estética", i: "estetica_de_unas.jpg" },
            { n: "Masajes Corporales", c: "Estética", i: "masaje.jpg" },
            { n: "Masoterapia Profesional", c: "Estética", i: "masoterapia.jpg" },
            { n: "Cosmetología Clínica", c: "Estética", i: "cosmetologia.jpg" },

            // --- Área Técnica (2 cursos) ---
            { n: "Fundamentos de Electricidad", c: "Técnica", i: "electricidad.jpg" },
            { n: "Reparación de Electrodomésticos", c: "Técnica", i: "electrodomesticos.jpg" },

            // --- Arte y Manualidades (7 cursos) ---
            { n: "Dibujo Artístico", c: "Arte", i: "dibujo_artistico.jpg" },
            { n: "Pintura Artística", c: "Arte", i: "pintura_artistica.jpg" },
            { n: "Pintura Avanzada", c: "Arte", i: "pintura_avanzada.jpg" },
            { n: "Puntillismo Básico", c: "Arte", i: "puntillismo_basico.jpg" },
            { n: "Puntillismo Avanzado", c: "Arte", i: "puntillismo_avanzado.jpg" },
            { n: "Manualidades Creativas", c: "Arte", i: "manualidades.jpg" },
            { n: "Dibujo de Rostros", c: "Arte", i: "rostros.jpg" }
        ];

        // RENDERIZADO EN PANTALLA CON ENLACES EN LAS FOTOS Y TÍTULOS
        function cargarCursos() {
            const grid = document.getElementById('cursos-grid');
            if(!grid) return;

            grid.innerHTML = BASE_DATOS_CURSOS.map(curso => {
                const archivoImagen = curso.i;
                const urlDetalle = `detalle-curso.html?curso=${encodeURIComponent(curso.n)}`;
                
                return `
                    <div class="card" data-name="${curso.n.toLowerCase()}" data-cat="${curso.c.toLowerCase()}">
                        <a href="${urlDetalle}" class="card-link-img">
                            <img src="img/${archivoImagen}" onerror="this.onerror=null; this.src='img/logo.png';">
                        </a>
                        <div class="card-body">
                            <div>
                                <span style="font-size:0.8rem; background:rgba(0,210,255,0.1); color:var(--electrico); padding:4px 10px; border-radius:50px; font-weight:bold; text-transform:uppercase;">${curso.c}</span>
                                <h3 class="card-title" style="margin-top:10px;">
                                    <a href="${urlDetalle}">${curso.n}</a>
                                </h3>
                                <p style="color:rgba(255,255,255,0.6); font-size:0.9rem; margin:5px 0;">Certificación Avalada Gratuita</p>
                            </div>
                            <div style="margin-top:15px;">
                                <button onclick="agregarAlCarrito('${curso.n}', 'img/${archivoImagen}')" style="width:100%; padding:12px; border-radius:10px; background:var(--electrico); color:var(--azul-p); border:none; font-weight:bold; cursor:pointer; transition:0.3s; font-size:0.95rem;">✚ SELECCIONAR</button>
                                <a href="${urlDetalle}" class="btn-detalles">🔎 VER REQUISITOS</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            actualizarContadorUI();
        }

        // FILTRADO INTELIGENTE
        function filtrarCatalogo() {
            const textoBusqueda = document.getElementById('buscador').value.toLowerCase().trim();
            const categoriaSeleccionada = document.getElementById('filtro-categoria').value.toLowerCase().trim();
            const tarjetas = document.querySelectorAll('.card');

            const limpiarAcentos = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            tarjetas.forEach(tarjeta => {
                const nombreCurso = tarjeta.getAttribute('data-name');
                const categoriaCurso = tarjeta.getAttribute('data-cat');

                const cumpleNombre = limpiarAcentos(nombreCurso).includes(limpiarAcentos(textoBusqueda));
                const cumpleCategoria = (categoriaSeleccionada === 'todos' || limpiarAcentos(categoriaCurso) === limpiarAcentos(categoriaSeleccionada));

                if (cumpleNombre && cumpleCategoria) {
                    tarjeta.style.display = 'flex';
                } else {
                    tarjeta.style.display = 'none';
                }
            });
        }

        // AGREGAR AL CARRITO LOCALMENTE
        function agregarAlCarrito(nombre, img) {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (carrito.some(item => item.nombre.trim().toLowerCase() === nombre.trim().toLowerCase())) {
                alert("⚠️ Este curso ya lo tienes agregado en tu lista de selección.");
                return;
            }

            carrito.push({ nombre: nombre.trim(), imagen: img });
            localStorage.setItem('cart', JSON.stringify(carrito));
            actualizarContadorUI();

            alert(`✅ "${nombre}" se añadió correctamente a tu selección.`);
        }

        function actualizarContadorUI() {
            const carrito = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cart-count');
            if(badge) badge.textContent = carrito.length;
        }

        // 🤖 LÓGICA INTERACTIVA DEL CHATBOT
        function toggleChatbot() {
            const windowChat = document.getElementById('chat-window');
            windowChat.style.display = (windowChat.style.display === 'flex') ? 'none' : 'flex';
        }

        function evaluarTecladoChat(event) {
            if (event.key === 'Enter') enviarMensajeChat();
        }

        function enviarMensajeChat() {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if (!texto) return;

            const contenedor = document.getElementById('chat-messages');

            // Mensaje de usuario
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.textContent = texto;
            contenedor.appendChild(userDiv);
            
            input.value = '';
            contenedor.scrollTop = contenedor.scrollHeight;

            // Respuesta automática simulada inteligente
            setTimeout(() => {
                const botDiv = document.createElement('div');
                botDiv.className = 'msg bot';
                
                const consulta = texto.toLowerCase();
                if (consulta.includes('requisitos') || consulta.includes('necesito')) {
                    botDiv.textContent = "Para ver los requisitos detallados, haz clic en el botón 'VER REQUISITOS' que se encuentra abajo de la tarjeta de cada curso.";
                } else if (consulta.includes('precio') || consulta.includes('costo') || consulta.includes('gratis')) {
                    botDiv.textContent = "¡Todos nuestros cursos son completamente gratuitos y cuentan con Certificación Avalada!";
                } else if (consulta.includes('inscribir') || consulta.includes('inscripcion')) {
                    botDiv.textContent = "Para pre-inscribirte, presiona el botón 'SELECCIONAR' en los cursos que quieras y luego ve al icono del carrito de compras arriba a la derecha.";
                } else {
                    botDiv.textContent = "Entendido tu consulta. Te sugiero revisar nuestro listado completo de 25 especialidades o escribirnos directamente a nuestro WhatsApp oficial mediante el botón superior.";
                }
                
                contenedor.appendChild(botDiv);
                contenedor.scrollTop = contenedor.scrollHeight;
            }, 800);
        }

        // BOTÓN SUBIR
        window.addEventListener('scroll', () => {
            const btnSubir = document.getElementById('btn-subir');
            if (window.scrollY > 400) {
                btnSubir.style.opacity = '1';
                btnSubir.style.pointerEvents = 'auto';
            } else {
                btnSubir.style.opacity = '0';
                btnSubir.style.pointerEvents = 'none';
            }
        });

        document.addEventListener('DOMContentLoaded', cargarCursos);
    </script>
</body>
</html>
