<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos 2026 | CAE Carmen Pilar</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --whatsapp-green: #25D366;
            --glass: rgba(255, 255, 255, 0.08);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.4);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--azul-primario); 
            color: white;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.15), transparent);
        }

        /* BARRA SUPERIOR */
        .top-bar {
            background: var(--azul-primario);
            color: var(--azul-electrico);
            padding: 10px 0;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 600;
            border-bottom: 1px solid rgba(0, 210, 255, 0.1);
        }
        .top-bar-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        /* NAVBAR PRINCIPAL */
        .navbar {
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 0;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-box img { width: 45px; height: 45px; object-fit: contain; }
        .logo-box h1 { font-size: 1.25rem; margin: 0; font-weight: 800; letter-spacing: 0.5px; }

        .nav-menu { display: flex; align-items: center; gap: 25px; }
        .nav-link { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: 0.3s; }
        .nav-link:hover { color: var(--azul-electrico); }
        .nav-link.active { color: var(--azul-electrico); font-weight: 700; }

        /* BOTÓN DE CARRITO NAV */
        .btn-cart-nav {
            background: var(--glass);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 10px 18px;
            border-radius: 12px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-cart-nav:hover { background: rgba(0, 210, 255, 0.1); border-color: var(--azul-electrico); }
        .cart-badge { background: var(--naranja-neon); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }

        /* ENCABEZADO SECCIÓN */
        .catalog-header { max-width: 1200px; margin: 40px auto 20px; padding: 0 20px; }
        .catalog-header h2 { font-size: 2rem; font-weight: 800; margin: 0 0 10px; }
        .catalog-header p { color: rgba(255,255,255,0.6); margin: 0; font-size: 1rem; }

        /* FILTROS Y BUSCADOR */
        .search-filter-section { max-width: 1200px; margin: 0 auto 30px; padding: 0 20px; display: flex; gap: 15px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 280px; position: relative; }
        .search-box input {
            width: 100%; padding: 15px 20px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; color: white; outline: none; font-size: 0.95rem; box-sizing: border-box; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--azul-electrico); background: rgba(0,0,0,0.4); }
        
        .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab-btn {
            background: var(--glass); border: 1px solid transparent; color: rgba(255,255,255,0.7);
            padding: 12px 20px; border-radius: 14px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.3s;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .tab-btn.active { background: var(--azul-electrico); color: var(--azul-primario); border-color: var(--azul-electrico); }

        /* GRID DE CURSOS */
        .courses-grid { max-width: 1200px; margin: 0 auto 60px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        /* TARJETA DE CURSO MEJORADA */
        .course-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 22px; overflow: hidden;
            box-shadow: var(--sombra-futurista); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column;
        }
        .course-card:hover { transform: translateY(-8px); border-color: rgba(0, 210, 255, 0.3); box-shadow: 0 25px 50px rgba(0, 210, 255, 0.1); }
        
        .course-img-wrapper { width: 100%; height: 180px; position: relative; overflow: hidden; cursor: pointer; }
        .course-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .course-card:hover .course-img-wrapper img { transform: scale(1.08); }
        .category-badge { position: absolute; top: 15px; left: 15px; background: rgba(10, 25, 47, 0.85); backdrop-filter: blur(5px); color: var(--azul-electrico); padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; border: 1px solid rgba(0, 210, 255, 0.2); }

        .course-info { padding: 22px; flex: 1; display: flex; flex-direction: column; }
        .course-info h3 { font-size: 1.2rem; font-weight: 700; margin: 0 0 10px; color: white; cursor: pointer; }
        .course-info h3:hover { color: var(--azul-electrico); }
        .course-meta { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 20px; display: flex; justify-content: space-between; }
        .course-price { color: #25D366; font-weight: bold; font-size: 0.95rem; }

        .course-actions { display: flex; gap: 10px; margin-top: auto; }
        
        /* BOTONES 3D */
        .btn-select {
            flex: 1; background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow)); color: white;
            border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
            box-shadow: 0 4px 0 #b34b00; transition: 0.1s;
        }
        .btn-select:active { transform: translateY(3px); box-shadow: 0 1px 0 #b34b00; }
        
        .btn-details {
            background: rgba(255,255,255,0.05); color: var(--azul-electrico); border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 0.8rem; transition: 0.2s;
        }
        .btn-details:hover { background: rgba(0, 210, 255, 0.15); border-color: var(--azul-electrico); }

        /* CHATBOT IZQUIERDA */
        .chatbot-trigger {
            position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-container">
            <div>📍 MATRÍCULA Abierta - Período Académico 2026</div>
            <div>Certificación Oficial e Innovación Abierta</div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-box">
                <img src="img/logo.png" alt="Logo" onerror="this.src='img/logo.png'">
                <h1>CAE CARMEN PILAR</h1>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="cursos.html" class="nav-link active">Cursos</a>
                <a href="carrito.html" class="btn-cart-nav">
                    🛒 Mi Selección <span class="cart-badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="catalog-header">
        <h2>Catálogo Académico 2026</h2>
        <p>Selecciona las especialidades de tu preferencia e inicia tu proceso de inscripción completamente gratuito.</p>
    </div>

    <div class="search-filter-section">
        <div class="search-box">
            <input type="text" id="buscador" oninput="filtrarCursos()" placeholder="🔍 Buscar curso o palabra clave...">
        </div>
        <div class="filter-tabs">
            <button class="tab-btn active" onclick="filtrarCategoria('Todos', this)">Todos</button>
            <button class="tab-btn" onclick="filtrarCategoria('Gastronomía', this)">Gastronomía</button>
            <button class="tab-btn" onclick="filtrarCategoria('Costura', this)">Costura / Diseño</button>
            <button class="tab-btn" onclick="filtrarCategoria('Estética', this)">Estética</button>
        </div>
    </div>

    <div class="courses-grid" id="cursos-grid"></div>

    <div class="chatbot-trigger" onclick="toggleChat()">
        <img src="img/chatbot.png" style="width:30px;" onerror="this.src='img/logo.png'">
    </div>

    <script>
        // LISTADO OFICIAL UNIFICADO DE CURSOS
        const MIS_CURSOS = [
            { name: "Modistería", price: "Gratis", cat: "Costura", img: "img/modisteria.jpg" },
            { name: "Cocina Bilingüe", price: "Gratis", cat: "Gastronomía", img: "img/cocina.jpg" },
            { name: "Barbería", price: "Gratis", cat: "Estética", img: "img/barberia.jpg" },
            { name: "Uñas", price: "Gratis", cat: "Estética", img: "img/estetica_de_unas.jpg" },
            { name: "Corte y Confección", price: "Gratis", cat: "Costura", img: "img/corte_y_confeccion.jpg" }
        ];

        // RENDERIZAR TARJETAS (CON BOTÓN Y FOTO CONECTADOS AL DETALLE)
        function mostrarCursos(lista = MIS_CURSOS) {
            const grid = document.getElementById('cursos-grid');
            if (!grid) return;

            grid.innerHTML = lista.map(c => `
                <div class="course-card" data-category="${c.cat}">
                    <div class="course-img-wrapper" onclick="irAlDetalle('${c.name}')">
                        <img src="${c.img}" alt="${c.name}" onerror="this.onerror=null; this.src='img/logo.png';">
                        <span class="category-badge">${c.cat}</span>
                    </div>
                    <div class="course-info">
                        <h3 onclick="irAlDetalle('${c.name}')">${c.name}</h3>
                        <div class="course-meta">
                            <span>Trayecto 2026</span>
                            <span class="course-price">${c.price}</span>
                        </div>
                        <div class="course-actions">
                            <button class="btn-select" onclick="addToCart('${c.name}', '${c.img}')">Seleccionar</button>
                            <button class="btn-details" onclick="irAlDetalle('${c.name}')">Ver Información</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // FUNCIÓN CLAVE: Redirección limpia al archivo detalle-curso.html sin números
        function irAlDetalle(nombreCurso) {
            window.location.href = `detalle-curso.html?curso=${encodeURIComponent(nombreCurso)}`;
        }

        // LÓGICA DE AGREGAR AL SELECCIONADO (CARRITO)
        function addToCart(nombre, imagen) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.find(item => item.nombre.toLowerCase() === nombre.toLowerCase())) {
                alert("⚠️ Este curso ya está en tu lista de selección.");
                return;
            }
            cart.push({ nombre: nombre, imagen: imagen });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCounter();
            alert(`🚀 El curso de ${nombre} fue añadido exitosamente.`);
        }

        function updateCounter() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        }

        // FILTROS Y BUSCADOR AVANZADO
        function filtrarCursos() {
            const txt = document.getElementById('buscador').value.toLowerCase();
            const filtrados = MIS_CURSOS.filter(c => c.name.toLowerCase().includes(txt) || c.cat.toLowerCase().includes(txt));
            mostrarCursos(filtrados);
        }

        function filtrarCategoria(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (cat === 'Todos') {
                mostrarCursos(MIS_CURSOS);
            } else {
                const filtrados = MIS_CURSOS.filter(c => c.cat === cat);
                mostrarCursos(filtrados);
            }
        }

        // Cargar todo al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            mostrarCursos();
            updateCounter();
        });

        // Simulación del Chatbot
        function toggleChat() {
            alert("Hola, las inscripciones de 2026 están totalmente activas. ¡Selecciona tus cursos y confirma tu cupo!");
        }
    </script>
</body>
</html>
