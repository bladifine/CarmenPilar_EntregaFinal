<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .courses-grid { 
            max-width: 1200px; margin: 40px auto; padding: 0 20px; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; 
        }
        .course-card {
            background: rgba(255, 255, 255, 0.08); border-radius: 25px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.4s;
        }
        .course-card:hover { transform: translateY(-10px); border-color: #00d2ff; }
        .course-img-wrapper { width: 100%; height: 180px; cursor: pointer; overflow: hidden; background: #000; }
        .course-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .course-info { padding: 20px; text-align: center; }
        .course-info h3 { margin: 0 0 15px; font-size: 1rem; min-height: 45px; text-transform: uppercase; }
        
        .btn-select {
            background: linear-gradient(135deg, #ff6d00, #ff9100);
            color: white; border: none; padding: 12px; width: 100%; border-radius: 12px;
            font-weight: 800; cursor: pointer; margin-bottom: 10px; box-shadow: 0 4px 0 #b34b00;
        }
        .btn-details {
            background: transparent; color: #00d2ff; border: 1px solid #00d2ff;
            padding: 10px; width: 100%; border-radius: 12px; cursor: pointer;
        }

        .float-btn {
            position: fixed; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2000; transition: 0.3s;
        }
        .btn-ia { bottom: 30px; right: 30px; background: linear-gradient(135deg, #00d2ff, #0077ff); }
        .btn-scroll { bottom: 30px; left: 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: white; display: none; border:none; font-size: 20px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div onclick="window.location.href='index.html'" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
                <img src="img/logo.png" width="30" alt="Logo">
                <span style="font-weight:900; color:var(--azul-electrico);">BotEduCarmen</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-btn btn-inicio">Inicio</a>
                <a href="https://wa.me/584243360158" target="_blank" class="nav-btn btn-whatsapp-nav">WhatsApp</a>
                <a href="admin.html" class="nav-btn btn-admin-nav">Admin</a>
                <a href="carrito.html" class="nav-btn btn-cart-nav">MI LISTA (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </nav>

    <div class="courses-grid" id="cursos-grid"></div>

    <!-- CHATBOT -->
    <div id="chat-container" class="chat-modal" style="display: none;">
        <div class="chat-header">
            <span>Asistente IA</span>
            <button onclick="toggleChat()" style="background:none; border:none; cursor:pointer; font-size:20px;">&times;</button>
        </div>
        <div id="chat-messages" class="chat-body">
            <div class="msg bot-msg">Hola, ¿en qué curso de la lista te gustaría inscribirte?</div>
        </div>
        <div class="chat-footer">
            <input type="text" id="user-input" placeholder="Escribe aquí...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div class="float-btn btn-ia" onclick="toggleChat()">
        <img src="img/chatbot.png" width="35" onerror="this.src='img/logo.png'">
    </div>
    <button class="float-btn btn-scroll" id="scrollTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆</button>

    <script>
        // LISTA MAPEADA EXACTAMENTE CON TU COMANDO LS
        const MIS_CURSOS = [
            { name: "Barbería", img: "img/barberia.jpg" },
            { name: "Cocina Nacional", img: "img/cocina_nacional.jpg" },
            { name: "Cosmetología", img: "img/cosmetologia.jpg" },
            { name: "Dibujo Artístico", img: "img/dibujo_artistico.jpg" },
            { name: "Dulces Criollos", img: "img/dulces_criollos.jpg" },
            { name: "Electricidad", img: "img/electricidad.jpg" },
            { name: "Reparación de Electrodomésticos", img: "img/electrodomesticos.jpg" },
            { name: "Estética Avanzada", img: "img/estetica_avanzada.jpg" },
            { name: "Estética de Uñas", img: "img/estetica_de_unas.jpg" },
            { name: "Lencería", img: "img/lenceria.jpg" },
            { name: "Manicure y Pedicure", img: "img/manicure_pedicure.jpg" },
            { name: "Manualidades", img: "img/manualidades.jpg" },
            { name: "Masaje Terapéutico", img: "img/masaje.jpg" },
            { name: "Masoterapia", img: "img/masoterapia.jpg" },
            { name: "Modistería", img: "img/modisteria.jpg" },
            { name: "Panadería", img: "img/panaderia.jpg" },
            { name: "Peluquería", img: "img/peluqueria.jpg" },
            { name: "Pintura Artística", img: "img/pintura_artistica.jpg" },
            { name: "Pintura Avanzada", img: "img/pintura_avanzada.jpg" },
            { name: "Puntillismo Básico", img: "img/puntillismo_basico.jpg" },
            { name: "Puntillismo Avanzado", img: "img/puntillismo_avanzado.jpg" },
            { name: "Repostería", img: "img/reposteria.jpg" },
            { name: "Repostería y Pastelería", img: "img/reposteria_y_pasteleria.jpg" },
            { name: "Ropa Íntima", img: "img/ropa_intima.jpg" },
            { name: "Rostros", img: "img/rostros.jpg" },
            { name: "Tejer", img: "img/tejer.jpg" }
        ];

        function render() {
            const grid = document.getElementById('cursos-grid');
            grid.innerHTML = MIS_CURSOS.map(c => `
                <div class="course-card">
                    <div class="course-img-wrapper" onclick="ver('${c.name}')">
                        <img src="${c.img}" alt="${c.name}" onerror="this.src='img/logo.png'">
                    </div>
                    <div class="course-info">
                        <h3>${c.name}</h3>
                        <button class="btn-select" onclick="add('${c.name}', '${c.img}')">SELECCIONAR</button>
                        <button class="btn-details" onclick="ver('${c.name}')">DETALLES</button>
                    </div>
                </div>
            `).join('');
            updateCounter();
        }

        function ver(n) { window.location.href = `detalle-curso.html?curso=${encodeURIComponent(n)}`; }
        function add(n, i) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if(!cart.find(x => x.nombre === n)) {
                cart.push({nombre: n, imagen: i});
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCounter();
            }
        }
        function updateCounter() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        }
        function toggleChat() {
            const chat = document.getElementById('chat-container');
            chat.style.display = (chat.style.display === 'none' || chat.style.display === '') ? 'flex' : 'none';
        }
        function sendMessage() {
            const input = document.getElementById('user-input');
            const msgs = document.getElementById('chat-messages');
            if(!input.value.trim()) return;
            msgs.innerHTML += `<div class="msg user-msg">${input.value}</div>`;
            input.value = '';
            msgs.scrollTop = msgs.scrollHeight;
        }
        window.onscroll = function() {
            document.getElementById('scrollTop').style.display = (window.pageYOffset > 400) ? 'flex' : 'none';
        };
        window.onload = render;
    </script>
</body>
</html>
