<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos 2026 | CAE Carmen Pilar</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --whatsapp-green: #25D366;
            --glass: rgba(255, 255, 255, 0.08);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.4);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--azul-primario); 
            color: white;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.15), transparent);
        }

        /* BARRA SUPERIOR */
        .top-bar {
            background: var(--azul-primario);
            color: var(--azul-electrico);
            padding: 10px 0;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 600;
            border-bottom: 2px solid var(--azul-electrico);
        }
        .top-bar-content {
            display: flex;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 25px;
        }

        /* NAVEGACIÓN MODERNA RECOBRADA DEL INDEX */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        /* BOTONES 3D UNIFICADOS */
        .btn-2026 {
            color: white;
            padding: 10px 25px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 800;
            display: inline-block;
            transition: all 0.15s ease-in-out;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            text-align: center;
        }

        .btn-orange {
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow));
            box-shadow: 0 6px 0 #b34b00, 0 10px 15px rgba(255, 109, 0, 0.2);
        }
        .btn-green {
            background: linear-gradient(135deg, var(--whatsapp-green), #128C7E);
            box-shadow: 0 6px 0 #075E54, 0 10px 15px rgba(37, 211, 102, 0.2);
        }
        .btn-blue {
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff);
            box-shadow: 0 6px 0 #0055b3, 0 10px 15px rgba(0, 210, 255, 0.2);
        }

        .btn-2026:hover { transform: translateY(2px); }
        .btn-2026:active { transform: translateY(6px); box-shadow: 0 0 0 transparent !important; }

        /* GRID DE CURSOS */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, border-color 0.3s;
            backdrop-filter: blur(5px);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--azul-electrico); }

        .card-img-container { width: 100%; height: 180px; background: #0f2b48; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }

        .badge {
            background: rgba(0, 210, 255, 0.1); color: var(--azul-electrico);
            padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; width: fit-content; font-weight: bold;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff);
            color: var(--azul-primario); border: none; padding: 12px; border-radius: 12px;
            font-weight: bold; cursor: pointer; margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-content">
            <span> SISTEMA ACTUALIZADO 2026</span>
            <span> LA VICTORIA - ARAGUA</span>
            <span> CONTACTO: 0424-33.60.158</span>
        </div>
    </div>

    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; padding: 0 20px;">
            <div style="display:flex; align-items:center; gap:15px;">
                <img src="img/logo.png" alt="Logo" style="height:50px;">
                <h2 style="margin:0; color:var(--azul-primario);">BotEduCarmen</h2>
            </div>
            <nav style="display: flex; gap: 12px;">
                <a href="index.html" class="btn-2026 btn-orange">INICIO</a>
                <a href="https://wa.me/584243360158" target="_blank" class="btn-2026 btn-green">WHATSAPP</a>
                <a href="carrito.html" class="btn-2026 btn-blue">LISTA (<span id="cart-count">0</span>)</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 style="text-align: center; margin-top: 30px;">Catálogo Formativo <span style="color: var(--azul-electrico);">2026</span></h1>
        <div class="cursos-grid" id="cursos-grid"></div>
    </div>

    <!-- CHATBOT FLOTANTE (IGUAL AL INDEX): IZQUIERDA -->
    <div onclick="toggleChat()" style="position:fixed; bottom:30px; left:30px; background:linear-gradient(135deg, var(--azul-electrico), #0077ff); width:65px; height:65px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:9999; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
        <img src="img/chatbot.png" alt="Chatbot" style="width:35px;" onerror="this.src='img/logo.png'">
    </div>

    <!-- BOTÓN SUBIR (IGUAL AL INDEX): DERECHA -->
    <div onclick="window.scrollTo({top: 0, behavior: 'smooth'})" style="position:fixed; bottom:30px; right:30px; background:var(--azul-primario); width:55px; height:55px; border-radius:15px; display:flex; align-items:center; justify-content:center; cursor:pointer; border: 2px solid var(--azul-electrico); z-index:9999; box-shadow: var(--sombra-futurista);">
        <span style="color:var(--azul-electrico); font-size:1.5rem;">↑</span>
    </div>

    <!-- VENTANA CHATBOT (COPIA EXACTA DEL INDEX) -->
    <div id="chat-window" style="display:none; position:fixed; bottom:110px; left:30px; width:350px; height:450px; background:white; border-radius:25px; box-shadow:var(--sombra-futurista); z-index:9999; flex-direction:column; overflow:hidden; border:1px solid #ddd;">
        <div style="background:var(--azul-primario); color:white; padding:20px; font-weight:bold; display:flex; align-items:center; gap:10px;">
            <img src="img/chatbot.png" style="width:30px; background:white; border-radius:50%;" onerror="this.src='img/logo.png'">
            <span>Asistente BotEduCarmen</span>
        </div>
        <div id="chat-messages" style="flex:1; padding:15px; overflow-y:auto; background:#f1f5f9; color:#333; display:flex; flex-direction:column; gap:10px; font-size: 0.9rem;">
            <div style="background:white; padding:10px; border-radius:15px; align-self:flex-start; border-left:4px solid var(--azul-electrico);">
                ¡Hola! Estas viendo nuestro catálogo 2026. ¿Necesitas información sobre alguna inscripción?
            </div>
        </div>
        <div style="padding:15px; display:flex; gap:5px; background:white;">
            <input id="user-input" type="text" placeholder="Escribe aquí..." style="flex:1; padding:10px; border-radius:10px; border:1px solid #ccc; outline:none; color:#333;">
            <button onclick="sendMessage()" style="background:var(--azul-primario); color:var(--azul-electrico); border:none; width:40px; height:40px; border-radius:10px; cursor:pointer;">➤</button>
        </div>
    </div>

<script>
    const CURSOS = [
        { nombre: "Barbería", img: "barberia.jpg", cat: "Estética" },
        { nombre: "Cocina Nacional", img: "cocina_nacional.jpg", cat: "Gastronomía" },
        { nombre: "Cosmetología", img: "cosmetologia.jpg", cat: "Estética" },
        { nombre: "Dibujo Artístico", img: "dibujo_artistico.jpg", cat: "Arte" },
        { nombre: "Dulces Criollos", img: "dulces_criollos.jpg", cat: "Gastronomía" },
        { nombre: "Electricidad", img: "electricidad.jpg", cat: "Técnica" },
        { nombre: "Electrodomésticos", img: "electrodomesticos.jpg", cat: "Técnica" },
        { nombre: "Estética Avanzada", img: "estetica_avanzada.jpg", cat: "Estética" },
        { nombre: "Estética de Uñas", img: "estetica_de_unas.jpg", cat: "Estética" },
        { nombre: "Lencería", img: "lenceria.jpg", cat: "Textil" },
        { nombre: "Manicure y Pedicure", img: "manicure_pedicure.jpg", cat: "Estética" },
        { nombre: "Manualidades", img: "manualidades.jpg", cat: "Arte" },
        { nombre: "Masaje", img: "masaje.jpg", cat: "Estética" },
        { nombre: "Masoterapia", img: "masoterapia.jpg", cat: "Estética" },
        { nombre: "Modistería", img: "modisteria.jpg", cat: "Textil" },
        { nombre: "Panadería", img: "panaderia.jpg", cat: "Gastronomía" },
        { nombre: "Peluquería", img: "peluqueria.jpg", cat: "Estética" },
        { nombre: "Pintura Artística", img: "pintura_artistica.jpg", cat: "Arte" },
        { nombre: "Pintura Avanzada", img: "pintura_avanzada.jpg", cat: "Arte" },
        { nombre: "Puntillismo Avanzado", img: "puntillismo_avanzado.jpg", cat: "Arte" },
        { nombre: "Puntillismo Básico", img: "puntillismo_basico.jpg", cat: "Arte" },
        { nombre: "Repostería", img: "reposteria.jpg", cat: "Gastronomía" },
        { nombre: "Repostería y Pastelería", img: "reposteria_y_pasteleria.jpg", cat: "Gastronomía" },
        { nombre: "Ropa Íntima", img: "ropa_intima.jpg", cat: "Textil" },
        { nombre: "Rostros", img: "rostros.jpg", cat: "Arte" },
        { nombre: "Tejer", img: "tejer.jpg", cat: "Textil" }
    ];

    function renderCursos() {
        const grid = document.getElementById('cursos-grid');
        grid.innerHTML = CURSOS.map(c => `
            <div class="card">
                <div class="card-img-container"><img src="img/${c.img}" onerror="this.src='img/logo.png'"></div>
                <div class="card-content">
                    <span class="badge">${c.cat}</span>
                    <h3 style="font-size:1.1rem; margin:10px 0;">${c.nombre}</h3>
                    <button class="btn-add" onclick="addToCart('${c.nombre}', 'img/${c.img}')">SELECCIONAR</button>
                </div>
            </div>
        `).join('');
        updateCounter();
    }

    function addToCart(nombre, imagen) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        if(!cart.find(i => i.nombre === nombre)) {
            cart.push({nombre, imagen});
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCounter();
            alert("Curso seleccionado correctamente.");
        } else {
            alert("Este curso ya está en tu lista.");
        }
    }

    function updateCounter() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cart-count').innerText = cart.length;
    }

    /* FUNCIONES CHATBOT (COPIA DEL INDEX) */
    function toggleChat() {
        const w = document.getElementById('chat-window');
        w.style.display = (w.style.display === 'none' || w.style.display === '') ? 'flex' : 'none';
    }

    function sendMessage() {
        const input = document.getElementById('user-input');
        const box = document.getElementById('chat-messages');
        const text = input.value.trim();
        if(!text) return;

        box.innerHTML += `<div style="background:var(--azul-primario); color:white; padding:10px; border-radius:15px; align-self:flex-end; max-width:80%;">${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        setTimeout(() => {
            box.innerHTML += `<div style="background:white; padding:10px; border-radius:15px; align-self:flex-start; border-left:4px solid var(--azul-electrico); max-width:80%;">Como estamos en 2026, te informo que las inscripciones están abiertas. ¿Deseas que te guíe con la selección de cursos?</div>`;
            box.scrollTop = box.scrollHeight;
        }, 1000);
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });

    document.addEventListener('DOMContentLoaded', renderCursos);
</script>
</body>
</html>
