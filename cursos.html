<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Cursos | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; padding:15px 0;">
            <a href="index.html" style="text-decoration:none; color:white;">⬅ VOLVER</a>
            <h1 style="color:#00d2ff; margin:0;">Catálogo 2026</h1>
        </div>
    </header>

    <div class="container">
        <div id="grid-cursos" class="cursos-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:20px; padding:40px 0;">
            <!-- Se carga desde script -->
        </div>
    </div>

    <div id="cart-float" style="position:fixed; bottom:30px; left:30px; display:none;">
        <a href="contacto.html" class="btn-confirmar" style="background:#ff6d00; color:white; padding:15px 30px; border-radius:50px; text-decoration:none; font-weight:bold; box-shadow:0 5px 15px rgba(0,0,0,0.3);">
            🚀 CONFIRMAR (<span id="cart-count">0</span>)
        </a>
    </div>

    <script>
        const CURSOS = [
            {n: "Barbería", i: "Barberia.jpg"}, {n: "Panadería", i: "panaderia.jpg"},
            {n: "Estética de Uñas", i: "Estetica_de_unas.jpg"}, {n: "Modistería", i: "modisteria.jpg"},
            {n: "Repostería", i: "reposteria.jpg"}, {n: "Corte y Costura", i: "corte.jpg"}
            // Añade más según tu lista
        ];

        function cargarCursos() {
            const grid = document.getElementById('grid-cursos');
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            grid.innerHTML = CURSOS.map(c => {
                const enCart = cart.find(x => x.nombre === c.n);
                return `
                    <div class="curso-card" style="background:white; border-radius:15px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1); text-align:center;">
                        <img src="img/${c.i}" style="width:100%; height:180px; object-fit:cover;" onerror="this.src='img/logo.png'">
                        <div style="padding:20px;">
                            <h3>${c.n}</h3>
                            <button onclick="toggleSeleccion('${c.n}')" style="width:100%; padding:10px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; background:${enCart ? '#444' : '#ff6d00'}; color:white;">
                                ${enCart ? '✖ QUITAR' : '✚ SELECCIONAR'}
                            </button>
                        </div>
                    </div>`;
            }).join('');
            actualizarUI();
        }

        function toggleSeleccion(nombre) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const idx = cart.findIndex(x => x.nombre === nombre);
            if (idx > -1) cart.splice(idx, 1);
            else cart.push({nombre});
            localStorage.setItem('cart', JSON.stringify(cart));
            cargarCursos();
        }

        function actualizarUI() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-float').style.display = cart.length > 0 ? "block" : "none";
            document.getElementById('cart-count').innerText = cart.length;
        }

        document.addEventListener('DOMContentLoaded', cargarCursos);
    </script>
    <script src="chatbot.js"></script>
</body>
</html>
