<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
            --verde-whatsapp: #25d366;
        }

        body { 
            background-color: var(--azul-p); color: white; 
            font-family: 'Inter', sans-serif; margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(15px);
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }

        /* Botón Inicio mejorado */
        .btn-nav {
            background: #1e293b; color: var(--electrico) !important;
            padding: 10px 25px; border-radius: 12px; text-decoration: none;
            font-weight: 700; border: 1px solid var(--electrico); transition: 0.3s;
        }
        .btn-nav:hover { background: var(--electrico); color: var(--azul-p) !important; }

        .search-container { text-align: center; margin: 30px 0; }
        #buscador { 
            width: 80%; max-width: 500px; padding: 15px; border-radius: 30px; 
            border: 1px solid var(--electrico); background: var(--glass); color: white; outline: none;
        }

        .cursos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; padding: 20px; }
        
        .curso-card {
            background: var(--glass); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; transition: 0.3s; text-align: center;
        }
        .curso-card:hover { transform: translateY(-5px); border-color: var(--electrico); }
        .curso-img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .curso-info { padding: 20px; }

        .btn-accion {
            border: none; padding: 12px; border-radius: 10px; width: 100%; 
            cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase;
        }
        .btn-seleccionar { background: var(--naranja); color: white; }
        .btn-quitar { background: #444; color: #ccc; border: 1px solid #666; }

        /* Botones Flotantes */
        #cart-float { position: fixed; bottom: 30px; left: 30px; z-index: 2000; display: none; }
        .btn-confirmar {
            background: white; color: var(--azul-p); text-decoration: none; padding: 15px 30px;
            border-radius: 50px; font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        #back-to-top {
            position: fixed; bottom: 30px; right: 30px; z-index: 3000;
            background: var(--electrico); color: var(--azul-p); padding: 10px 15px;
            border-radius: 50px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div class="header-brand">
                <img src="img/logo.png" alt="Logo">
                <h1 style="font-size: 1.4rem; margin:0;">BotEduCarmen <span style="color:var(--electrico)">2026</span></h1>
            </div>
            <nav>
                <a href="index.html" class="btn-nav">INICIO</a>
            </nav>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="buscador" placeholder="🔍 ¿Qué quieres aprender hoy?" onkeyup="filtrar()">
    </div>

    <div id="grid-cursos" class="cursos-grid container"></div>

    <div id="cart-float">
        <a href="contacto.html" class="btn-confirmar">🚀 CONFIRMAR INSCRIPCIÓN (<span id="cart-count">0</span>)</a>
    </div>

    <div id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑ ARRIBA</div>

    <script>
        const CURSOS = [
            {n: "Barbería", i: "barberia.jpg"}, {n: "Estética Avanzada", i: "estetica_avanzada.jpg"},
            {n: "Masaje Corporales", i: "masaje.jpg"}, {n: "Puntillismo Avanzado", i: "puntillismo_avanzado.jpg"},
            {n: "Estética de Uñas", i: "estetica_de_unas.jpg"}, {n: "Masoterapia", i: "masoterapia.jpg"},
            {n: "Puntillismo Básico", i: "puntillismo_basico.jpg"}, {n: "Cosmetología", i: "cosmetologia.jpg"},
            {n: "Modistería", i: "modisteria.jpg"}, {n: "Repostería", i: "reposteria.jpg"},
            {n: "Dibujo Artístico", i: "dibujo_artistico.jpg"}, {n: "Lencería", i: "lenceria.jpg"},
            {n: "Panadería", i: "panaderia.jpg"}, {n: "Pastelería", i: "reposteria_y_pasteleria.jpg"},
            {n: "Dulces Criollos", i: "dulces_criollos.jpg"}, {n: "Peluquería", i: "peluqueria.jpg"},
            {n: "Ropa Íntima", i: "ropa_intima.jpg"}, {n: "Electricidad", i: "electricidad.jpg"},
            {n: "Manicure y Pedicure", i: "manicure_pedicure.jpg"}, {n: "Pintura Artística", i: "pintura_artistica.jpg"},
            {n: "Rostros", i: "rostros.jpg"}, {n: "Electrodomésticos", i: "electrodomesticos.jpg"},
            {n: "Manualidades", i: "manualidades.jpg"}, {n: "Pintura Avanzada", i: "pintura_avanzada.jpg"},
            {n: "Tejido y Crochet", i: "tejer.jpg"}
        ];

        function cargarCursos() {
            const grid = document.getElementById('grid-cursos');
            const seleccionados = JSON.parse(localStorage.getItem('cart')) || [];
            grid.innerHTML = CURSOS.map(c => {
                const estaEnCart = seleccionados.find(x => x.nombre === c.n);
                return `
                    <div class="curso-card" data-name="${c.n.toLowerCase()}">
                        <img src="img/${c.i}" class="curso-img" onerror="this.src='img/logo.png'">
                        <div class="curso-info">
                            <h3>${c.n}</h3>
                            <button onclick="toggleSeleccion('${c.n}', 'img/${c.i}')" class="btn-accion ${estaEnCart ? 'btn-quitar' : 'btn-seleccionar'}">
                                ${estaEnCart ? '✖ QUITAR' : '✚ SELECCIONAR'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleSeleccion(nombre, imagen) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const index = cart.findIndex(x => x.nombre === nombre);
            index !== -1 ? cart.splice(index, 1) : cart.push({ nombre, imagen });
            localStorage.setItem('cart', JSON.stringify(cart));
            cargarCursos();
            actualizarUI();
        }

        function filtrar() {
            let val = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.curso-card').forEach(card => {
                card.style.display = card.dataset.name.includes(val) ? "block" : "none";
            });
        }

        function actualizarUI() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-float').style.display = cart.length > 0 ? "block" : "none";
            document.getElementById('cart-count').innerText = cart.length;
        }

        document.addEventListener('DOMContentLoaded', () => { cargarCursos(); actualizarUI(); });
    </script>
</body>
</html>
