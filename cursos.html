<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--azul-p); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }

        nav { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: 0.3s; font-size: 0.95rem; }
        .nav-links a:hover { color: var(--electrico); }

        .btn-cart-nav {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--electrico);
            padding: 8px 16px;
            border-radius: 50px;
            color: var(--electrico);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-cart-nav:hover { background: var(--electrico); color: var(--azul-p); transform: scale(1.05); }

        .search-section { max-width: 1200px; margin: 40px auto 20px; padding: 0 20px; display: flex; gap: 20px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 280px; position: relative; }
        .search-box input { width: 100%; padding: 15px 20px; border-radius: 12px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; font-size: 1rem; box-sizing: border-box; transition: 0.3s; }
        .search-box input:focus { border-color: var(--electrico); box-shadow: 0 0 15px rgba(0,210,255,0.2); }
        
        .filter-select { padding: 0 20px; height: 52px; border-radius: 12px; background: var(--azul-p); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 1rem; outline: none; cursor: pointer; transition: 0.3s; }
        .filter-select:focus { border-color: var(--electrico); }

        .cursos-grid { max-width: 1200px; margin: 0 auto 60px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        .card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; height: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--electrico); box-shadow: 0 15px 35px rgba(0,210,255,0.15); }
        .card img { width: 100%; height: 190px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .card-body { padding: 25px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { margin: 0 0 10px; font-size: 1.3rem; color: white; }
        
        .btn-detalles { display: block; text-align: center; width: 100%; margin-top: 10px; padding: 10px; text-decoration: none; color: rgba(255,255,255,0.6); font-size: 0.85rem; font-weight: bold; transition: 0.3s; }
        .btn-detalles:hover { color: var(--electrico); }

        #btn-subir { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: var(--naranja); border: none; border-radius: 50%; color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 99; box-shadow: 0 5px 15px rgba(255,109,0,0.4); }
        #btn-subir:hover { transform: scale(1.1); background: #e65c00; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="header-brand">
                <img src="img/logo.png" onerror="this.src='img/logo.png'">
                <h1 style="margin:0; font-size:1.4rem; letter-spacing:1px; color:white;">CAE <span style="color:var(--electrico)">CARMEN PILAR</span></h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="cursos.html" style="color:var(--electrico)">Catálogo</a>
                <a href="admin.html">Panel</a>
                <a href="carrito.html" class="btn-cart-nav">
                    🛒 Mi Lista (<span id="cart-count">0</span>)
                </a>
            </div>
        </nav>
    </header>

    <div class="search-section">
        <div class="search-box">
            <input type="text" id="buscador" oninput="filtrarCatalogo()" placeholder="🔍 Buscar especialidad formativa por nombre...">
        </div>
        <select id="filtro-categoria" onchange= "filtrarCatalogo()" class="filter-select">
            <option value="todos">🗂️ Todas las Categorías</option>
            <option value="gastronomía">Gastronomía</option>
            <option value="textil y diseño">Textil y Diseño</option>
            <option value="estética">Estética</option>
            <option value="arte">Arte</option>
            <option value="técnica">Área Técnica</option>
        </select>
    </div>

    <div class="cursos-grid" id="cursos-grid"></div>

    <button id="btn-subir" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</button>

    <script>
        // LISTA OFICIAL GLOBAL DE CURSOS (12 Cursos Sincronizados)
        const BASE_DATOS_CURSOS = [
            { n: "Cocina Nacional", c: "Gastronomía", i: "cocina.jpg" },
            { n: "Panadería", c: "Gastronomía", i: "cocina.jpg" },
            { n: "Repostería y Pastelería", c: "Gastronomía", i: "pasteleria.jpg" },
            { n: "Modistería", c: "Textil y Diseño", i: "modisteria.jpg" },
            { n: "Lencería y Ropa Íntima", c: "Textil y Diseño", i: "ropa_intima.jpg" },
            { n: "Tejido y Crochet", c: "Textil y Diseño", i: "tejer.jpg" },
            { n: "Barbería y Peluquería", c: "Estética", i: "barberia.jpg" },
            { n: "Manicure y Pedicure", c: "Estética", i: "manicure_y_pedicure.jpg" },
            { n: "Masajes y Masoterapia", c: "Estética", i: "masajes_y_masoterapia.jpg" },
            { n: "Dibujo y Pintura Artística", c: "Arte", i: "logo.png" },
            { n: "Fundamentos de Electricidad", c: "Técnica", i: "fundamentos_de_electricidad.jpg" },
            { n: "Reparación de Electrodomésticos", c: "Técnica", i: "reparacion_de_electrodomesticos.jpg" }
        ];

        // RENDERIZADO CORREGIDO SIN ERRORES 404 (Usa directamente la clave .i)
        function cargarCursos() {
            const grid = document.getElementById('cursos-grid');
            if(!grid) return;

            grid.innerHTML = BASE_DATOS_CURSOS.map(curso => {
                const archivoImagen = curso.i;
                return `
                    <div class="card" data-name="${curso.n.toLowerCase()}" data-cat="${curso.c.toLowerCase()}">
                        <img src="img/${archivoImagen}" onerror="this.src='img/logo.png'">
                        <div class="card-body">
                            <div>
                                <span style="font-size:0.8rem; background:rgba(0,210,255,0.1); color:var(--electrico); padding:4px 10px; border-radius:50px; font-weight:bold; text-transform:uppercase;">${curso.c}</span>
                                <h3 class="card-title" style="margin-top:10px;">${curso.n}</h3>
                                <p style="color:rgba(255,255,255,0.6); font-size:0.9rem; margin:5px 0;">Certificación Avalada Gratuita</p>
                            </div>
                            <div style="margin-top:15px;">
                                <button onclick="agregarAlCarrito('${curso.n}', 'img/${archivoImagen}')" style="width:100%; padding:12px; border-radius:10px; background:var(--electrico); color:var(--azul-p); border:none; font-weight:bold; cursor:pointer; transition:0.3s; font-size:0.95rem;">✚ SELECCIONAR</button>
                                <a href="detalle-curso.html?curso=${encodeURIComponent(curso.n)}" class="btn-detalles">🔎 VER REQUISITOS</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            actualizarContadorUI();
        }

        // LÓGICA DEL BUSCADOR Y FILTRADO POR CATEGORÍAS
        function filtrarCatalogo() {
            const textoBusqueda = document.getElementById('buscador').value.toLowerCase();
            const categoriaSeleccionada = document.getElementById('filtro-categoria').value.toLowerCase();
            const tarjetas = document.querySelectorAll('.card');

            tarjetas.forEach(tarjeta => {
                const nombreCurso = tarjeta.getAttribute('data-name');
                const categoriaCurso = tarjeta.getAttribute('data-cat');

                const cumpleNombre = nombreCurso.includes(textoBusqueda);
                const cumpleCategoria = (categoriaSeleccionada === 'todos' || categoriaCurso === categoriaSeleccionada);

                if (cumpleNombre && cumpleCategoria) {
                    tarjeta.style.display = 'flex';
                } else {
                    tarjeta.style.display = 'none';
                }
            });
        }

        // SISTEMA DE SELECCIÓN DE CURSOS COMPATIBLE CON CARRITO.HTML
        function agregarAlCarrito(nombre, img) {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (carrito.some(item => item.nombre.trim().toLowerCase() === nombre.trim().toLowerCase())) {
                alert("⚠️ Este curso ya lo tienes agregado en tu lista de selección.");
                return;
            }

            carrito.push({ nombre: nombre.trim(), imagen: img });
            localStorage.setItem('cart', JSON.stringify(carrito));
            actualizarContadorUI();

            // Mensaje elegante flotante de confirmación
            alert(`✅ "${nombre}" se añadió correctamente a tu selección.`);
        }

        function actualizarContadorUI() {
            const carrito = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cart-count');
            if(badge) badge.textContent = carrito.length;
        }

        // CONTROL DE BOTÓN FLOTANTE "SUBIR"
        window.addEventListener('scroll', () => {
            const btnSubir = document.getElementById('btn-subir');
            if (window.scrollY > 400) {
                btnSubir.style.opacity = '1';
                btnSubir.style.pointerEvents = 'auto';
            } else {
                btnSubir.style.opacity = '0';
                btnSubir.style.pointerEvents = 'none';
            }
        });

        document.addEventListener('DOMContentLoaded', cargarCursos);
    </script>
</body>
</html>
