<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --glass: rgba(255, 255, 255, 0.08);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.4);
            --naranja: #ff6d00;
        }

        body { 
            background-color: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-brand img {
            height: 50px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: var(--azul-electrico);
        }

        .btn-cart-nav {
            background: var(--azul-electrico);
            border: 1px solid var(--azul-electrico);
            padding: 8px 16px;
            border-radius: 50px;
            color: var(--azul-primario) !important;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-header-whatsapp {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #25D366;
            color: white !important;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
            transition: 0.3s;
        }
        .btn-header-whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .catalogo-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .filtros-wrapper {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .input-busqueda {
            flex: 2;
            background: rgba(10, 25, 47, 0.7);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .select-filtro {
            flex: 1;
            background: rgba(10, 25, 47, 0.7);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, border-color 0.3s;
            box-shadow: var(--sombra-futurista);
            backdrop-filter: blur(10px);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--azul-electrico); }

        .card-link-img img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .card-body {
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title { font-size: 1.25rem; margin: 0 0 10px 0; font-weight: 700; }
        .card-title a { color: white; text-decoration: none; transition: 0.3s; }
        .card-title a:hover { color: var(--azul-electrico); }

        .btn-detalles {
            display: block;
            text-align: center;
            text-decoration: none;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
            opacity: 0.7;
            transition: 0.3s;
        }
        .btn-detalles:hover { opacity: 1; color: var(--azul-electrico); }

        #btn-subir {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--naranja-neon);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 99;
            box-shadow: 0 5px 15px rgba(255,109,0,0.4);
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="header-brand">
                <img src="img/logo.png" onerror="this.onerror=null; this.src='img/logo.png';">
                <h1 style="margin: 0; font-size: 1.4rem; letter-spacing: 1px;">CAE <span style="color: var(--azul-electrico)">CARMEN PILAR</span></h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="cursos.html" style="color: var(--azul-electrico);">Catálogo</a>
                <a href="carrito.html" class="btn-cart-nav">
                    🛒 Mi Lista (<span id="cart-count">0</span>)
                </a>
                <a href="https://wa.me/584243360158?text=Hola,%20estoy%20viendo%20el%20cat%C3%A1logo%20de%20cursos%20y%20tengo%20preguntas." target="_blank" class="btn-header-whatsapp">
                    WhatsApp
                </a>
            </div>
        </nav>
    </header>

    <main class="catalogo-container">
        <div class="filtros-wrapper">
            <input type="text" id="buscador" class="input-busqueda" placeholder="Buscar especialidad..." oninput="filtrarCatalogo()">
            <select id="filtro-categoria" class="select-filtro" onchange="filtrarCatalogo()">
                <option value="todos">Todas las Áreas</option>
                <option value="Gastronomía">Gastronomía</option>
                <option value="Textil y Diseño">Textil y Diseño</option>
                <option value="Estética">Estética</option>
                <option value="Técnica">Técnica</option>
                <option value="Arte">Arte</option>
            </select>
        </div>
        <div id="cursos-grid" class="cursos-grid"></div>
    </main>

    <button id="btn-subir" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">▲</button>

    <div id="chat-icon" onclick="toggleChat()" style="position: fixed; bottom: 30px; left: 30px; width: 85px; height: 85px; cursor: pointer; z-index: 5000; animation: pulse 2s infinite;">
        <img src="img/chatbot.png" style="width: 100%; height: 100%; object-fit: contain; border-radius: 50%; filter: drop-shadow(0 0 15px var(--azul-electrico));" onerror="this.style.display='none'; document.getElementById('fb').style.display='flex';">
        <div id="fb" style="display: none; width: 100%; height: 100%; background: var(--azul-primario); border-radius: 50%; align-items: center; justify-content: center; color: white; font-size: 40px; border: 3px solid var(--azul-electrico);">🤖</div>
    </div>

    <div id="chat-window" style="position: fixed; bottom: 130px; left: 30px; width: 380px; height: 550px; background: white; border-radius: 30px; box-shadow: 0 25px 70px rgba(0,0,0,0.4); z-index: 5000; display: none; flex-direction: column; overflow: hidden; border: 2px solid var(--azul-primario); color: #1e293b;">
        <div style="background: var(--azul-primario); color: white; padding: 25px; text-align: center; font-weight: 800; font-size: 1.3rem;">
            🤖 AI ASISTENTE 2026
        </div>
        <div id="chat-messages" style="flex: 1; padding: 25px; overflow-y: auto; background: #f1f5f9; display: flex; flex-direction: column; gap: 15px; font-size: 0.95rem;">
            <div style="background: white; padding: 15px; border-radius: 20px; align-self: flex-start; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--azul-electrico); color: #1e293b;">
                ¡Hola! Bienvenido al asistente virtual del CAE Carmen Pilar. ¿Qué especialidad o área te interesa hoy?
            </div>
        </div>
        <div style="padding: 20px; background: white; display: flex; gap: 10px;">
            <input type="text" id="user-input" placeholder="Pregunta algo..." style="flex: 1; padding: 15px; border: 2px solid #e2e8f0; border-radius: 20px; outline: none; background: white; color: #1e293b;" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="background: var(--azul-primario); color: var(--azul-electrico); border: none; width: 55px; height: 55px; border-radius: 20px; cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; justify-content: center;">➤</button>
        </div>
    </div>

    <script>
        const BASE_DATOS_CURSOS = [
            { n: "Cocina Nacional", c: "Gastronomía", i: "cocina_nacional.jpg" },
            { n: "Panadería", c: "Gastronomía", i: "panaderia.jpg" },
            { n: "Repostería y Pastelería", c: "Gastronomía", i: "reposteria_y_pasteleria.jpg" },
            { n: "Repostería Básica", c: "Gastronomía", i: "reposteria.jpg" },
            { n: "Dulces Criollos", c: "Gastronomía", i: "dulces_criollos.jpg" },
            { n: "Modistería", c: "Textil y Diseño", i: "modisteria.jpg" },
            { n: "Lencería y Ropa Íntima", c: "Textil y Diseño", i: "ropa_intima.jpg" },
            { n: "Lencería Hogar", c: "Textil y Diseño", i: "lenceria.jpg" },
            { n: "Tejido y Crochet", c: "Textil y Diseño", i: "tejer.jpg" },
            { n: "Barbería Comercial", c: "Estética", i: "barberia.jpg" },
            { n: "Peluquería Básica", c: "Estética", i: "peluqueria.jpg" },
            { n: "Manicure y Pedicure", c: "Estética", i: "manicure_pedicure.jpg" },
            { n: "Estética de Uñas", c: "Estética", i: "estetica_de_unas.jpg" },
            { n: "Masajes Corporales", c: "Estética", i: "masaje.jpg" },
            { n: "Masoterapia Profesional", c: "Estética", i: "masoterapia.jpg" },
            { n: "Cosmetología Clínica", c: "Estética", i: "cosmetologia.jpg" },
            { n: "Fundamentos de Electricidad", c: "Técnica", i: "electricidad.jpg" },
            { n: "Reparación de Electrodomésticos", c: "Técnica", i: "electrodomesticos.jpg" },
            { n: "Dibujo Artístico", c: "Arte", i: "dibujo_artistico.jpg" },
            { n: "Pintura Artística", c: "Arte", i: "pintura_artistica.jpg" },
            { n: "Pintura Avanzada", c: "Arte", i: "pintura_avanzada.jpg" },
            { n: "Puntillismo Básico", c: "Arte", i: "puntillismo_basico.jpg" },
            { n: "Puntillismo Avanzado", c: "Arte", i: "puntillismo_avanzado.jpg" },
            { n: "Manualidades Creativas", c: "Arte", i: "manualidades.jpg" },
            { n: "Dibujo de Rostros", c: "Arte", i: "rostros.jpg" }
        ];

        function cargarCursos() {
            const grid = document.getElementById('cursos-grid');
            if(!grid) return;

            grid.innerHTML = BASE_DATOS_CURSOS.map(curso => {
                const archivoImagen = curso.i;
                const urlDetalle = `detalle-curso.html?curso=${encodeURIComponent(curso.n)}`;
                
                return `
                    <div class="card" data-name="${curso.n.toLowerCase()}" data-cat="${curso.c.toLowerCase()}">
                        <a href="${urlDetalle}" class="card-link-img">
                            <img src="img/${archivoImagen}" onerror="this.onerror=null; this.src='img/logo.png';">
                        </a>
                        <div class="card-body">
                            <div>
                                <span style="font-size: 0.8rem; background: rgba(0, 210, 255, 0.1); color: var(--azul-electrico); padding: 4px 10px; border-radius: 50px; font-weight: bold; text-transform: uppercase;">${curso.c}</span>
                                <h3 class="card-title" style="margin-top: 10px;">
                                    <a href="${urlDetalle}">${curso.n}</a>
                                </h3>
                                <p style="color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; margin: 5px 0;">Certificación Avalada Gratuita</p>
                            </div>
                            <div style="margin-top: 15px;">
                                <button onclick="agregarAlCarrito('${curso.n}', 'img/${archivoImagen}')" style="width: 100%; padding: 12px; border-radius: 10px; background: var(--azul-electrico); color: var(--azul-primario); border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.95rem;">✚ SELECCIONAR</button>
                                <a href="${urlDetalle}" class="btn-detalles">🔎 VER REQUISITOS</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            actualizarContadorUI();
        }

        function filtrarCatalogo() {
            const textoBusqueda = document.getElementById('buscador').value.toLowerCase().trim();
            const categoriaSeleccionada = document.getElementById('filtro-categoria').value.toLowerCase().trim();
            const tarjetas = document.querySelectorAll('.card');

            tarjetas.forEach(tarjeta => {
                const nombreCurso = tarjeta.getAttribute('data-name');
                const categoriaCurso = tarjeta.getAttribute('data-cat');
                const cumpleNombre = nombreCurso.includes(textoBusqueda);
                const cumpleCategoria = (categoriaSeleccionada === 'todos' || categoriaCurso === categoriaSeleccionada.toLowerCase());

                if (cumpleNombre && cumpleCategoria) tarjeta.style.display = 'flex';
                else tarjeta.style.display = 'none';
            });
        }

        function agregarAlCarrito(nombre, img) {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            if (carrito.some(item => item.nombre.toLowerCase() === nombre.toLowerCase())) {
                alert("⚠️ Este curso ya lo tienes agregado en tu lista de selección.");
                return;
            }
            carrito.push({ nombre: nombre.trim(), imagen: img });
            localStorage.setItem('cart', JSON.stringify(carrito));
            actualizarContadorUI();
            alert(`✅ "${nombre}" se agregó correctamente.`);
        }

        function actualizarContadorUI() {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cart-count');
            if(badge) badge.textContent = carrito.length;
        }

        function toggleChat() {
            const w = document.getElementById('chat-window');
            w.style.display = (w.style.display === 'none' || w.style.display === '') ? 'flex' : 'none';
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-messages');
            const text = input.value.trim();
            if(!text) return;

            box.innerHTML += `<div style="background:var(--azul-primario); color:white; padding:15px; border-radius:20px; align-self:flex-end; max-width:80%; word-break: break-word;">${text}</div>`;
            
            setTimeout(() => {
                box.innerHTML += `<div style="background:white; padding:15px; border-radius:20px; align-self:flex-start; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--azul-electrico); color: #1e293b;">Entendido de forma correcta. Te recomiendo ver las opciones del área seleccionada.</div>`;
                box.scrollTop = box.scrollHeight;
            }, 700);
            input.value = "";
        }

        window.addEventListener('scroll', () => {
            const btnSubir = document.getElementById('btn-subir');
            if (window.scrollY > 400) { btnSubir.style.opacity = '1'; btnSubir.style.pointerEvents = 'auto'; }
            else { btnSubir.style.opacity = '0'; btnSubir.style.pointerEvents = 'none'; }
        });

        document.addEventListener('DOMContentLoaded', cargarCursos);
    </script>

    <style>
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 210, 255, 0); }
            100% { transform: scale(1); }
        }
    </style>
</body>
</html>
