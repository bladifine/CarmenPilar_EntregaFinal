<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: var(--azul-primario); 
            color: white;
            overflow-x: hidden;
        }

        /* NAVBAR IGUAL A INDEX */
        .navbar {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .nav-links { display: flex; align-items: center; gap: 15px; }
        
        .nav-btn {
            text-decoration: none;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        
        .btn-whatsapp-nav { background: #25D366; color: white !important; }
        .btn-admin-nav { background: #4a148c; color: white !important; }
        .btn-cart-nav { background: var(--glass); border: 1px solid var(--azul-electrico); }

        /* GRID Y TARJETAS */
        .courses-grid { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
        }
        
        .course-card {
            background: var(--glass); 
            border-radius: 25px; 
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }
        .course-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--azul-electrico);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
        }
        
        .course-img-wrapper { width: 100%; height: 200px; cursor: pointer; overflow: hidden; background: #000; }
        .course-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .course-info { padding: 20px; text-align: center; }
        .course-info h3 { margin: 0 0 15px; font-size: 1.1rem; min-height: 50px; }

        .btn-select {
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow));
            color: white; border: none; padding: 12px; width: 100%; border-radius: 12px;
            font-weight: 800; cursor: pointer; margin-bottom: 10px;
            box-shadow: 0 4px 0 #b34b00;
        }
        .btn-details {
            background: transparent; color: var(--azul-electrico); border: 1px solid var(--azul-electrico);
            padding: 10px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 600;
        }

        /* BOTONES FLOTANTES */
        .float-btn {
            position: fixed; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2000; transition: 0.3s;
        }
        .btn-ia { bottom: 30px; right: 30px; background: linear-gradient(135deg, var(--azul-electrico), #0077ff); }
        .btn-scroll { bottom: 30px; left: 30px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: white; border: none; font-size: 20px; display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div onclick="window.location.href='index.html'" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
                <img src="img/logo.png" width="35" alt="Logo">
                <span style="font-weight:900; font-size: 1.2rem;">BotEduCarmen</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">Inicio</a>
                <a href="https://wa.me/584243360158" target="_blank" class="nav-btn btn-whatsapp-nav">WhatsApp</a>
                <a href="admin.html" class="nav-btn btn-admin-nav">Admin</a>
                <a href="carrito.html" class="nav-btn btn-cart-nav">🛒 <span id="cart-count">0</span></a>
            </div>
        </div>
    </nav>

    <div class="courses-grid" id="cursos-grid"></div>

    <!-- BOTONES FLOTANTES -->
    <div class="float-btn btn-ia" onclick="toggleChat()">
        <img src="img/chatbot.png" width="35" onerror="this.src='img/logo.png'">
    </div>
    <button class="float-btn btn-scroll" id="scrollTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆</button>

    <script>
        const MIS_CURSOS = [
            { name: "Modistería", img: "img/modisteria.jpg" },
            { name: "Cocina Bilingüe", img: "img/cocina.jpg" },
            { name: "Barbería Profesional", img: "img/barberia.jpg" },
            { name: "Estética de Uñas", img: "img/estetica_de_unas.jpg" },
            { name: "Corte y Confección", img: "img/corte_y_confeccion.jpg" },
            { name: "Lencería", img: "img/lenceria.jpg" },
            { name: "Ropa Infantil", img: "img/ropa_infantil.jpg" },
            { name: "Sastrería", img: "img/sastreria.jpg" },
            { name: "Pastelería", img: "img/pasteleria.jpg" },
            { name: "Panadería Artesanal", img: "img/panaderia.jpg" },
            { name: "Peluquería", img: "img/peluqueria.jpg" },
            { name: "Maquillaje Profesional", img: "img/maquillaje.jpg" },
            { name: "Cejas y Pestañas", img: "img/cejas.jpg" },
            { name: "Masajes", img: "img/masajes.jpg" },
            { name: "Primeros Auxilios", img: "img/primeros_auxilios.jpg" },
            { name: "Reparación de Celulares", img: "img/celulares.jpg" },
            { name: "Electrónica", img: "img/electronica.jpg" },
            { name: "Informática", img: "img/informatica.jpg" },
            { name: "Diseño Gráfico", img: "img/diseno.jpg" },
            { name: "Inglés", img: "img/ingles.jpg" },
            { name: "Contabilidad", img: "img/contabilidad.jpg" },
            { name: "Asistente Administrativo", img: "img/asistente.jpg" },
            { name: "Manualidades", img: "img/manualidades.jpg" },
            { name: "Pintura sobre Tela", img: "img/pintura.jpg" },
            { name: "Decoración", img: "img/decoracion.jpg" }
        ];

        function render() {
            const grid = document.getElementById('cursos-grid');
            grid.innerHTML = MIS_CURSOS.map(c => `
                <div class="course-card">
                    <div class="course-img-wrapper" onclick="ver('${c.name}')">
                        <img src="${c.img}" alt="${c.name}" onerror="this.src='img/logo.png'">
                    </div>
                    <div class="course-info">
                        <h3>${c.name}</h3>
                        <button class="btn-select" onclick="add('${c.name}', '${c.img}')">SELECCIONAR</button>
                        <button class="btn-details" onclick="ver('${c.name}')">VER DETALLES</button>
                    </div>
                </div>
            `).join('');
            updateCounter();
        }

        function ver(n) { window.location.href = `detalle-curso.html?curso=${encodeURIComponent(n)}`; }

        function add(n, i) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if(!cart.find(x => x.nombre === n)) {
                cart.push({nombre: n, imagen: i});
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCounter();
            }
        }

        function updateCounter() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').innerText = cart.length;
        }

        window.onscroll = function() {
            document.getElementById('scrollTop').style.display = (window.pageYOffset > 400) ? 'flex' : 'none';
        };

        window.onload = render;
    </script>
</body>
</html>
