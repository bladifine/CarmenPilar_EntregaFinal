<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos 2026 | CAE Carmen Pilar</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--azul-primario); 
            color: white;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 999;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0, 210, 255, 0.2);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        /* GRID DE CURSOS */
        .courses-grid { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 25px; 
        }
        
        .course-card {
            background: var(--glass); 
            border-radius: 20px; 
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .course-card:hover { transform: translateY(-10px); border-color: var(--azul-electrico); }
        
        .course-img-wrapper { width: 100%; height: 160px; cursor: pointer; overflow: hidden; }
        .course-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .course-info { padding: 20px; }
        .course-info h3 { margin: 0 0 10px; font-size: 1.1rem; }

        .btn-select {
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow));
            color: white; border: none; padding: 10px; width: 100%; border-radius: 10px;
            font-weight: bold; cursor: pointer; margin-bottom: 8px;
        }

        .btn-details {
            background: rgba(0, 210, 255, 0.1);
            color: var(--azul-electrico); border: 1px solid var(--azul-electrico);
            padding: 10px; width: 100%; border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div onclick="window.location.href='index.html'" style="cursor:pointer; font-weight:800;">CAE CARMEN PILAR</div>
            <a href="carrito.html" style="color:white; text-decoration:none;">🛒 Carrito</a>
        </div>
    </nav>

    <div class="courses-grid" id="cursos-grid"></div>

    <script>
        // LA LISTA COMPLETA DE TUS 25 CURSOS CON SUS IMÁGENES REALES
        const MIS_CURSOS = [
            { name: "Modistería", cat: "Costura", img: "img/modisteria.jpg" },
            { name: "Corte y Confección", cat: "Costura", img: "img/corte_y_confeccion.jpg" },
            { name: "Lencería Íntima", cat: "Costura", img: "img/lenceria.jpg" },
            { name: "Ropa Infantil", cat: "Costura", img: "img/ropa_infantil.jpg" },
            { name: "Sastrería", cat: "Costura", img: "img/sastreria.jpg" },
            { name: "Cocina Bilingüe", cat: "Gastronomía", img: "img/cocina.jpg" },
            { name: "Pastelería y Repostería", cat: "Gastronomía", img: "img/pasteleria.jpg" },
            { name: "Panadería Artesanal", cat: "Gastronomía", img: "img/panaderia.jpg" },
            { name: "Barbería Profesional", cat: "Estética", img: "img/barberia.jpg" },
            { name: "Peluquería Básica", cat: "Estética", img: "img/peluqueria.jpg" },
            { name: "Uñas Acrílicas", cat: "Estética", img: "img/estetica_de_unas.jpg" },
            { name: "Maquillaje Profesional", cat: "Estética", img: "img/maquillaje.jpg" },
            { name: "Cejas y Pestañas", cat: "Estética", img: "img/cejas.jpg" },
            { name: "Masaje Terapéutico", cat: "Salud", img: "img/masajes.jpg" },
            { name: "Primeros Auxilios", cat: "Salud", img: "img/primeros_auxilios.jpg" },
            { name: "Reparación de Celulares", cat: "Tecnología", img: "img/celulares.jpg" },
            { name: "Electrónica Básica", cat: "Tecnología", img: "img/electronica.jpg" },
            { name: "Informática/Office", cat: "Tecnología", img: "img/informatica.jpg" },
            { name: "Diseño Gráfico", cat: "Tecnología", img: "img/diseno.jpg" },
            { name: "Inglés Básico", cat: "Idiomas", img: "img/ingles.jpg" },
            { name: "Contabilidad Básica", cat: "Administración", img: "img/contabilidad.jpg" },
            { name: "Asistente Administrativo", cat: "Administración", img: "img/asistente.jpg" },
            { name: "Manualidades", cat: "Arte", img: "img/manualidades.jpg" },
            { name: "Pintura sobre Tela", cat: "Arte", img: "img/pintura.jpg" },
            { name: "Decoración de Fiestas", cat: "Arte", img: "img/decoracion.jpg" }
        ];

        function renderCursos() {
            const grid = document.getElementById('cursos-grid');
            grid.innerHTML = MIS_CURSOS.map(c => `
                <div class="course-card">
                    <div class="course-img-wrapper" onclick="verDetalle('${c.name}')">
                        <img src="${c.img}" alt="${c.name}" onerror="this.src='img/logo.png'">
                    </div>
                    <div class="course-info">
                        <h3>${c.name}</h3>
                        <button class="btn-select" onclick="add('${c.name}', '${c.img}')">AGREGAR</button>
                        <button class="btn-details" onclick="verDetalle('${c.name}')">DETALLES</button>
                    </div>
                </div>
            `).join('');
        }

        function verDetalle(nombre) {
            window.location.href = `detalle-curso.html?curso=${encodeURIComponent(nombre)}`;
        }

        function add(n, i) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if(!cart.find(x => x.nombre === n)) {
                cart.push({nombre: n, imagen: i});
                localStorage.setItem('cart', JSON.stringify(cart));
                alert("Agregado al carrito");
            }
        }

        window.onload = renderCursos;
    </script>
</body>
</html>
