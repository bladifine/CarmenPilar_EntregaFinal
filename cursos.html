<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--azul-p); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }
        .header-brand h2 { margin: 0; font-size: 1.5rem; color: white; letter-spacing: 1px; }

        .search-container {
            max-width: 600px;
            margin: 50px auto 30px;
            padding: 0 20px;
            text-align: center;
        }

        #buscador {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid rgba(0, 210, 255, 0.3);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.1rem;
            outline: none;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        #buscador:focus {
            border-color: var(--electrico);
            box-shadow: 0 0 15px rgba(0,210,255,0.3);
        }

        .grid-cursos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .curso-card {
            background: var(--glass);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .curso-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-color: rgba(0,210,255,0.3);
        }

        .curso-img-box {
            height: 200px;
            background: #112240;
            position: relative;
            overflow: hidden;
        }

        .curso-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .curso-info { padding: 25px; }
        .tag {
            background: rgba(0, 210, 255, 0.1);
            color: var(--electrico);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .curso-info h3 { margin: 15px 0 10px; font-size: 1.3rem; color: white; }
        .costo { margin: 0; color: rgba(255,255,255,0.6); font-size: 0.95rem; }
        .costo b { color: #4caf50; }

        .btn-primary {
            flex: 1;
            background: var(--electrico);
            color: var(--azul-p);
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: white; }
        .btn-primary.seleccionado { background: #4caf50; color: white; }

        .btn-detalles {
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.1rem;
        }
        .btn-detalles:hover { background: rgba(255,255,255,0.2); }

        #cart-float {
            position: fixed;
            bottom: 40px;
            left: 40px;
            background: var(--naranja);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(255,152,0,0.4);
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <header>
        <div style="max-width:1200px; margin:0 auto; padding:0 20px; display:flex; justify-content:space-between; align-items:center;">
            <div class="header-brand">
                <img src="img/logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/50'">
                <h2>BotEduCarmen</h2>
            </div>
            <nav>
                <a href="index.html" style="color:white; text-decoration:none; font-weight:600; margin-right:20px;">INICIO</a>
                <a href="carrito.html" style="color:var(--electrico); text-decoration:none; font-weight:600;">MI LISTA</a>
            </nav>
        </div>
    </header>

    <div class="search-container">
        <h1 style="font-size:2.5rem; margin-bottom:10px;">Cursos Disponibles 2026</h1>
        <p style="color:rgba(255,255,255,0.6); margin-bottom:30px;">Selecciona los cursos en los que deseas inscribirte de manera gratuita</p>
        <input type="text" id="buscador" onkeyup="filtrarCursos()" placeholder="🔍 Buscar tu área de interés...">
    </div>

    <main class="grid-cursos" id="cursos-grid">
        </main>

    <a href="carrito.html" id="cart-float">
        💼 VER MI SELECCIÓN (<span id="cart-count">0</span>)
    </a>

    <script src="cursos.js"></script>
</body>
</html>
