<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --whatsapp-green: #25D366;
            --glass: rgba(255, 255, 255, 0.08);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.4);
        }

        body { 
            background-color: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 2px solid var(--azul-electrico);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 55px; }

        .nav-links { display: flex; gap: 15px; align-items: center; }

        .btn-nav-2026 {
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: all 0.15s ease-in-out;
            border: none;
            cursor: pointer;
        }

        .btn-orange {
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow));
            box-shadow: 0 5px 0 #b34b00, 0 8px 15px rgba(255, 109, 0, 0.2);
        }
        .btn-blue {
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff);
            box-shadow: 0 5px 0 #0055b3, 0 8px 15px rgba(0, 210, 255, 0.2);
        }
        .btn-green {
            background: linear-gradient(135deg, var(--whatsapp-green), #128C7E);
            box-shadow: 0 5px 0 #075E54, 0 8px 15px rgba(37, 211, 102, 0.2);
        }

        .btn-nav-2026:hover { transform: translateY(2px); }
        .btn-nav-2026:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }

        .catalogo-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .filtros-wrapper {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            display: flex; gap: 20px;
            margin-bottom: 40px;
        }

        .input-busqueda, .select-filtro {
            background: rgba(10, 25, 47, 0.7);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }
        .input-busqueda { flex: 2; }
        .select-filtro { flex: 1; }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            min-height: 400px;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.3s;
            box-shadow: var(--sombra-futurista);
            backdrop-filter: blur(10px);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--azul-electrico); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 25px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        #btn-subir {
            position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px;
            background: var(--naranja-neon); border: none; border-radius: 50%;
            color: white; cursor: pointer; opacity: 0; transition: 0.3s; z-index: 999;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 210, 255, 0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="header-brand">
                <img src="img/logo.png" onerror="this.src='img/logo.png';">
                <h1 style="margin: 0; font-size: 1.4rem; letter-spacing: 1px;">CAE <span style="color: var(--azul-electrico)">CARMEN PILAR</span></h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="btn-nav-2026 btn-orange">Inicio</a>
                <a href="cursos.html" class="btn-nav-2026 btn-orange">Catálogo</a>
                <a href="carrito.html" class="btn-nav-2026 btn-blue">🛒 Mi Lista (<span id="cart-count">0</span>)</a>
                <a href="https://wa.me/584243360158" target="_blank" class="btn-nav-2026 btn-green">WhatsApp</a>
            </div>
        </nav>
    </header>

    <main class="catalogo-container">
        <div class="filtros-wrapper">
            <input type="text" id="buscador" class="input-busqueda" placeholder="Buscar especialidad..." onkeyup="filtrarCatalogo()">
            <select id="filtro-categoria" class="select-filtro" onchange="filtrarCatalogo()">
                <option value="todos">Todas las Áreas</option>
                <option value="Gastronomía">Gastronomía</option>
                <option value="Textil y Diseño">Textil y Diseño</option>
                <option value="Estética">Estética</option>
                <option value="Técnica">Técnica</option>
                <option value="Arte">Arte</option>
            </select>
        </div>
        <div id="cursos-grid" class="cursos-grid">
            </div>
    </main>

    <button id="btn-subir" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">▲</button>

    <div id="chat-icon" onclick="toggleChat()" style="position: fixed; bottom: 30px; left: 30px; width: 85px; height: 85px; cursor: pointer; z-index: 5000; animation: pulse 2s infinite;">
        <img src="img/chatbot.png" style="width: 100%; height: 100%; object-fit: contain; border-radius: 50%;" onerror="this.style.display='none'; document.getElementById('fb').style.display='flex';">
        <div id="fb" style="display: none; width: 100%; height: 100%; background: var(--azul-primario); border-radius: 50%; align-items: center; justify-content: center; color: white; font-size: 40px; border: 3px solid var(--azul-electrico);">🤖</div>
    </div>

    <script>
        // Mapeo completo basado estrictamente en el contenido real de tu carpeta /img
        const BASE_DATOS_CURSOS = [
            // ÁREA: GASTRONOMÍA
            { n: "Cocina Nacional", c: "Gastronomía", i: "cocina_nacional.jpg" },
            { n: "Panadería", c: "Gastronomía", i: "panaderia.jpg" },
            { n: "Repostería Básica", c: "Gastronomía", i: "reposteria.jpg" },
            { n: "Repostería y Pastelería", c: "Gastronomía", i: "reposteria_y_pasteleria.jpg" },
            { n: "Dulces Criollos", c: "Gastronomía", i: "dulces_criollos.jpg" },
            
            // ÁREA: ESTÉTICA
            { n: "Barbería Comercial", c: "Estética", i: "barberia.jpg" },
            { n: "Peluquería Básica", c: "Estética", i: "peluqueria.jpg" },
            { n: "Estética de Uñas", c: "Estética", i: "estetica_de_unas.jpg" },
            { n: "Estética Avanzada", c: "Estética", i: "estetica_avanzada.jpg" },
            { n: "Manicure y Pedicure", c: "Estética", i: "manicure_pedicure.jpg" },
            { n: "Cosmetología Clínica", c: "Estética", i: "cosmetologia.jpg" },
            { n: "Masajes Corporales", c: "Estética", i: "masaje.jpg" },
            { n: "Masoterapia Profesional", c: "Estética", i: "masoterapia.jpg" },

            // ÁREA: TEXTIL Y DISEÑO
            { n: "Modistería", c: "Textil y Diseño", i: "modisteria.jpg" },
            { n: "Lencería Hogar", c: "Textil y Diseño", i: "lenceria.jpg" },
            { n: "Tejido y Crochet", c: "Textil y Diseño", i: "tejer.jpg" },
            { n: "Lencería y Ropa Íntima", c: "Textil y Diseño", i: "ropa_intima.jpg" },

            // ÁREA: TÉCNICA
            { n: "Fundamentos de Electricidad", c: "Técnica", i: "electricidad.jpg" },
            { n: "Reparación de Electrodomésticos", c: "Técnica", i: "electrodomesticos.jpg" },

            // ÁREA: ARTE
            { n: "Dibujo Artístico", c: "Arte", i: "dibujo_artistico.jpg" },
            { n: "Pintura Artística", c: "Arte", i: "pintura_artistica.jpg" },
            { n: "Pintura Avanzada", c: "Arte", i: "pintura_avanzada.jpg" },
            { n: "Puntillismo Básico", c: "Arte", i: "puntillismo_basico.jpg" },
            { n: "Puntillismo Avanzado", c: "Arte", i: "puntillismo_avanzado.jpg" },
            { n: "Manualidades Creativas", c: "Arte", i: "manualidades.jpg" },
            { n: "Dibujo de Rostros", c: "Arte", i: "rostros.jpg" }
        ];

        function cargarCursos() {
            const grid = document.getElementById('cursos-grid');
            if (!grid) return;
            
            grid.innerHTML = BASE_DATOS_CURSOS.map(curso => {
                const urlDetalle = `detalle-curso.html?curso=${encodeURIComponent(curso.n)}`;
                return `
                    <div class="card" data-name="${curso.n.toLowerCase()}" data-cat="${curso.c.toLowerCase()}">
                        <img src="img/${curso.i}" onerror="this.src='img/logo.png'">
                        <div class="card-body">
                            <div>
                                <span style="font-size: 0.7rem; background: rgba(0,210,255,0.1); color: var(--azul-electrico); padding: 4px 10px; border-radius: 50px; font-weight: bold;">${curso.c}</span>
                                <h3 style="margin: 10px 0; font-size: 1.2rem; min-height: 40px;">${curso.n}</h3>
                                <p style="color: rgba(255,255,255,0.6); font-size: 0.85rem; margin: 0 0 15px 0;">Certificación Oficial 2026</p>
                            </div>
                            <div>
                                <button onclick="agregarAlCarrito('${curso.n}', 'img/${curso.i}')" style="width: 100%; padding: 12px; border-radius: 10px; background: var(--azul-electrico); color: var(--azul-primario); border: none; font-weight: bold; cursor: pointer;">✚ SELECCIONAR</button>
                                <a href="${urlDetalle}" style="display:block; text-align:center; color:white; font-size:0.8rem; margin-top:10px; text-decoration:none; opacity:0.7;">🔎 DETALLES</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            actualizarContadorUI();
        }

        function filtrarCatalogo() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const cat = document.getElementById('filtro-categoria').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const matchNombre = card.getAttribute('data-name').includes(texto);
                const matchCat = (cat === 'todos' || card.getAttribute('data-cat') === cat);
                card.style.display = (matchNombre && matchCat) ? 'flex' : 'none';
            });
        }

        function agregarAlCarrito(nombre, img) {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            if (carrito.some(item => item.nombre === nombre)) {
                alert("⚠️ Este curso ya está en tu lista."); return;
            }
            carrito.push({ nombre, imagen: img });
            localStorage.setItem('cart', JSON.stringify(carrito));
            actualizarContadorUI();
            alert(`✅ ${nombre} añadido.`);
        }

        function actualizarContadorUI() {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            const badge = document.getElementById('cart-count');
            if(badge) badge.textContent = carrito.length;
        }

        function toggleChat() {
            // Vinculación simple para evitar errores si no se importa chatbot.js en esta vista
            alert("Asistente virtual listo. Consulta las categorías o añade cursos.");
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('btn-subir');
            btn.style.opacity = window.scrollY > 400 ? '1' : '0';
        });

        document.addEventListener('DOMContentLoaded', cargarCursos);
    </script>
</body>
</html>
