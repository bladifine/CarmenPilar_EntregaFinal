<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --whatsapp-green: #25D366;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body { 
            background-color: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        header {
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 2px solid var(--azul-electrico);
            position: sticky; top: 0; z-index: 1000;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto; padding: 0 20px;
        }

        .nav-links { display: flex; gap: 15px; align-items: center; }

        /* CORRECCIÓN DEL BOTÓN DE INICIO */
        .btn-nav-2026 {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 10px 24px;
            border-radius: 50px; /* Forma de pastilla */
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            min-width: 100px;
            height: 40px;
            box-sizing: border-box;
        }

        .btn-orange {
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow));
            box-shadow: 0 4px 0 #b34b00;
        }

        .btn-blue {
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff);
            box-shadow: 0 4px 0 #0055b3;
        }

        .btn-green {
            background: linear-gradient(135deg, var(--whatsapp-green), #128C7E);
            box-shadow: 0 4px 0 #075E54;
        }

        .btn-nav-2026:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-nav-2026:active { transform: translateY(2px); box-shadow: none; }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px; padding: 40px 20px; max-width: 1200px; margin: 0 auto;
        }

        .card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
            transition: 0.3s;
        }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="header-brand">
                <img src="img/logo.png" height="50">
            </div>
            <div class="nav-links">
                <a href="index.html" class="btn-nav-2026 btn-orange">Inicio</a>
                <a href="carrito.html" class="btn-nav-2026 btn-blue">Carrito (<span id="cart-count">0</span>)</a>
            </div>
        </nav>
    </header>

    <div id="cursos-grid" class="cursos-grid"></div>

    <script>
        const CURSOS = [
            { n: "Cocina Nacional", i: "cocina_nacional.jpg" },
            { n: "Lenceria", i: "lenceria.jpg" },
            { n: "Panaderia", i: "panaderia.jpg" },
            { n: "Reposteria", i: "reposteria.jpg" }
            // Agrega el resto manteniendo el formato { n: "Nombre", i: "archivo.jpg" }
        ];

        function cargar() {
            const grid = document.getElementById('cursos-grid');
            grid.innerHTML = CURSOS.map(c => `
                <div class="card">
                    <img src="img/${c.i}?v=2026" onerror="this.src='img/logo.png'">
                    <div class="card-body">
                        <h3>${c.n}</h3>
                        <a href="detalle-curso.html?curso=${encodeURIComponent(c.n)}" style="color:var(--azul-electrico); text-decoration:none; font-weight:bold; margin-top:auto;">VER DETALLES →</a>
                    </div>
                </div>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', cargar);
    </script>
</body>
</html>
