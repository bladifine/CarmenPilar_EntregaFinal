<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--azul-p); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 40px; }

        .catalog-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        .search-box {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        .search-box input {
            background: transparent; border: 0; color: white; width: 100%; font-size: 1.1rem; outline: none;
        }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .curso-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
        }

        .curso-card:hover { transform: translateY(-5px); border-color: var(--electrico); }
        .curso-card img { width: 100%; height: 200px; object-fit: cover; }
        
        .curso-info { padding: 20px; }
        .badge { background: rgba(0, 210, 255, 0.1); color: var(--electrico); padding: 5px 10px; border-radius: 50px; font-size: 0.8rem; }

        .btn-seleccion {
            width: 100%; background: transparent; border: 2px solid var(--electrico); color: var(--electrico);
            padding: 12px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-seleccion.activo { background: var(--electrico); color: var(--azul-p); }

        /* Botón Flotante */
        .cart-float {
            position: fixed; bottom: 30px; right: 30px; background: var(--naranja);
            padding: 20px; border-radius: 50px; text-decoration: none; color: white;
            font-weight: bold; box-shadow: 0 10px 30px rgba(255,109,0,0.3); display: none;
        }
    </style>
</head>
<body>

    <header>
        <div style="max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; padding:0 20px;">
            <div class="header-brand">
                <img src="img/logo.png" alt="Logo">
                <h2 style="margin:0; font-size:1.4rem;">BotEduCarmen</h2>
            </div>
            <nav><a href="index.html" style="color:white; text-decoration:none;">Inicio</a></nav>
        </div>
    </header>

    <div class="catalog-container">
        <div class="search-box">
            <input type="text" id="buscador" oninput="filtrar()" placeholder="Buscar especialidad (Costura, Cocina, Barbería...)">
        </div>

        <div class="cursos-grid" id="cursos-grid">
            </div>
    </div>

    <a href="carrito.html" class="cart-float" id="cart-float">
        💼 VER SELECCIÓN (<span id="cart-count">0</span>)
    </a>

    <script src="cursos.js"></script>
    <script>
        // Carga y renderizado dinámico de cursos
        function cargarCursos() {
            const grid = document.getElementById('cursos-grid');
            if (!grid) return;

            let cart = JSON.parse(localStorage.getItem('cart')) || [];

            // Se utiliza el arreglo global MIS_CURSOS que ya viene de cursos.js sin duplicarlo aquí
            grid.innerHTML = MIS_CURSOS.map(c => {
                const yaSeleccionado = cart.some(x => x.nombre.trim() === c.name.trim());
                const textoBtn = yaSeleccionado ? "✓ SELECCIONADO" : "SELECCIONAR CURSO";
                const claseBtn = yaSeleccionado ? "activo" : "";

                return `
                    <div class="curso-card" data-name="${c.name.toLowerCase()} ${c.cat.toLowerCase()}">
                        <img src="${c.img}" alt="${c.name}" onerror="this.onerror=null; this.src='img/logo.png';">
                        <div class="curso-info">
                            <span class="badge">${c.cat}</span>
                            <h3 style="margin: 10px 0 5px 0; font-size:1.3rem;">${c.name}</h3>
                            <p style="margin:0; color:rgba(255,255,255,0.6); font-size:0.9rem;">Modalidad: Presencial</p>
                            <button onclick="toggleSeleccion('${c.name}', '${c.img}')" class="btn-seleccion ${claseBtn}">
                                ${textoBtn}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleSeleccion(nombre, imagen) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const nLimpio = nombre.trim();
            const index = cart.findIndex(x => x.nombre.trim() === nLimpio);

            if (index !== -1) {
                cart.splice(index, 1);
            } else {
                cart.push({ nombre: nLimpio, imagen });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            cargarCursos(); 
            actualizarUI();
        }

        function filtrar() {
            let val = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.curso-card').forEach(card => {
                card.style.display = card.dataset.name.includes(val) ? "block" : "none";
            });
        }

        function actualizarUI() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-float').style.display = cart.length > 0 ? "block" : "none";
            document.getElementById('cart-count').innerText = cart.length;
        }

        document.addEventListener('DOMContentLoaded', () => {
            cargarCursos();
            actualizarUI();
        });
    </script>
</body>
</html>
