<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--azul-p); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }

        nav { display: flex; align-items: center; gap: 20px; }

        /* Botón de WhatsApp integrado en el Header */
        .btn-header-whatsapp {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-header-whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-2px);
        }

        .search-container { text-align: center; margin: 30px 0; }
        #buscador { 
            width: 80%; max-width: 500px; padding: 15px; 
            border-radius: 30px; border: 1px solid var(--electrico); 
            background: var(--glass); color: white; outline: none;
        }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px; margin: 0 auto;
        }

        .curso-card {
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transition: 0.3s;
            text-align: center;
        }
        .curso-card:hover { transform: translateY(-5px); border-color: var(--electrico); }

        .curso-img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .curso-info { padding: 20px; }

        .btn-accion {
            border: none; padding: 12px; border-radius: 10px; width: 100%; 
            cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase;
        }
        .btn-seleccionar { background: var(--naranja); color: white; box-shadow: 0 4px 15px rgba(255, 109, 0, 0.3); }
        .btn-quitar { background: #444; color: #ccc; border: 1px solid #666; }

        /* Botón flotante Confirmar Selección */
        #cart-float {
            position: fixed; bottom: 30px; left: 30px; z-index: 2000; display: none;
        }
        .btn-confirmar {
            background: white; color: var(--azul-p); text-decoration: none;
            padding: 15px 30px; border-radius: 50px; font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid var(--electrico);
        }

        /* Botón Inteligente Volver Arriba */
        #btn-subir {
            position: fixed; bottom: 105px; left: 30px; width: 55px; height: 55px; 
            background: var(--azul-p); border: 2px solid var(--electrico); color: var(--electrico); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,210,255,0.3); 
            z-index: 1900; transition: 0.3s; opacity: 0; pointer-events: none;
        }
        #btn-subir:hover { background: var(--electrico); color: var(--azul-p); }
    </style>
</head>
