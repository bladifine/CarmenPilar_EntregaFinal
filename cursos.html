<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-p: #0a192f;
            --electrico: #00d2ff;
            --naranja: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
            --verde-whatsapp: #25d366;
        }

        body { 
            background-color: var(--azul-p); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent);
        }

        header {
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-brand { display: flex; align-items: center; gap: 15px; }
        .header-brand img { height: 50px; }

        .search-container { text-align: center; margin: 30px 0; }
        #buscador { 
            width: 80%; max-width: 500px; padding: 15px; 
            border-radius: 30px; border: 1px solid var(--electrico); 
            background: var(--glass); color: white; outline: none;
        }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px; margin: 0 auto;
        }

        .curso-card {
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transition: 0.3s;
            text-align: center;
        }
        .curso-card:hover { transform: translateY(-5px); border-color: var(--electrico); }

        .curso-img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .curso-info { padding: 20px; }

        .btn-accion {
            border: none; padding: 12px; border-radius: 10px; width: 100%; 
            cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase;
        }
        .btn-seleccionar { background: var(--naranja); color: white; box-shadow: 0 4px 15px rgba(255, 109, 0, 0.3); }
        .btn-quitar { background: #444; color: #ccc; border: 1px solid #666; }

        #cart-float { position: fixed; bottom: 30px; left: 30px; z-index: 2000; display: none; }
        .btn-confirmar {
            background: white; color: var(--azul-p); text-decoration: none;
            padding: 15px 30px; border-radius: 50px; font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid var(--electrico);
        }

        /* ESTILOS CHATBOT Y WHATSAPP */
        #whatsapp-btn { position: fixed; bottom: 120px; right: 30px; width: 65px; height: 65px; background: var(--verde-whatsapp); border-radius: 50%; z-index: 5000; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px rgba(37,211,102,0.3); }
        #chat-icon { position: fixed; bottom: 30px; right: 30px; width: 75px; height: 75px; cursor: pointer; z-index: 5000; animation: pulsarSobresalir 2.2s infinite ease-in-out; }
        #chat-icon img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--electrico); }
        @keyframes pulsarSobresalir { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto; padding:0 20px;">
            <div class="header-brand">
                <img src="img/logo.png" alt="Logo">
                <h1 style="font-size: 1.4rem; margin:0;">BotEduCarmen <span style="color:var(--electrico)">2026</span></h1>
            </div>
            <nav>
                <a href="index.html" style="color:white; text-decoration:none; margin-right:20px;">Inicio</a>
                <a href="admin.html" style="color:var(--naranja); text-decoration:none;">Admin</a>
            </nav>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="buscador" placeholder="🔍 ¿Qué quieres aprender hoy?" onkeyup="filtrar()">
    </div>

    <div id="grid-cursos" class="cursos-grid"></div>

    <div id="cart-float">
        <a href="contacto.html" class="btn-confirmar">🚀 CONFIRMAR INSCRIPCIÓN (<span id="cart-count">0</span>)</a>
    </div>

    <div id="whatsapp-btn" onclick="window.open('https://wa.me/584243360158', '_blank')">

    </div>

    <div id="chat-icon" onclick="window.location.href='index.html'">
        <img src="img/chatbot.png" alt="Chatbot">
    </div>
