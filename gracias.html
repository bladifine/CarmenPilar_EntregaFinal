<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Inscripción Exitosa! | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { 
            background: #0a192f; color: white; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            background-image: radial-gradient(circle at center, rgba(0, 210, 255, 0.1), transparent);
        }
        .success-card { 
            text-align: center; background: rgba(255,255,255,0.05); padding: 50px; 
            border-radius: 30px; border: 1px solid #00d2ff; backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); max-width: 500px; width: 90%;
        }
        .check { font-size: 5rem; color: #00d2ff; text-shadow: 0 0 20px rgba(0,210,255,0.5); }
        .btn-action { 
            display: block; width: 100%; max-width: 320px; margin: 15px auto;
            padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold;
            font-size: 1rem; transition: 0.3s; text-align: center; box-sizing: border-box;
        }
        .btn-ws { background: #25D366; color: white; box-shadow: 0 8px 20px rgba(37,211,102,0.3); }
        .btn-ws:hover { background: #20ba5a; transform: translateY(-2px); }
        .btn-home { background: transparent; color: #00d2ff; border: 2px solid #00d2ff; }
        .btn-home:hover { background: rgba(0,210,255,0.1); }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="check">✓</div>
        <h1 style="font-size: 2.2rem; margin: 20px 0 10px;">¡Registro Exitoso!</h1>
        <p style="color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 35px;">
            Tus datos han sido almacenados de forma segura en nuestro servidor en la nube.
        </p>

        <a id="enlace-whatsapp-dinamico" href="#" target="_blank" class="btn-action btn-ws">
            📢 NOTIFICAR AL PROFESOR POR WS
        </a>

        <a href="index.html" class="btn-home btn-action">Volver al Inicio</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = sessionStorage.getItem('ultimo_nombre') || "Estudiante Nuevo";
            const cursos = sessionStorage.getItem('ultimos_cursos') || "Mis cursos seleccionados";
            
            // Reemplazado por tu número real y el mensaje codificado correctamente para la API de WhatsApp
            const miTelefono = "584243360158";
            const mensajeTexto = `Hola Bladimir, ya completé mi registro en la plataforma web.\n\n👤 Estudiante: ${nombre}\n📚 Cursos: ${cursos}`;
            const urlFinal = `https://wa.me/${miTelefono}?text=${encodeURIComponent(mensajeTexto)}`;
            
            document.getElementById('enlace-whatsapp-dinamico').href = urlFinal;
        });
    </script>
</body>
</html>
