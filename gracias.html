<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Éxito! | BotEduCarmen</title>
    <style>
        body { 
            background: #0a192f; color: white; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            background-image: radial-gradient(circle at center, rgba(0, 210, 255, 0.1), transparent);
        }
        .success-card { 
            text-align: center; background: rgba(255,255,255,0.05); padding: 50px; 
            border-radius: 30px; border: 1px solid #00d2ff; backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); max-width: 500px; width: 90%;
        }
        .check { font-size: 5rem; color: #00d2ff; text-shadow: 0 0 20px rgba(0,210,255,0.5); }
        .btn-home { 
            background: #00d2ff; color: #0a192f; padding: 15px 30px; 
            border-radius: 50px; text-decoration: none; font-weight: 800; display: inline-block; margin-top: 30px;
        }

        /* 📱 ESTILO BOTÓN WHATSAPP */
        .btn-whatsapp-flotante {
            position: fixed; bottom: 20px; left: 30px;
            width: 60px; height: 60px; background: #25D366; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; text-decoration: none; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            z-index: 99999; transition: 0.3s;
        }
        .btn-whatsapp-flotante:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="check">✔</div>
        <h1>¡PROCESO COMPLETADO!</h1>
        <p>Tus datos han sido encriptados y enviados al sistema central del CAE.</p>
        <p style="color:gray">Pronto recibirás una notificación vía WhatsApp.</p>
        <a href="index.html" class="btn-home">FINALIZAR SESIÓN</a>
    </div>

    <div id="chat-window" style="display:none; position:fixed; bottom:90px; right:30px; width:350px; height:450px; background:white; z-index:99999; flex-direction:column; border-radius:15px; box-shadow:0 5px 25px rgba(0,0,0,0.3); overflow:hidden; font-family:'Segoe UI', sans-serif;">
        <div style="background:#0a192f; color:#00d2ff; padding:15px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
            <span>🤖 Asistente CAE</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">✖</button>
        </div>
        <div id="chat-messages" style="flex:1; padding:15px; overflow-y:auto; background:#f8fafc; display:flex; flex-direction:column; gap:10px;">
            <div style="text-align:left;">
                <div style="background:white; color:#1e293b; padding:12px 18px; border-radius:20px 20px 20px 0; display:inline-block; font-size:0.95rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #00d2ff;">
                    ¡Hola! Tu registro fue exitoso. Si tienes dudas sobre los inicios de clases, puedes consultarme aquí.
                </div>
            </div>
        </div>
        <div style="padding:10px; border-top:1px solid #e2e8f0; display:flex; background:white; gap:5px;">
            <input type="text" id="user-input" placeholder="Pregúntame algo..." style="flex:1; padding:10px; border:1px solid #cbd5e1; border-radius:20px; outline:none; color:#333;">
            <button onclick="sendMessage()" style="background:#0a192f; color:#00d2ff; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center;">➤</button>
        </div>
    </div>

    <a href="https://wa.me/584121234567?text=Hola%20profesor,%20ya%20completé%20mi%20inscripción%20en%20la%20página%20web." 
       target="_blank" class="btn-whatsapp-flotante">💬</a>

    <button onclick="toggleChat()" style="position:fixed; bottom:20px; right:30px; width:60px; height:60px; background:#0a192f; color:#00d2ff; border:2px solid #00d2ff; border-radius:50%; font-size:1.8rem; cursor:pointer; box-shadow:0 4px 15px rgba(0,210,255,0.4); z-index:99999; display:flex; align-items:center; justify-content:center;">🤖</button>

    <script src="chatbot.js"></script>
</body>
</html>
