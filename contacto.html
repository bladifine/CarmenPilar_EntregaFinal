<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos Personales 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
            --glass: rgba(255, 255, 255, 0.05);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--azul-primario);
            color: white;
            background-image: radial-gradient(circle at top left, rgba(0, 210, 255, 0.1), transparent);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .form-box { background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; margin: 40px auto; width: 90%; box-shadow: var(--sombra-futurista); }
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .input-group input { padding: 12px 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; font-size: 1rem; outline: none; }
        .input-group input:focus { border-color: var(--azul-electrico); }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%;">
            <h2 style="margin:0; color:var(--azul-electrico)">Paso Final de Inscripción</h2>
            <a href="carrito.html" style="color: white; text-decoration: none;">← Volver</a>
        </div>
    </header>

    <div class="form-box">
        <h3 style="margin-top:0; color:var(--azul-electrico); text-align: center;">Formulario Digital de Registro</h3>
        <p style="font-size:0.9rem; color:rgba(255,255,255,0.7); text-align:center; margin-bottom:25px;">Introduce tus datos auténticos para enlazar tus cupos en la base de datos.</p>
        
        <div class="input-group">
            <label>Nombre Completo:</label>
            <input type="text" id="nombre-usuario" placeholder="Ej: Juan Pérez">
        </div>

        <div class="input-group">
            <label>Cédula de Identidad:</label>
            <input type="number" id="cedula-usuario" placeholder="Ej: 27123456">
        </div>

        <div class="input-group">
            <label>Resumen de Materias Elegidas:</label>
            <textarea id="cursos-inscribir" readonly style="padding:12px; border-radius:10px; background:rgba(0,0,0,0.4); color:var(--azul-electrico); border:1px solid rgba(255,255,255,0.1); font-family:inherit; resize:none; font-weight:bold; outline:none;" rows="3"></textarea>
        </div>

        <button id="btn-submit-form" onclick="enviarInscripcionCloud()" style="width:100%; padding:15px; background:var(--naranja-neon); color:white; border:none; border-radius:10px; font-weight:800; font-size:1rem; cursor:pointer; box-shadow:0 4px 15px rgba(255,109,0,0.3); margin-top:10px;">FINALIZAR E INSCRIBIRSE 🚀</button>
    </div>

    <div id="chat-window" style="display:none; position:fixed; bottom:90px; right:30px; width:350px; height:450px; background:white; z-index:99999; flex-direction:column; border-radius:15px; box-shadow:0 5px 25px rgba(0,0,0,0.3); overflow:hidden; font-family:'Segoe UI', sans-serif;">
        <div style="background:#0a192f; color:#00d2ff; padding:15px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
            <span>🤖 Asistente CAE</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">✖</button>
        </div>
        <div id="chat-messages" style="flex:1; padding:15px; overflow-y:auto; background:#f8fafc; display:flex; flex-direction:column; gap:10px;">
            <div style="text-align:left;">
                <div style="background:white; color:#1e293b; padding:12px 18px; border-radius:20px 20px 20px 0; display:inline-block; font-size:0.95rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #00d2ff;">
                    Estás en el paso de sincronización. Ingresa tu Nombre y Cédula para enviar los datos de forma segura a Firebase.
                </div>
            </div>
        </div>
        <div style="padding:10px; border-top:1px solid #e2e8f0; display:flex; background:white; gap:5px;">
            <input type="text" id="user-input" placeholder="Pregúntame algo..." style="flex:1; padding:10px; border:1px solid #cbd5e1; border-radius:20px; outline:none; color:#333;">
            <button onclick="sendMessage()" style="background:#0a192f; color:#00d2ff; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:1.2rem; display:flex; align-items:center; justify-content:center;">➤</button>
        </div>
    </div>

    <button onclick="toggleChat()" style="position:fixed; bottom:20px; right:30px; width:60px; height:60px; background:#0a192f; color:#00d2ff; border:2px solid #00d2ff; border-radius:50%; font-size:1.8rem; cursor:pointer; box-shadow:0 4px 15px rgba(0,210,255,0.4); z-index:99999; display:flex; align-items:center; justify-content:center;">
        🤖
    </button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Configuración Firebase (Reemplázala por tus credenciales del proyecto si varían)
        const firebaseConfig = {
            databaseURL: "https://capifer-database-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function inicializarFormulario() {
            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            if(carrito.length === 0) {
                alert("No tienes cursos preseleccionados. Volviendo al catálogo.");
                window.location.href = "cursos.html";
                return;
            }
            // Mostrar nombres separados por coma
            document.getElementById('cursos-inscribir').value = carrito.map(x => x.nombre).join(', ');
        }

        document.addEventListener('DOMContentLoaded', inicializarFormulario);

        function enviarInscripcionCloud() {
            const nombreUser = document.getElementById('nombre-usuario').value.trim();
            const cedulaUser = document.getElementById('cedula-usuario').value.trim();
            const cursosInscribirTexto = document.getElementById('cursos-inscribir').value;
            const btnSubmit = document.getElementById('btn-submit-form');

            if (!nombreUser || !cedulaUser) {
                alert("Por favor rellene todos los campos.");
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Sincronizando con la nube...";

            const nuevoId = Date.now().toString();
            const fechaHoraString = new Date().toLocaleString();

            database.ref('inscritos/' + nuevoId).set({
                id: nuevoId,
                nombre: nombreUser,
                cedula: cedulaUser,
                cursos: cursosInscribirTexto,
                fecha: fechaHoraString
            })
            .then(() => {
                localStorage.removeItem('cart');
                window.location.href = "gracias.html";
            })
            .catch((error) => {
                alert("Error de conexión con la nube de Firebase: " + error.message);
                btnSubmit.disabled = false;
                btnSubmit.innerText = "FINALIZAR E INSCRIBIRSE 🚀";
            });
        }
    </script>
    <script src="chatbot.js"></script>
</body>
</html>
