<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos Personales 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
            --sombra-futurista: 0 20px 40px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0; background-color: var(--azul-primario); color: white;
            background-image: radial-gradient(circle at top left, rgba(0, 210, 255, 0.1), transparent);
            min-height: 100vh; display: flex; flex-direction: column;
        }

        header { background: rgba(10, 25, 47, 0.8); backdrop-filter: blur(10px); padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .form-container { max-width: 550px; margin: 40px auto; padding: 40px; background: var(--glass); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: var(--sombra-futurista); }
        input { width: 100%; padding: 15px; margin: 10px 0 25px; border-radius: 12px; border: 2px solid #1e293b; background: rgba(10,25,47,0.7); color: white; font-size: 1rem; box-sizing: border-box; }
        input:focus { border-color: var(--azul-electrico); outline: none; }
        .btn-submit { width: 100%; background: linear-gradient(135deg, var(--naranja-neon), #ff9100); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(255,109,0,0.3); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(255,109,0,0.5); }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <header>
        <div style="max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center;">
            <a href="carrito.html" style="color: var(--azul-electrico); text-decoration: none; font-weight: bold;">⬅ Volver al Resumen</a>
            <h2 style="margin:0; font-size:1.3rem;">Registro de Matrícula 2026</h2>
            <div></div>
        </div>
    </header>

    <div class="form-container">
        <h2 style="margin-top:0; color:var(--azul-electrico);">Finalizar Inscripción</h2>
        <p style="color:rgba(255,255,255,0.6); margin-bottom:30px;">Introduce tus datos de identidad para procesar los cupos en la base de datos.</p>
        
        <div style="background:rgba(0,210,255,0.1); padding:15px 20px; border-radius:15px; border-left:4px solid var(--azul-electrico); margin-bottom:25px;">
            <span style="font-size:0.85rem; color:var(--azul-electrico); font-weight:bold; display:block;">CURSOS A PROCESAR:</span>
            <span id="resumen-cursos" style="font-weight:bold; font-size:1.1rem;">Cargando selección...</span>
        </div>

        <form id="form-inscripcion" onsubmit="procesarFormulario(event)">
            <label style="font-weight:600;">Nombre y Apellido completo:</label>
            <input type="text" id="nombre" required placeholder="Ej. Bladimir Silva">

            <label style="font-weight:600;">Cédula de Identidad:</label>
            <input type="text" id="cedula" required placeholder="Ej. 28123456">

            <button type="submit" id="btn-submit-form" class="btn-submit">FINALIZAR E INSCRIBIRSE 🚀</button>
        </form>
    </div>

    <script>
        // Configuración oficial de tu Firebase Realtime Database
        const firebaseConfig = {
            databaseURL: "https://boteducarmen-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let cursosInscribirTexto = "";

        // Leer los datos del carrito real del localStorage al cargar la vista
        document.addEventListener('DOMContentLoaded', () => {
            const datosCart = JSON.parse(localStorage.getItem('cart') || '[]');
            if(datosCart.length === 0) {
                alert("⚠️ No tienes cursos seleccionados en tu lista.");
                window.location.href = "cursos.html";
                return;
            }
            const nombresCursos = datosCart.map(item => item.nombre);
            cursosInscribirTexto = nombresCursos.join(', ');
            document.getElementById('resumen-cursos').innerText = cursosInscribirTexto;
        });

        function procesarFormulario(event) {
            event.preventDefault();

            const nombreUser = document.getElementById('nombre').value.trim();
            const cedulaUser = document.getElementById('cedula').value.trim();
            const btnSubmit = document.getElementById('btn-submit-form');

            if (!nombreUser || !cedulaUser || !cursosInscribirTexto) {
                alert("Por favor rellene todos los campos requeridos.");
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Sincronizando con la nube de Firebase...";

            const nuevoId = Date.now().toString();
            const fechaHoraString = new Date().toLocaleString();

            // Insertar datos en el nodo "inscritos" de Firebase
            database.ref('inscritos/' + nuevoId).set({
                id: nuevoId,
                nombre: nombreUser,
                cedula: cedulaUser,
                cursos: cursosInscribirTexto,
                fecha: fechaHoraString
            })
            .then(() => {
                // Pasamos los datos temporalmente por sessionStorage para usarlos en el mensaje de WhatsApp final
                sessionStorage.setItem('ultimo_nombre', nombreUser);
                sessionStorage.setItem('ultimos_cursos', cursosInscribirTexto);
                
                // Vaciamos el carrito porque ya se procesó con éxito
                localStorage.removeItem('cart');
                window.location.href = "gracias.html";
            })
            .catch((error) => {
                alert("Error de conexión con Firebase: " + error.message);
                btnSubmit.disabled = false;
                btnSubmit.innerText = "FINALIZAR E INSCRIBIRSE 🚀";
            });
        }
    </script>
</body>
</html>
