<!-- Archivo: contacto.html (Inscripción 2026) -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; background-color: var(--azul-primario); color: white;
            min-height: 100vh;
        }

        /* --- HEADER CON WHATSAPP ARRIBA A LA DERECHA --- */
        .header-registro {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .btn-whatsapp-top {
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp-top:hover {
            transform: scale(1.05);
            background: #1eb954;
        }

        .btn-whatsapp-top img {
            width: 20px;
            filter: brightness(0) invert(1);
        }

        /* DISEÑO DEL FORMULARIO */
        .form-container {
            max-width: 500px; margin: 50px auto; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 25px; padding: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--azul-electrico); font-size: 0.8rem; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: white; outline: none; box-sizing: border-box;
        }

        .btn-finalizar {
            width: 100%; background: var(--naranja-neon); color: white;
            padding: 16px; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* CHATBOT IZQUIERDA (Se mantiene) */
        .chatbot-trigger {
            position: fixed; bottom: 30px; left: 30px;
            width: 60px; height: 60px; background: var(--azul-electrico);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1000;
        }
    </style>
</head>
<body>

    <header class="header-registro">
        <a href="carrito_13.html" style="color: var(--azul-electrico); text-decoration: none;">⬅ VOLVER</a>
        
        <!-- BOTÓN DE WHATSAPP ARRIBA A LA DERECHA -->
        <a href="https://wa.me/584243360158" target="_blank" class="btn-whatsapp-top">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA">
            AYUDA WHATSAPP
        </a>
    </header>

    <div class="form-container">
        <h2 style="text-align: center;">REGISTRO <span style="color: var(--azul-electrico);">2026</span></h2>
        
        <form id="form-inscripcion">
            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
            </div>
            <div class="input-group">
                <label>Cédula de Identidad</label>
                <input type="text" id="cedula" placeholder="V-00000000" required>
            </div>
            <button type="submit" class="btn-finalizar">FINALIZAR INSCRIPCIÓN 🚀</button>
        </form>
    </div>

    <!-- CHATBOT FLOTANTE IZQUIERDA -->
    <div class="chatbot-trigger" onclick="toggleChat()">
        <img src="img/chatbot.png" style="width:30px;" onerror="this.src='img/logo.png'">
    </div>

    <!-- Scripts de Firebase y Chatbot -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="chatbot_9.js"></script>
</body>
</html>
