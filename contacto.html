<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { 
            background: #0a192f; 
            color: white; 
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .form-container { 
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { color: #00d2ff; text-align: center; margin-bottom: 30px; letter-spacing: 1px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.7); font-size: 0.9rem; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #00d2ff; background: rgba(255,255,255,0.15); }

        .btn-enviar { 
            background: linear-gradient(135deg, #ff6d00, #ff9100); 
            color: white; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            text-transform: uppercase;
        }

        #mensaje-exito { text-align: center; display: none; }
    </style>
</head>
<body>

    <div class="form-container" id="seccion-formulario">
        <h2>DATOS DEL ASPIRANTE</h2>
        <form id="form-registro">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombre" required placeholder="Ej. Bladimir Silva">
            </div>
            <div class="form-group">
                <label>Cédula de Identidad</label>
                <input type="number" id="cedula" required placeholder="Solo números">
            </div>
            <div class="form-group">
                <label>WhatsApp de Contacto</label>
                <input type="tel" id="telefono" required placeholder="Ej. 04121234567">
            </div>
            <button type="submit" class="btn-enviar">CONFIRMAR INSCRIPCIÓN 🚀</button>
        </form>
    </div>

    <div class="form-container" id="mensaje-exito">
        <div style="font-size: 4rem;">✅</div>
        <h2 style="color:#25D366;">¡REGISTRO EXITOSO!</h2>
        <p id="resumen-ticket" style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; margin:20px 0; font-family: monospace;"></p>
        <button onclick="window.location.href='index.html'" class="btn-enviar" style="background:#1a237e;">VOLVER AL INICIO</button>
    </div>

    <script>
        document.getElementById('form-registro').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const n = document.getElementById('nombre').value;
            const c = document.getElementById('cedula').value;
            const t = document.getElementById('telefono').value;

            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            let cursosNombres = carrito.map(curr => curr.nombre).join(', ');

            const registro = {
                id: "CAE-" + Math.floor(Math.random() * 9000 + 1000),
                nombre: n,
                cedula: c,
                telefono: t,
                cursos: cursosNombres,
                fecha: new Date().toLocaleDateString()
            };

            // Guardar en la "Base de Datos" (Admin)
            let bd = JSON.parse(localStorage.getItem('base_datos_inscritos')) || [];
            bd.push(registro);
            localStorage.setItem('base_datos_inscritos', JSON.stringify(bd));

            // Limpiar Carrito
            localStorage.removeItem('cart');

            // Mostrar Éxito
            document.getElementById('seccion-formulario').style.display = 'none';
            document.getElementById('mensaje-exito').style.display = 'block';
            document.getElementById('resumen-ticket').innerHTML = `
                ID: ${registro.id}<br>
                ESTUDIANTE: ${n}<br>
                CURSOS: ${cursosNombres}
            `;
        });
    </script>
</body>
</html>
