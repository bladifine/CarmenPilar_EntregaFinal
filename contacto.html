<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción 2026 | BotEduCarmen</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --azul-primario: #0a192f;
            --azul-electrico: #00d2ff;
            --naranja-neon: #ff6d00;
            --naranja-glow: #ff9100;
        }

        body { 
            background: var(--azul-primario); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        /* --- HEADER CON WHATSAPP ARRIBA A LA DERECHA --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .btn-whatsapp-top {
            background: #25D366;
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp-top:hover { transform: scale(1.05); background: #1eb954; }

        /* --- CONTENEDOR CENTRAL --- */
        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .form-container { 
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { color: var(--azul-electrico); text-align: center; margin-bottom: 30px; letter-spacing: 1px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--azul-electrico); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--azul-electrico); background: rgba(0,0,0,0.5); }

        .btn-enviar { 
            background: linear-gradient(135deg, var(--naranja-neon), var(--naranja-glow)); 
            color: white; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 14px; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 10px;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #b34b00;
        }

        .btn-enviar:disabled { background: #555 !important; box-shadow: none; cursor: not-allowed; }
        .btn-enviar:active { transform: translateY(4px); box-shadow: none; }

        /* --- CHATBOT FLOTANTE --- */
        .chatbot-trigger {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--azul-electrico), #0077ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        #mensaje-exito { text-align: center; display: none; }
    </style>
</head>
<body>

    <header>
        <a href="carrito.html" style="color: var(--azul-electrico); text-decoration: none; font-weight: bold; font-size: 0.9rem;">⬅ VOLVER</a>
        <a href="https://wa.me/584243360158" target="_blank" class="btn-whatsapp-top">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="18" style="filter: brightness(0) invert(1);">
            AYUDA WHATSAPP
        </a>
    </header>

    <div class="main-content">
        <div class="form-container" id="seccion-formulario">
            <h2>DATOS DEL ASPIRANTE</h2>
            <form id="form-registro">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="nombre" required placeholder="Ej. Bladimir Silva">
                </div>
                <div class="form-group">
                    <label>Cédula de Identidad</label>
                    <input type="number" id="cedula" required placeholder="Solo números">
                </div>
                <div class="form-group">
                    <label>WhatsApp de Contacto</label>
                    <input type="tel" id="telefono" required placeholder="Ej. 04121234567">
                </div>
                <button type="submit" id="btn-submit-form" class="btn-enviar">CONFIRMAR INSCRIPCIÓN 🚀</button>
            </form>
        </div>

        <div class="form-container" id="mensaje-exito">
            <div style="font-size: 4rem;">✅</div>
            <h2 style="color:#25D366;">¡REGISTRO EXITOSO!</h2>
            <p id="resumen-ticket" style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; margin:20px 0; font-family: monospace; line-height: 1.6; text-align: left;"></p>
            <button onclick="window.location.href='index.html'" class="btn-enviar" style="background:#1a237e; box-shadow: 0 6px 0 #0d144a;">VOLVER AL INICIO</button>
        </div>
    </div>

    <div class="chatbot-trigger" onclick="toggleChat()">
        <img src="img/chatbot.png" style="width:35px;" onerror="this.src='img/logo.png'">
    </div>

    <script src="chatbot.js"></script>
    <script>
        document.getElementById('form-registro').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btn-submit-form');
            btnSubmit.disabled = true;
            btnSubmit.innerText = "PROCESANDO...";

            const n = document.getElementById('nombre').value;
            const c = document.getElementById('cedula').value;
            const t = document.getElementById('telefono').value;

            let carrito = JSON.parse(localStorage.getItem('cart')) || [];
            let cursosNombres = carrito.map(curr => curr.nombre).join(', ');

            const registro = {
                id: "CAE-" + Math.floor(Math.random() * 9000 + 1000),
                nombre: n,
                cedula: c,
                telefono: t,
                cursos: cursosNombres,
                fecha: new Date().toLocaleDateString()
            };

            // ID único e inequívoco de tu base de datos de Firebase
            const projectId = "boteducarmen2026";

            // Enlace de destino real en tu base de datos de tiempo real de Google Firebase
            const FIREBASE_URL = `https://${projectId}-default-rtdb.firebaseio.com/inscritos.json`;

            // Enviar los datos directamente a la nube de Firebase
            fetch(FIREBASE_URL, {
                method: "POST",
                body: JSON.stringify(registro),
                headers: {
                    "Content-Type": "application/json"
                }
            })
            .then(response => {
                if(response.ok) {
                    // Limpiar el carrito localmente tras el éxito
                    localStorage.removeItem('cart');
                    
                    document.getElementById('seccion-formulario').style.display = 'none';
                    document.getElementById('mensaje-exito').style.display = 'block';
                    document.getElementById('resumen-ticket').innerHTML = `
                        <b>ID TICKETS:</b> ${registro.id}<br>
                        <b>ESTUDIANTE:</b> ${n}<br>
                        <b>CURSOS SELECCIONADOS:</b> ${cursosNombres}<br>
                        <b>ESTADO:</b> Guardado en Servidor Nube
                    `;
                } else {
                    alert("Error en el servidor de Firebase. Verifica las reglas de tu Realtime Database.");
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "CONFIRMAR INSCRIPCIÓN 🚀";
                }
            })
            .catch(error => {
                console.error("Error completo:", error);
                alert("Error de conexión. La base de datos rechazó la petición.");
                btnSubmit.disabled = false;
                btnSubmit.innerText = "CONFIRMAR INSCRIPCIÓN 🚀";
            });
        });

        function toggleChat() {
            if(typeof window.toggleChat === 'function') {
                window.toggleChat();
            } else {
                console.log("Chatbot no cargado aún");
            }
        }
    </script>
</body>
</html>
